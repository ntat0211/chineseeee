<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Trung - HSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#E61F32;--primary-dark:#b5001f;--primary-light:#ff6b7a;
  --white:#ffffff;--bg:#fde8ea;--bg-light:#ffcdd2;
  --text:#1a1a2e;--text-light:#666;--success:#4CAF50;--error:#F44336;
  --shadow:0 2px 12px rgba(0,0,0,.08);--radius:12px;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.container{max-width:700px;margin:0 auto;padding:16px}

/* Header */
header{text-align:center;padding:20px 0 16px}
header h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;color:var(--primary-dark)}
header p{font-size:.85rem;color:var(--text-light);margin-top:4px}

/* Level tabs */
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.level-tab{
  padding:7px 14px;border-radius:20px;border:2px solid var(--primary-light);
  background:var(--white);font-weight:600;font-size:.8rem;cursor:pointer;transition:.2s;user-select:none;
}
.level-tab:hover{background:var(--bg-light)}
.level-tab.active{background:var(--primary);color:var(--white);border-color:var(--primary)}

/* Stats */
.stats{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.stat{
  background:var(--white);border-radius:10px;padding:8px 14px;box-shadow:var(--shadow);
  text-align:center;min-width:70px;flex:1;max-width:120px;
}
.stat .num{font-size:1.2rem;font-weight:800;color:var(--primary-dark)}
.stat .label{font-size:.65rem;color:var(--text-light);margin-top:1px}

/* Progress */
.progress{width:100%;height:5px;background:var(--bg-light);border-radius:10px;margin:12px 0;overflow:hidden}
.progress .fill{height:100%;background:var(--primary);border-radius:10px;transition:width .3s}
.progress-text{text-align:center;font-size:.72rem;color:var(--text-light);margin-bottom:8px}

/* Card */
.card{
  background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 16px;margin-bottom:12px;animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Quiz */
.hanzi{font-size:clamp(2.5rem,8vw,3.5rem);font-weight:800;text-align:center;color:var(--primary-dark);margin:8px 0}
.pinyin{text-align:center;font-size:1.1rem;color:var(--primary);margin-bottom:6px}
.question{text-align:center;font-size:.95rem;color:var(--text-light);margin-bottom:14px;font-weight:600}

/* Options grid */
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.option{
  padding:12px 10px;border:2px solid #ddd;border-radius:10px;cursor:pointer;
  font-weight:500;font-size:.85rem;text-align:center;transition:.2s;background:var(--white);
  user-select:none;
}
.option:hover{border-color:var(--primary);background:var(--bg)}
.option.disabled{pointer-events:none;opacity:.6}
.option.correct{border-color:var(--success);background:#E8F5E9;color:#2E7D32}
.option.wrong{border-color:var(--error);background:#FFEBEE;color:#C62828;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Attempts indicator */
.attempts{text-align:center;margin-top:10px;font-size:.8rem;color:var(--text-light)}
.attempts span{color:var(--primary);font-weight:700}

/* Feedback */
.feedback{
  margin-top:12px;padding:8px 12px;border-radius:8px;font-size:.82rem;font-weight:600;display:none;
}
.feedback.show{display:block}
.feedback.correct{background:#E8F5E9;color:#2E7D32}
.feedback.wrong{background:#FFEBEE;color:#C62828}

/* Buttons */
.btn-group{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:9px 20px;border:none;border-radius:20px;font-weight:700;font-size:.82rem;
  cursor:pointer;transition:.2s;font-family:inherit;
}
.btn-primary{background:var(--primary);color:var(--white)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--bg-light);color:var(--primary-dark)}
.btn-secondary:hover{background:var(--primary)}

/* Flashcard */
.flashcard-wrap{perspective:1000px;height:220px;cursor:pointer;margin:10px 0}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashcard-wrap.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{
  position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;
  justify-content:center;box-shadow:var(--shadow);
}
.flashcard-front{background:var(--white)}
.flashcard-back{background:var(--bg);transform:rotateY(180deg)}
.flashcard-front .hanzi{font-size:4rem}
.flashcard-back .info{text-align:center}
.flashcard-back .pinyin{font-size:1.1rem;font-weight:600;color:var(--primary)}
.flashcard-back .meaning{font-size:.95rem;margin-top:4px}
.flip-hint{font-size:.7rem;color:var(--text-light);margin-top:6px}

/* Vocab list */
.vocab-list{display:grid;gap:6px}
.vocab-item{
  display:flex;align-items:center;gap:10px;background:var(--white);
  border-radius:10px;padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,.04);
}
.vocab-item .char{font-size:1.5rem;font-weight:700;color:var(--primary-dark);min-width:40px;text-align:center}
.vocab-item .py{font-weight:600;color:var(--primary);font-size:.82rem}
.vocab-item .mean{font-size:.78rem;color:var(--text-light)}
.vocab-item .ex{font-size:.72rem;color:var(--primary-dark);margin-top:1px}

/* Mode toggle */
.mode-toggle{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.mode-btn{
  padding:6px 14px;border-radius:16px;border:none;font-weight:600;font-size:.75rem;
  cursor:pointer;transition:.2s;background:var(--bg-light);color:var(--primary-dark);
}
.mode-btn.active{background:var(--primary);color:var(--white)}

/* Result screen */
.result{text-align:center;padding:24px 16px}
.result .score{font-size:3rem;font-weight:800;color:var(--primary-dark)}
.result .msg{font-size:1rem;font-weight:600;margin:6px 0 4px}
.result .detail{color:var(--text-light);font-size:.82rem}

/* Responsive */
@media(max-width:500px){
  .container{padding:10px}
  .options{grid-template-columns:1fr}
  .stat{padding:6px 10px;min-width:60px}
  .stat .num{font-size:1rem}
  .flashcard-wrap{height:190px}
  .flashcard-front .hanzi{font-size:3rem}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Học Tiếng Trung HSK</h1>
    <p>Chọn cấp độ & bắt đầu học</p>
  </header>

  <div class="level-tabs" id="levelTabs"></div>
  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Tổng</div></div>
    <div class="stat"><div class="num" id="statCorrect">0</div><div class="label">Đúng</div></div>
    <div class="stat"><div class="num" id="statStreak">0</div><div class="label">Streak</div></div>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="quiz">Kiểm tra</button>
    <button class="mode-btn" data-mode="flashcard">Thẻ nhớ</button>
    <button class="mode-btn" data-mode="list">Danh sách</button>
  </div>

  <div id="content"></div>
  <div class="progress"><div class="fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
  <div class="btn-group" id="btnGroup">
    <button class="btn btn-secondary" id="btnPrev">← Trước</button>
    <button class="btn btn-primary" id="btnNext">Tiếp →</button>
  </div>
</div>

<script>

":"ngoái","type":"từ vựng","grammar":"妹妹去年去留学 了。 — Em gái năm trước đi du học rồi.","example":"妹妹去年去留学 了。"},{"hanzi":"让","pinyin":"ràng","meaning":"Khiến Nhường","type":"từ vựng","grammar":"我可以让步一下。 — Tôi có thể nhượng bộ 1 chút.","example":"我可以让步一下。"},{"hanzi":"上班","pinyin":"shàngbān","meaning":"Đi làm","type":"từ vựng","grammar":"她每天上八点上班。 — Cô ấy mỗi ngày 8 giờ dậy đi làm.","example":"她每天上八点上班。"},{"hanzi":"身体","pinyin":"shēntǐ","meaning":"Cơ thể","type":"từ vựng","grammar":"五点起床到公园锻炼身体。 — Mỗi ngày 5 giờ bà ngoại đều đến công viên tập thể dục.","example":"五点起床到公园锻炼身体。"},{"hanzi":"生病","pinyin":"shēngbìng","meaning":"Sinh bệnh Ốm","type":"từ vựng","grammar":"小明今天没来上 学，可能是生病 了。 — Hôm nay Tiểu Minh vẫn chưa đến lớp, có thể là do ốm rồi.","example":"小明今天没来上 学，可能是生病 了。"},{"hanzi":"生日","pinyin":"shēngrì","meaning":"Sinh nhật","type":"từ vựng","grammar":"我的生日恰好在“六一”儿童节这天。 — Sinh nhật của mình vừa đúng vàongày 1 tháng 6 tết thiếu nhi.","example":"我的生日恰好在“六一”儿童节这天。"},{"hanzi":"时间","pinyin":"shíjiān","meaning":"Thời gian","type":"từ vựng","grammar":"时间过得真快，不知不觉一年又过去了。 — Thời gian trôi qua thật nhanh, bất giác 1 năm lại đã qua rồi.","example":"时间过得真快，不知不觉一年又过去了。"},{"hanzi":"事情","pinyin":"shìqíng","meaning":"Công việc","type":"từ vựng","grammar":"别火上浇油把事情闹大了！ — Đừng thêm dầu vào lửa khiến sự việc thêm nghiêm trọng trọng nữa!","example":"别火上浇油把事情闹大了！"},{"hanzi":"手表","pinyin":"shǒubiǎo","meaning":"Đồng hồ","type":"từ vựng","grammar":"这块手表已经没有修理价 值，该报废了。 — Cái đồng hồ này đã không thể sửa được nữa rồi, nên bỏ đi thôi.","example":"这块手表已经没有修理价 值，该报废了。"},{"hanzi":"手机","pinyin":"shǒujī","meaning":"Điện thoại","type":"từ vựng","grammar":"这台手机是最先进的手机之一。 — Đây là một trong những mẫu điện thoại tiên tiến nhất.","example":"这台手机是最先进的手机之一。"},{"hanzi":"送","pinyin":"sòng","meaning":"Tặng","type":"từ vựng","grammar":"雪中送炭 — giúp người khi gặp nạn","example":"雪中送炭"},{"hanzi":"所以","pinyin":"suǒyǐ","meaning":"Vì thế Vì vậy","type":"từ vựng","grammar":"因为今天我忙，所以没有 去。 — Bởi vì hôm nay tôi bận, cho nên không đi..","example":"因为今天我忙，所以没有 去。"},{"hanzi":"它","pinyin":"tā","meaning":"Nó","type":"từ vựng","grammar":"至死靡它 — Đến chết cũng không đổi","example":"至死靡它"},{"hanzi":"踢足球","pinyin":"tī zúqiú","meaning":"Đá bóng","type":"từ vựng","grammar":"我每个星期日都跟朋友一起去踢足 球。 — Mỗi chủ nhật tôi đều cùng bạn đi đá bóng.","example":"我每个星期日都跟朋友一起去踢足 球。"},{"hanzi":"题","pinyin":"tí","meaning":"Đề (bài, mục)","type":"từ vựng","grammar":"小题大做 — Việc bé xé ra to","example":"小题大做"},{"hanzi":"跳舞","pinyin":"tiàowǔ","meaning":"Khiêu vũ Nhảy","type":"từ vựng","grammar":"跳舞是我的爱好。 — Khiêu vũ là sở thích của tôi.","example":"跳舞是我的爱好。"},{"hanzi":"外","pinyin":"wài","meaning":"Ngoại","type":"từ vựng","grammar":"古今中外/外婆 — Từ cổ chí kim Bà ngoại","example":"古今中外/外婆"},{"hanzi":"玩","pinyin":"wán","meaning":"Chơi","type":"từ vựng","grammar":"一考完 试，小明就忘乎所以地玩。 — Thi xong, Tiểu Minh gần như quên hết mọi thứ rồi chơi.","example":"一考完 试，小明就忘乎所以地玩。"},{"hanzi":"完","pinyin":"wán","meaning":"Xong","type":"từ vựng","grammar":"没完没了 — Vô cùng tận","example":"没完没了"},{"hanzi":"晚上","pinyin":"wǎnshàng","meaning":"Buổi tối","type":"từ vựng","grammar":"晚上一起吃顿饭 吧。 — Tối nay cùng nhau ăn bữa cơm đi.","example":"晚上一起吃顿饭 吧。"},{"hanzi":"为什么","pinyin":"wèishéme","meaning":"Vì sao","type":"từ vựng","grammar":"不知道为什么小李进来事情就这么惨呢？ — Không biết tại sao khi Tiểu Lý bước vào tình hình lại trở nên tồi tệ như vậy?","example":"不知道为什么小李进来事情就这么惨呢？"},{"hanzi":"问","pinyin":"wèn","meaning":"Hỏi","type":"từ vựng","grammar":"一问三不知 — Cái gì cũng không biết","example":"一问三不知"},{"hanzi":"问题","pinyin":"wèntí","meaning":"Câu hỏi","type":"từ vựng","grammar":"这个问题恐怕我解决不了 了。 — Vấn đề này e là tôi cũng không giải quyết được rồi.","example":"这个问题恐怕我解决不了 了。"},{"hanzi":"西瓜","pinyin":"xīguā","meaning":"Dưa hấu","type":"từ vựng","grammar":"我最喜欢喝西瓜 汁。 — Tôi thích nhất uống nước ép dưa hấu.","example":"我最喜欢喝西瓜 汁。"},{"hanzi":"希望","pinyin":"xīwàng","meaning":"Hy vọng","type":"từ vựng","grammar":"亲爱的妈妈爸爸，我不会辜负你们的希望。 — Bố mẹ thân yêu của con, con sẽ không phụ sự kỳ vọng của mọi người.","example":"亲爱的妈妈爸爸，我不会辜负你们的希望。"},{"hanzi":"洗","pinyin":"xǐ","meaning":"Rửa","type":"từ vựng","grammar":"碧空如洗 — Sáng trong như ngọc","example":"碧空如洗"},{"hanzi":"向","pinyin":"xiàng","meaning":"Hướng đến ai","type":"từ vựng","grammar":"晕头传向 — Đầu óc choáng váng","example":"晕头传向"},{"hanzi":"小时","pinyin":"xiǎoshí","meaning":"Giờ; tiếng đồng hồ","type":"từ vựng","grammar":"他一做就做到八个小时才休息。 — Một khi anh ấy đã làm thì phải 8 giờ sau mới nghỉ.","example":"他一做就做到八个小时才休息。"},{"hanzi":"笑","pinyin":"xiào","meaning":"Cười","type":"từ vựng","grammar":"哭笑不得 — Dở khóc dở cười","example":"哭笑不得"},{"hanzi":"新","pinyin":"xīn","meaning":"Mới","type":"từ vựng","grammar":"日新月异 — Biến chuyển từng ngày, thay đổi từng ngày","example":"日新月异"},{"hanzi":"姓","pinyin":"xìng","meaning":"Họ","type":"từ vựng","grammar":"请问您贵姓？ — Xin hỏi họ của ngài là gì?","example":"请问您贵姓？"},{"hanzi":"休息","pinyin":"xiūxi","meaning":"Nghỉ ngơi","type":"từ vựng","grammar":"走累了，找个地方休息休 息。 — Điện thoại là phương tiện truyền gửi thông tin.Đi mệt rồi, tìm chỗ nào nghỉ ngơi một tý.","example":"走累了，找个地方休息休 息。"},{"hanzi":"雪","pinyin":"xuě","meaning":"Tuyết","type":"từ vựng","grammar":"雪中送炭 — Giúp người khi gặp nạn","example":"雪中送炭"},{"hanzi":"颜色","pinyin":"yánsè","meaning":"Màu sắc","type":"từ vựng","grammar":"你喜欢什么颜色？ — Bạn thích màu nào?","example":"你喜欢什么颜色？"},{"hanzi":"眼睛","pinyin":"yǎnjīng","meaning":"Đôi mắt","type":"từ vựng","grammar":"小姑娘长着两只水灵灵的眼睛。 — Cô gáicó đôi mắt đẹp long lanh.","example":"小姑娘长着两只水灵灵的眼睛。"},{"hanzi":"羊肉","pinyin":"yángròu","meaning":"Thịt Dê","type":"từ vựng","grammar":"挂羊肉买狗头。 — Treo đầu dê bán thịt chó.","example":"挂羊肉买狗头。"},{"hanzi":"要","pinyin":"yào","meaning":"Muốn Cần","type":"từ vựng","grammar":"要言不烦 — Rõ ràng khúc chiết","example":"要言不烦"},{"hanzi":"药","pinyin":"yào","meaning":"Thuốc","type":"từ vựng","grammar":"中药/ 良药苦口 — Thuốc đắng giã tật.","example":"中药/ 良药苦口"},{"hanzi":"也","pinyin":"yě","meaning":"Cũng","type":"ngữ pháp","grammar":"之乎者也 — Diễn tả bài văn hoặc ôi không phải là một kẻ say xỉn chứ đừng nói đến một cô gái không con sạch.","example":"我不是酒鬼，更不是嫖客。"},{"hanzi":"公园","pinyin":"gōngyuán","meaning":"Công viên","type":"từ vựng","grammar":"弟弟在公园的湖里玩着一个西瓜似的水球。 — Em trai đang chơi quả bóng nước giống quả dưa hấu ở hồ nước trong công viên.","example":"弟弟在公园的湖里玩着一个西瓜似的水球。"},{"hanzi":"故事","pinyin":"gùshì","meaning":"Sự cố","type":"từ vựng","grammar":"他的故事没有一点真实性。 — Không có sự thật trong câu chuyện của mình.","example":"他的故事没有一点真实性。"},{"hanzi":"刮风","pinyin":"guā fēng","meaning":"Cạo gió","type":"từ vựng","grammar":"北方不比南方，春天老刮 风。 — Phương bắc không hơn phương nam, mùa xuân luôn lộng gió.","example":"北方不比南方，春天老刮 风。"},{"hanzi":"关","pinyin":"guān","meaning":"Cửa …","type":"từ vựng","grammar":"冷峻，漠不关心。 — Khuôn mặt chúng tôi dữ tợn và thờ ơ.","example":"冷峻，漠不关心。"},{"hanzi":"关系","pinyin":"guānxì","meaning":"Quan hệ","type":"từ vựng","grammar":"我和那个家伙断绝关系了。 — Tôi đã chia tay với gã đó.","example":"我和那个家伙断绝关系了。"},{"hanzi":"关心","pinyin":"guānxīn","meaning":"Quan tâm","type":"từ vựng","grammar":"我们脸色冷峻，漠不关心。 — Khuôn mặt chúng tôi dữ tợn và thờ ơ.","example":"我们脸色冷峻，漠不关心。"},{"hanzi":"关于","pinyin":"guānyú","meaning":"Đối với ….","type":"từ vựng","grammar":"关于供应物资的答复怎样？ — Câu trả lời về nguồn cung cấp là gì?","example":"关于供应物资的答复怎样？"},{"hanzi":"国家","pinyin":"guójiā","meaning":"Quốc gia","type":"từ vựng","grammar":"他是国家的知识分子精英。 — Anh là tầng lớp trí thức ưu tú của đất nước.","example":"他是国家的知识分子精英。"},{"hanzi":"果汁","pinyin":"guǒzhī","meaning":"Nước ép","type":"từ vựng","grammar":"汤已售完现只供应果汁。 — Súp đã được bán hết và bây giờ chỉ có nước trái cây.","example":"汤已售完现只供应果汁。"},{"hanzi":"过去","pinyin":"guòqù","meaning":"Qua rồi","type":"từ vựng","grammar":"他的家在教堂过去几步远。 — Nhà anh cách nhà thờ vài bước chân.","example":"他的家在教堂过去几步远。"},{"hanzi":"还是","pinyin":"háishì","meaning":"Hoặc là","type":"từ vựng","grammar":"不管是刮风还是下雨，他从未迟到 过。 — Dù trời mưa gió, anh ấy chưa bao giờ đến muộn.","example":"不管是刮风还是下雨，他从未迟到 过。"},{"hanzi":"害怕","pinyin":"hàipà","meaning":"Sợ hãi","type":"từ vựng","grammar":"天黑了,小飞开始害怕起来。 — Trời sắp tối, Tiểu Phi trở nên sợ hãi.","example":"天黑了,小飞开始害怕起来。"},{"hanzi":"河","pinyin":"hé","meaning":"Hồ","type":"từ vựng","grammar":"对于这个我不会信口开河。 — Tôi sẽ không nói về nó.","example":"对于这个我不会信口开河。"},{"hanzi":"黑板","pinyin":"hēibǎn","meaning":"Bảng đen","type":"từ vựng","grammar":"她的名字已从黑板上划掉。 — Tên của cô ấy đã bị gạch bỏ trên bảng đen.","example":"她的名字已从黑板上划掉。"},{"hanzi":"护照","pinyin":"hù zhào","meaning":"Hộ chiếu","type":"từ vựng","grammar":"请你填上护照号码并签名。 — Vui lòng điền số hộ chiếu của bạn và ký tên.","example":"请你填上护照号码并签名。"},{"hanzi":"花","pinyin":"huā","meaning":"Hoa","type":"từ vựng","grammar":"她真是个水性杨花的女人！ — Cô ấy thật là một người phụ nữ xinh đẹp!","example":"她真是个水性杨花的女人！"},{"hanzi":"花园","pinyin":"huāyuán","meaning":"Vườn hoa Hoa viên Vườn tược","type":"từ vựng","grammar":"她一下午都在花园里拔草。 — Cô ấy đã nhổ cỏ trong vườn cả buổi chiều.","example":"她一下午都在花园里拔草。"},{"hanzi":"画","pinyin":"huà","meaning":"Tranh","type":"từ vựng","grammar":"她的画博得了老师的赞扬。 — Bức tranh của cô đã giành được lời khen ngợi từ giáo viên.","example":"她的画博得了老师的赞扬。"},{"hanzi":"坏","pinyin":"huài","meaning":"Hỏng","type":"từ vựng","grammar":"那批玻璃器皿损坏了很多。 — Lô đồ thủy tinh đó bị hư hỏng rất nhiều.","example":"那批玻璃器皿损坏了很多。"},{"hanzi":"还","pinyin":"h huán","meaning":"Hoặc là Đổi","type":"từ vựng","grammar":"那个小坏蛋还只有十九岁。 — Tên phản diện nhỏ đó mới mười chín tuổi.","example":"那个小坏蛋还只有十九岁。"},{"hanzi":"环境","pinyin":"huánjìng","meaning":"Môi trường Hoàn cảnh","type":"từ vựng","grammar":"我姐姐在环境部担任要职。 — Em gái tôi giữ một vị trí quan trọng trong Bộ Môi trường.","example":"我姐姐在环境部担任要职。"},{"hanzi":"换","pinyin":"huàn","meaning":"Đổi","type":"từ vựng","grammar":"客饭固定的午餐不能换菜。 — Bữa trưa cố định không thể thay đổi.","example":"客饭固定的午餐不能换菜。"},{"hanzi":"黄","pinyin":"huáng","meaning":"Màu vàng Hoàng","type":"từ vựng","grammar":"黄山山 景，处处可以入 画。 — Phong cảnh núi Hoàng Sơn có thể được vẽ ở khắp mọi nơi.","example":"黄山山 景，处处可以入 画。"},{"hanzi":"会议","pinyin":"huìyì","meaning":"Hội ý","type":"từ vựng","grammar":"此事推迟到下次会议解决。 — Vấn đề đã được hoãn lại cuộc họp tiếp theo.","example":"此事推迟到下次会议解决。"},{"hanzi":"或者","pinyin":"huòzhě","meaning":"Hoặc là","type":"từ vựng","grammar":"或者他只是一分钟热度，或者他是真的下定了决心。 — Hoặc anh ấy chỉ là một phút nóng nảy, hoặc anh ấy thực sự hạ quyết tâm.","example":"或者他只是一分钟热度，或者他是真的下定了决心。"},{"hanzi":"机会","pinyin":"jīhuì","meaning":"Cơ hội","type":"từ vựng","grammar":"现在，正是有志青年大显身手的好机会。 — Giờ đây, là cơ hội tốt để những người trẻ có khát vọng thể hiện tài năng của mình.","example":"现在，正是有志青年大显身手的好机会。"},{"hanzi":"几乎","pinyin":"jīhū","meaning":"Dường như","type":"từ vựng","grammar":"几乎所有的游客都是外国 人。 — Hầu hết tất cả khách du lịch là người nước ngoài.","example":"几乎所有的游客都是外国 人。"},{"hanzi":"极","pinyin":"jí","meaning":"Level","type":"từ vựng","grammar":"一时我又垂头丧气之极了。 — Trong một thời gian, tôi lại thất vọng.","example":"一时我又垂头丧气之极了。"},{"hanzi":"记得","pinyin":"jìdé","meaning":"Ghi nhớ Nhớ","type":"từ vựng","grammar":"给过我那把钥匙。 — Tôi nhớ cô ấy đã đưa tôi chìa khóa.","example":"给过我那把钥匙。"},{"hanzi":"季节","pinyin":"jìjié","meaning":"Mùa","type":"từ vựng","grammar":"秋天是毛织品畅销的季节。 — Mùa thu là mùa bán chạy nhất của các loại vải len.","example":"秋天是毛织品畅销的季节。"},{"hanzi":"检查","pinyin":"jiǎnchá","meaning":"Kiểm tra","type":"từ vựng","grammar":"定期去检查身体 吧，别等最后别人送你去。 — Thường xuyên đi khám định kỳ, đừng đợi ai đó đưa bạn đến đó.","example":"定期去检查身体 吧，别等最后别人送你去。"},{"hanzi":"简单","pinyin":"jiǎndān","meaning":"Đơn giản","type":"từ vựng","grammar":"这次考试很简单，可是由于我的粗 心，只考了 95。 — Đề thi rất đơn giản nhưng do bất cẩn nên tôi chỉ thi được 95.","example":"这次考试很简单，可是由于我的粗 心，只考了 95。"},{"hanzi":"健康","pinyin":"jiànkāng","meaning":"Khỏe mạnh","type":"từ vựng","grammar":"健康是成功的命 脉，是成功的本 钱。 — Sức khỏe là huyết mạch của thành công và là vốn của thành công.","example":"健康是成功的命 脉，是成功的本 钱。"},{"hanzi":"见面","pinyin":"jiànmiàn","meaning":"Gặp mặt","type":"từ vựng","grammar":"那么，我们明天此时见面。 — Vì vậy, chúng ta sẽ gặp nhau vào thời điểm này vào ngày mai.","example":"那么，我们明天此时见面。"},{"hanzi":"讲","pinyin":"jiǎng","meaning":"Dạy bảo/ dỗ","type":"từ vựng","grammar":"他考虑要讲一句严厉的话。 — Anh ấy coi là một lời nói khó nghe.","example":"他考虑要讲一句严厉的话。"},{"hanzi":"教","pinyin":"jiào","meaning":"Dạy","type":"từ vựng","grammar":"他的家在教堂过去几步远。 — Nhà anh cách nhà thờ vài bước chân.","example":"他的家在教堂过去几步远。"},{"hanzi":"角","pinyin":"jiǎo","meaning":"Góc, xó","type":"từ vựng","grammar":"我的胳膊肘撞着桌子角了。 — Khuỷu tay của tôi đập vào góc bàn.","example":"我的胳膊肘撞着桌子角了。"},{"hanzi":"脚","pinyin":"jiǎo","meaning":"Chân","type":"từ vựng","grammar":"他踢足球时扭伤了脚脖子。 — Anh ấy bị bong gân mắt cá chân khi chơi bóng đá.","example":"他踢足球时扭伤了脚脖子。"},{"hanzi":"接","pinyin":"jiē","meaning":"Đón, tiếp","type":"từ vựng","grammar":"他们提议接受布里托为王。 — Họ đề nghị chấp nhận Brito làm vua.","example":"他们提议接受布里托为王。"},{"hanzi":"街道","pinyin":"jiēdào","meaning":"Đường phố Địa đạo (hầm)","type":"từ vựng","grammar":"那个阳台伸出于街道上方。 — Ban công nhô ra ngoài đường.","example":"那个阳台伸出于街道上方。"},{"hanzi":"结婚","pinyin":"jiéhūn","meaning":"Kết hôn","type":"từ vựng","grammar":"消息来得很突然。 — Tin cô kết hôn đến bất ngờ.","example":"消息来得很突然。"},{"hanzi":"结束","pinyin":"jiéshù","meaning":"Kết thúc","type":"từ vựng","grammar":"有怎样的开始，就有怎样的结束。 — Dù có bắt đầu thì cũng có kết thúc.","example":"有怎样的开始，就有怎样的结束。"},{"hanzi":"节目","pinyin":"jiémù","meaning":"Tiết mục","type":"từ vựng","grammar":"音乐节目被知趣地撤消了。 — Buổi biểu diễn âm nhạc đã bị hủy bỏ một cách khôn ngoan.","example":"音乐节目被知趣地撤消了。"},{"hanzi":"节日","pinyin":"jiérì","meaning":"Ngày lễ","type":"từ vựng","grammar":"节日的天安门广场花团锦 簇，令人赏心悦 目。 — Quảng trường Thiên An Môn lễ hội rực rỡ sắc hoa, đẹp mắt.","example":"节日的天安门广场花团锦 簇，令人赏心悦 目。"},{"hanzi":"解决","pinyin":"jiějué","meaning":"Giải quyết","type":"từ vựng","grammar":"你有解决这问题的办法吗？ — Bạn có một giải pháp cho vấn đề này?","example":"你有解决这问题的办法吗？"},{"hanzi":"借","pinyin":"jiè","meaning":"Mượn","type":"từ vựng","grammar":"这个小王借了我的笔,久假不归,真讨 厌。 — Tiểu Vương  mượn bút của tôi, đã lâu không có trả, thật là khó chịu.","example":"这个小王借了我的笔,久假不归,真讨 厌。"},{"hanzi":"经常","pinyin":"jīngcháng","meaning":"Thường xuyên","type":"từ vựng","grammar":"我们尽量经常地打扫卫生。 — Chúng tôi cố gắng làm sạch thường xuyên nhất có thể.","example":"我们尽量经常地打扫卫生。"},{"hanzi":"经过","pinyin":"jīngguò","meaning":"(thực sự đã trải qua)","type":"từ vựng","grammar":"经过争论之后她愤然离开。 — Sau một hồi tranh cãi, cô ấy giận dữ bỏ đi.","example":"经过争论之后她愤然离开。"},{"hanzi":"经历","pinyin":"jīnglì","meaning":"Từng trải Trải qua","type":"từ vựng","grammar":"教育和经历使他眼界开阔。 — Học vấn và kinh nghiệm đã mở rộng tầm nhìn của anh ấy.","example":"教育和经历使他眼界开阔。"},{"hanzi":"久","pinyin":"jiǔ","meaning":"Lâu","type":"từ vựng","grammar":"这一次打仗打得又凶又久。 — Lần này chiến tranh ác liệt và kéo dài.","example":"这一次打仗打得又凶又久。"},{"hanzi":"旧","pinyin":"jiù","meaning":"Cũ","type":"từ vựng","grammar":"多数旧电影片都是黑白的。 — Hầu hết các bộ phim cũ là đen trắng.","example":"多数旧电影片都是黑白的。"},{"hanzi":"举行","pinyin":"jǔxíng","meaning":"Tổ chức, thực hiện …","type":"từ vựng","grammar":"他们举行晚会以庆祝胜利。 — Họ tổ chức tiệc ăn mừng chiến thắng.","example":"他们举行晚会以庆祝胜利。"},{"hanzi":"句子","pinyin":"jùzi","meaning":"Câu","type":"từ vựng","grammar":"都有一个规范推 导。 — Mỗi câu đều có một dẫn xuất chính tắc.","example":"都有一个规范推 导。"},{"hanzi":"决定","pinyin":"juédìng","meaning":"Quyết định","type":"từ vựng","grammar":"一旦做出决定就不要拖延。 — Đừng trì hoãn một khi quyết định được đưa ra.","example":"一旦做出决定就不要拖延。"},{"hanzi":"课","pinyin":"kè","meaning":"Tiết học","type":"từ vựng","grammar":"舞蹈课使她腿部肌肉发达。 — Lớp học khiêu vũ khiến đôi chân của cô trở nên cơ bắp.","example":"舞蹈课使她腿部肌肉发达。"},{"hanzi":"可爱","pinyin":"kě’ài","meaning":"Đáng yêu","type":"từ vựng","grammar":"一个个红石榴小姑娘绽放出可爱的笑脸，躲在树枝间。 — Những cô bé hoa lựu đỏ hé nở với khuôn mặt tươi cười dễ thương, ẩn hiện giữa những cành cây.","example":"一个个红石榴小姑娘绽放出可爱的笑脸，躲在树枝间。"},{"hanzi":"刻","pinyin":"kè","meaning":"Khắc","type":"từ vựng","grammar":"刚才的恐怖立刻被忘却了。 — Sự kinh hoàng vừa rồi lập tức bị quên đi.","example":"刚才的恐怖立刻被忘却了。"},{"hanzi":"客人","pinyin":"kèrén","meaning":"Khách","type":"từ vựng","grammar":"我们这位客人要看轻你了。 — Khách của chúng tôi sẽ coi thường bạn.","example":"我们这位客人要看轻你了。"},{"hanzi":"空调","pinyin":"kòngtiáo","meaning":"Điều hòa","type":"từ vựng","grammar":"她调整了一下空调器。 — Cô điều chỉnh máy lạnh.","example":"她调整了一下空调器。"},{"hanzi":"口","pinyin":"kǒu","meaning":"Mồm Miệng","type":"từ vựng","grammar":"他夸口他是最高的得分手。 — Anh khoe rằng mình là người ghi bàn nhiều nhất.","example":"他夸口他是最高的得分手。"},{"hanzi":"哭","pinyin":"kū","meaning":"Khóc","type":"từ vựng","grammar":"我可并不想让你哭鼻子呀。 — Tôi không muốn bạn khóc.","example":"我可并不想让你哭鼻子呀。"},{"hanzi":"裤子","pinyin":"kùzi","meaning":"Quần","type":"từ vựng","grammar":"当裤子失去皮带，才懂得什么叫做依赖。 — Khi quần mất đai, họ hiểu thế nào là lệ thuộc.","example":"当裤子失去皮带，才懂得什么叫做依赖。"},{"hanzi":"筷子","pinyin":"kuàizi","meaning":"Đũa","type":"từ vựng","grammar":"他用筷子不大熟 练。 — Anh ấy không thành thạo sử dụng đũa.","example":"他用筷子不大熟 练。"},{"hanzi":"蓝","pinyin":"lán","meaning":"Màu xanh","type":"từ vựng","grammar":"我们头顶上是蔚蓝的天空。 — Phía trên chúng ta là bầu trời xanh.","example":"我们头顶上是蔚蓝的天空。"},{"hanzi":"老","pinyin":"lǎo","meaning":"Lâu năm","type":"từ vựng","grammar":"可是我认为你是个老混蛋。 — Nhưng tôi nghĩ bạn là một tên khốn già.","example":"可是我认为你是个老混蛋。"},{"hanzi":"离开","pinyin":"líkāi","meaning":"Rời xa","type":"từ vựng","grammar":"他转过身去，离开了房间。 — Anh quay người rời khỏi phòng.","example":"他转过身去，离开了房间。"},{"hanzi":"礼物","pinyin":"lǐwù","meaning":"Quà tặng Lễ vật","type":"từ vựng","grammar":"我也给你预备了一件礼物。 — Tôi cũng đã chuẩn bị một món quà cho bạn.","example":"我也给你预备了一件礼物。"},{"hanzi":"历史","pinyin":"lìshǐ","meaning":"Lịch sử","type":"từ vựng","grammar":"有些历史书籍长达百余卷。 — Một số sách lịch sử hơn trăm quyển.","example":"有些历史书籍长达百余卷。"},{"hanzi":"脸","pinyin":"liǎn","meaning":"Mặt","type":"từ vựng","grammar":"越用心想他的脸崩得越紧。 — Càng nghĩ về điều đó, mặt anh càng sụp xuống.","example":"越用心想他的脸崩得越紧。"},{"hanzi":"练习","pinyin":"liànxí","meaning":"Luyện tập","type":"từ vựng","grammar":"练习就是中考，中考就是练习。 — Thực hành là kỳ thi tuyển sinh trung học, và kỳ thi tuyển sinh trung học là thực hành.","example":"练习就是中考，中考就是练习。"},{"hanzi":"辆","pinyin":"liàng","meaning":"Cỗ","type":"từ vựng","grammar":"我修我这辆汽车可费劲了。 — Tôi đang đấu tranh để sửa chữa chiếc xe của tôi.","example":"我修我这辆汽车可费劲了。"},{"hanzi":"了解","pinyin":"liǎojiě","meaning":"Hiểu","type":"từ vựng","grammar":"他会说，他了解得最清楚。 — Anh ấy sẽ nói rằng anh ấy biết rõ nhất.","example":"他会说，他了解得最清楚。"},{"hanzi":"邻居","pinyin":"línjū","meaning":"Láng giềng","type":"từ vựng","grammar":"白发苍苍的邻居张奶奶拄着拐杖，脸上笑得像一朵绽开的菊花。 — Bà Trương hàng xóm tóc bạc phơ chống gậy, cười tươi như hoa cúc nở.","example":"白发苍苍的邻居张奶奶拄着拐杖，脸上笑得像一朵绽开的菊花。"},{"hanzi":"楼","pinyin":"lóu","meaning":"Tầng","type":"từ vựng","grammar":"我让她住在楼下免得碍事。 — Tôi để cô ấy sống ở tầng dưới để khỏi cản đường.","example":"我让她住在楼下免得碍事。"},{"hanzi":"马","pinyin":"mǎ","meaning":"Mã","type":"từ vựng","grammar":"房间里马上变得暗淡无光。 — Căn phòng ngay lập tức trở nên mờ mịt.","example":"房间里马上变得暗淡无光。"},{"hanzi":"马上","pinyin":"mǎshàng","meaning":"Lập tức","type":"từ vựng","grammar":"命令一下达，大家马上行动起来。 — Khi đơn hàng được giao, mọi người sẽ hành động ngay lập tức.","example":"命令一下达，大家马上行动起来。"},{"hanzi":"满意","pinyin":"mǎnyì","meaning":"Vừa ý","type":"từ vựng","grammar":"意的话,可以退货。 — Nếu không hài lòng có thể đổi trả hàng.","example":"意的话,可以退货。"},{"hanzi":"帽子","pinyin":"màozi","meaning":"Mũ","type":"từ vựng","grammar":"那人找到了帽子就安心了。 — Người đàn ông cảm thấy nhẹ nhõm khi tìm thấy chiếc mũ.","example":"那人找到了帽子就安心了。"},{"hanzi":"米","pinyin":"mǐ","meaning":"Cơm Gạo Mễ","type":"từ vựng","grammar":"我们在塌塌米上盘腿而坐。 — Chúng tôi ngồi xếp bằng trên chiếu tatami.","example":"我们在塌塌米上盘腿而坐。"},{"hanzi":"面包","pinyin":"miànbāo","meaning":"Bánh mì","type":"từ vựng","grammar":"他们把面包和干酪当饭吃。 — Họ ăn bánh mì và pho mát.","example":"他们把面包和干酪当饭吃。"},{"hanzi":"面条","pinyin":"miàntiáo","meaning":"Mì sợi","type":"từ vựng","grammar":"他确实饿极了,一会儿将两大碗面条狼吞虎咽般吃得一干二净。 — Anh thực sự rất đói, trong phút chốc anh đã ngấu nghiến hai tô mì lớn.","example":"他确实饿极了,一会儿将两大碗面条狼吞虎咽般吃得一干二净。"},{"hanzi":"明白","pinyin":"míngbái","meaning":"Hiểu rõ","type":"từ vựng","grammar":"他终于开始明白了实情。 — Cuối cùng anh cũng bắt đầu hiểu ra sự thật.","example":"他终于开始明白了实情。"},{"hanzi":"拿","pinyin":"ná","meaning":"Cầm, nắm","type":"từ vựng","grammar":"你的丈夫去拿干净衣服了。 — Chồng bạn đi lấy quần áo sạch.","example":"你的丈夫去拿干净衣服了。"},{"hanzi":"奶奶","pinyin":"nǎinai","meaning":"Bà nội","type":"từ vựng","grammar":"他是由他奶奶带大的。 — Anh ấy được nuôi dưỡng bởi bà của mình.","example":"他是由他奶奶带大的。"},{"hanzi":"南","pinyin":"nán","meaning":"Phía Nam","type":"từ vựng","grammar":"他的兄弟考取了南洋大学。 — Anh trai của anh đã được nhận vào Đại học Nam Dương.","example":"他的兄弟考取了南洋大学。"},{"hanzi":"难","pinyin":"nán","meaning":"Khó","type":"từ vựng","grammar":"大家都被这个问题难住了。 — Mọi người đều bối rối trước câu hỏi này.","example":"大家都被这个问题难住了。"},{"hanzi":"难过","pinyin":"nánguò","meaning":"Buồn rầu Khó chịu","type":"từ vựng","grammar":"你不要太难过，因为我一直都在；你不会太寂寞，因为我不曾离开。 — Đừng quá buồn, vì tôi luôn ở đó, bạn sẽ không quá cô đơn, vì tôi chưa bao giờ rời đi.","example":"你不要太难过，因为我一直都在；你不会太寂寞，因为我不曾离开。"},{"hanzi":"年级","pinyin":"niánjí","meaning":"Lớp","type":"từ vựng","grammar":"是一年级小同学的地方。 — Phía nam của khuôn viên là nơi dành cho học sinh đầu cấp.","example":"是一年级小同学的地方。"},{"hanzi":"年轻","pinyin":"niánqīng","meaning":"Trẻ tuổi","type":"từ vựng","grammar":"老师今天显得很年轻，简直和平时判若两人。 — Cô giáo hôm nay trông rất trẻ, gần như hai người đang yên bề gia thất.","example":"老师今天显得很年轻，简直和平时判若两人。"},{"hanzi":"鸟","pinyin":"niǎo","meaning":"Chim","type":"từ vựng","grammar":"今天我上爷爷家去玩，爷爷给我捉了一只小 鸟。 — Hôm nay, tôi đến chơi nhà ông, và ông đã bắt được một con chim.","example":"今天我上爷爷家去玩，爷爷给我捉了一只小 鸟。"},{"hanzi":"努力","pinyin":"nǔlì","meaning":"Chăm chỉ Nỗ lực","type":"từ vựng","grammar":"我们要努力完成领导交给的任务。 — Chúng tôi phải nỗ lực để hoàn thành nhiệm vụ mà ban lãnh đạo giao cho.","example":"我们要努力完成领导交给的任务。"},{"hanzi":"爬山","pinyin":"páshān","meaning":"Leo núi","type":"từ vựng","grammar":"没有人爬山只为爬到山腰。 — Không ai leo núi chỉ để leo lên sườn núi.","example":"没有人爬山只为爬到山腰。"},{"hanzi":"盘子","pinyin":"pánzi","meaning":"Cái đĩa, mâm","type":"từ vựng","grammar":"他把小费放在盘子下面了。 — Anh ta đặt tiền boa dưới đĩa.","example":"他把小费放在盘子下面了。"},{"hanzi":"胖","pinyin":"pàng","meaning":"Mũm mĩm","type":"từ vựng","grammar":"莫森的胖脸上堆满了笑容。 — Khuôn mặt mũm mĩm của Mawson nở nụ cười.","example":"莫森的胖脸上堆满了笑容。"},{"hanzi":"啤酒","pinyin":"píjiǔ","meaning":"Bia","type":"từ vựng","grammar":"啤酒受到压力从桶中流出。 — Bia chảy ra khỏi thùng dưới áp suất.","example":"啤酒受到压力从桶中流出。"},{"hanzi":"葡萄","pinyin":"pútáo","meaning":"Nho","type":"từ vựng","grammar":"四瓶葡萄酒不够二十人喝。 — Bốn chai rượu không đủ cho hai mươi người.","example":"四瓶葡萄酒不够二十人喝。"},{"hanzi":"普通话","pinyin":"pǔtōnghuà","meaning":"thông","type":"từ vựng","grammar":"面向现代化，推广普通话。 — Đối mặt với hiện đại hóa, thúc đẩy tiếng phổ thông.","example":"面向现代化，推广普通话。"},{"hanzi":"骑","pinyin":"qí","meaning":"Cưỡi","type":"từ vựng","grammar":"他骑着一匹深赤褐色的马。 — Anh ta đang cưỡi một con ngựa màu nâu sẫm.","example":"他骑着一匹深赤褐色的马。"},{"hanzi":"其实","pinyin":"qíshí","meaning":"Kỳ thật Thật ra","type":"từ vựng","grammar":"我找的书其实就在我面前。 — Cuốn sách tôi đang tìm kiếm thực sự đã ở ngay trước mặt tôi.","example":"我找的书其实就在我面前。"},{"hanzi":"其他","pinyin":"qítā","meaning":"Cái khác","type":"từ vựng","grammar":"其他的吧。 — Đưa cho tôi một số người khác.","example":"其他的吧。"},{"hanzi":"奇怪","pinyin":"qíguài","meaning":"Kì quái","type":"từ vựng","grammar":"一种奇怪的感觉一直困扰着他。 — Một cảm giác kỳ lạ đã và đang ám ảnh anh.","example":"一种奇怪的感觉一直困扰着他。"},{"hanzi":"铅笔","pinyin":"qiānbǐ","meaning":"Bút máy","type":"từ vựng","grammar":"你的铅笔差点戳了我的眼 睛。 — Cây bút chì của bạn suýt chọc vào mắt tôi.","example":"你的铅笔差点戳了我的眼 睛。"},{"hanzi":"清楚","pinyin":"qīngchǔ","meaning":"Rõ ràng","type":"từ vựng","grammar":"想要什 么，想清楚，选 择，珍 惜，一如对你的婚姻。 — Những gì bạn muốn, suy nghĩ rõ ràng, lựa chọn và trân trọng, giống như cuộc hôn nhân của bạn.","example":"想要什 么，想清楚，选 择，珍 惜，一如对你的婚姻。"},{"hanzi":"秋","pinyin":"qiū","meaning":"Mùa thu","type":"từ vựng","grammar":"别计较我这么老气横秋的。 — Đừng quan tâm đến việc tôi quá cổ hủ.","example":"别计较我这么老气横秋的。"},{"hanzi":"裙子","pinyin":"qúnzi","meaning":"Váy","type":"từ vựng","grammar":"这条裙子的腰身需要缩小。 — Phần eo của váy này cần được giảm bớt.","example":"这条裙子的腰身需要缩小。"},{"hanzi":"然后","pinyin":"ránhòu","meaning":"Sau đó","type":"từ vựng","grammar":"一个人对社会，要先做出贡献，然后才能索 取。 — Một người phải đóng góp cho xã hội sau đó anh ta mới có thể yêu cầu nó.","example":"一个人对社会，要先做出贡献，然后才能索 取。"},{"hanzi":"热情","pinyin":"rèqíng","meaning":"Nhiệt tình","type":"từ vựng","grammar":"我们对翻然改进的人,应热情欢迎,不纠缠历史旧账。 — Chúng ta nên nhiệt liệt hoan nghênh những người đã có những cải tiến, và không nên vướng vào những câu chuyện lịch sử.","example":"我们对翻然改进的人,应热情欢迎,不纠缠历史旧账。"},{"hanzi":"认为","pinyin":"rènwéi","meaning":"Thấy rằng (mục đích, suy nghĩ, tiên đoán thường đúng với kết quả xảy ra)","type":"từ vựng","grammar":"鲁迅先生认为，文学起源于劳动。 — Ông Lỗ Tấn cho rằng văn học bắt nguồn từ lao động.","example":"鲁迅先生认为，文学起源于劳动。"},{"hanzi":"认真","pinyin":"rènzhēn","meaning":"Chăm chỉ","type":"từ vựng","grammar":"对待生命要认真， — Hãy sống một cách nghiêm túc và sôi nổi.","example":"对待生命要认真，"},{"hanzi":"要活泼。","pinyin":"","meaning":"","type":"từ vựng","grammar":"","example":""},{"hanzi":"容易","pinyin":"róngyì","meaning":"dễ","type":"từ vựng","grammar":"好人很多的时候，坏人容易成事。 — Khi có nhiều người tốt, người xấu rất dễ làm.","example":"好人很多的时候，坏人容易成事。"},{"hanzi":"如果","pinyin":"rúguǒ","meaning":"Nếu như","type":"từ vựng","grammar":"如果明天下雨，我们就不去春游了。 — Nếu ngày mai trời mưa, chúng ta sẽ không đi chơi xuân.","example":"如果明天下雨，我们就不去春游了。"},{"hanzi":"伞","pinyin":"sǎn","meaning":"Cái ô","type":"từ vựng","grammar":"我的雨伞给吹得翻过去了。 — Chiếc ô của tôi đã bị thổi bay.","example":"我的雨伞给吹得翻过去了。"},{"hanzi":"上网","pinyin":"shàngwǎng","meaning":"Lên mạng","type":"từ vựng","grammar":"穷人不上网，既是穷的结 果，又成了更穷的原因。 — Việc người nghèo không sử dụng Internet không chỉ là kết quả của việc nghèo, mà còn là lý do để trở nên nghèo hơn.","example":"穷人不上网，既是穷的结 果，又成了更穷的原因。"},{"hanzi":"生气","pinyin":"shēngqì","meaning":"Tức giận Giận","type":"từ vựng","grammar":"不敢生气的是懦 夫，不去生气的才是智。 — Không dám tức giận là kẻ nhát gan, không đi bực tức là người biết nghĩ.","example":"不敢生气的是懦 夫，不去生气的才是智。"},{"hanzi":"声音","pinyin":"shēngyīn","meaning":"Âm thanh","type":"từ vựng","grammar":"该影片画面与声音不同步。 — Màn hình video và âm thanh không đồng bộ.","example":"该影片画面与声音不同步。"},{"hanzi":"使","pinyin":"shǐ","meaning":"cho","type":"từ vựng","grammar":"读书使我感到快 乐，分享使我多了朋友，工作使我富有创意。 — Đọc sách khiến tôi vui vẻ, chia sẻ giúp tôi có thêm nhiều bạn và công việc khiến tôi sáng tạo.","example":"读书使我感到快 乐，分享使我多了朋友，工作使我富有创意。"},{"hanzi":"世界","pinyin":"shìjiè","meaning":"Thế giới","type":"từ vựng","grammar":"世界上到处都是罪恶横行。 — Thế giới đầy rẫy những điều xấu xa.","example":"世界上到处都是罪恶横行。"},{"hanzi":"瘦","pinyin":"shòu","meaning":"Gầy","type":"từ vựng","grammar":"你不必节食就已经够瘦的 了。 — Bạn không cần phải ăn kiêng để đủ gầy.","example":"你不必节食就已经够瘦的 了。"},{"hanzi":"舒服","pinyin":"shūfú","meaning":"Thoải mái Dễ chịu","type":"từ vựng","grammar":"爸爸，住在饭店里真舒服。 — Bố, thật sự rất thoải mái khi sống trong một nhà hàng.","example":"爸爸，住在饭店里真舒服。"},{"hanzi":"叔叔","pinyin":"shūshu","meaning":"Chú","type":"từ vựng","grammar":"的鼻梁上架着一副金边眼 镜，显得文质彬 彬，英俊潇洒。 — Với cặp kính gọng vàng trên sống mũi thanh tú, ông chú trông thật hiền lành và điển trai.","example":"的鼻梁上架着一副金边眼 镜，显得文质彬 彬，英俊潇洒。"},{"hanzi":"树","pinyin":"shù","meaning":"Cây","type":"từ vựng","grammar":"画中左边那棵树不合比例。 — Cây bên trái trong hình là không đúng tỷ lệ.","example":"画中左边那棵树不合比例。"},{"hanzi":"数学","pinyin":"shùxué","meaning":"Môn toán học","type":"từ vựng","grammar":"她在数学成绩最好的班上。 — Cô ấy học giỏi môn Toán nhất lớp.","example":"她在数学成绩最好的班上。"},{"hanzi":"刷牙","pinyin":"shuāyá","meaning":"Đánh răng","type":"từ vựng","grammar":"我们要养成天天刷牙漱口的良好习 惯。 — Chúng ta phải hình thành một thói quen tốt là đánh răng và súc miệng mỗi ngày.","example":"我们要养成天天刷牙漱口的良好习 惯。"},{"hanzi":"双","pinyin":"shuāng","meaning":"Đôi Đôi ….","type":"từ vựng","grammar":"你穿的两只袜子不是一双。 — Hai chiếc tất bạn mang không phải là một đôi.","example":"你穿的两只袜子不是一双。"},{"hanzi":"水平","pinyin":"shuǐpíng","meaning":"Trình độ","type":"từ vựng","grammar":"这个水平是渐近地逼近的。 — Mức này đang tiếp cận dần dần.","example":"这个水平是渐近地逼近的。"},{"hanzi":"司机","pinyin":"sījī","meaning":"Tài xế","type":"từ vựng","grammar":"司机启动车子沿大街开去。 — Tài xế khởi động xe chạy dọc phố.","example":"司机启动车子沿大街开去。"},{"hanzi":"虽然","pinyin":"suīrán","meaning":"Mặc dù","type":"từ vựng","grammar":"他们虽然穷，但很有骨气。 — Tuy nghèo nhưng họ rất có cốt cách.","example":"他们虽然穷，但很有骨气。"},{"hanzi":"太阳","pinyin":"tàiyáng","meaning":"Mặt trời","type":"từ vựng","grammar":"晨，我迎着初升的太阳去上学。 — Buổi sáng, tôi đến trường đối diện với mặt trời mọc.","example":"晨，我迎着初升的太阳去上学。"},{"hanzi":"糖","pinyin":"táng","meaning":"Đường","type":"từ vựng","grammar":"我急忙到邻居家去借些糖。 — Tôi vội sang nhà hàng xóm mượn ít đường.","example":"我急忙到邻居家去借些糖。"},{"hanzi":"特别","pinyin":"tèbié","meaning":"Đặc biệt","type":"từ vựng","grammar":"她的作品特别华丽而灵活。 — Các tác phẩm của cô ấy đặc biệt lộng lẫy và linh hoạt.","example":"她的作品特别华丽而灵活。"},{"hanzi":"疼","pinyin":"téng","meaning":"Đau","type":"từ vựng","grammar":"母亲对她和他都一样疼爱。 — Mẹ yêu cô ấy nhiều như anh ấy.","example":"母亲对她和他都一样疼爱。"},{"hanzi":"提高","pinyin":"tígāo","meaning":"Nâng cao","type":"từ vựng","grammar":"安全素质必须从娃娃抓起。 — Nâng cao sự an toàn của toàn dân phải bắt đầu từ em bé.","example":"安全素质必须从娃娃抓起。"},{"hanzi":"体育","pinyin":"tǐyù","meaning":"Thể dục","type":"từ vựng","grammar":"她不过是个体育教师而已。 — Cô ấy chỉ là một giáo viên dạy thể dục.","example":"她不过是个体育教师而已。"},{"hanzi":"甜","pinyin":"Tián","meaning":"Ngọt","type":"từ vựng","grammar":"他尝遍了人生的酸甜苦辣。 — Anh đã nếm trải những thăng trầm của cuộc đời.","example":"他尝遍了人生的酸甜苦辣。"},{"hanzi":"条","pinyin":"tiáo","meaning":"Dây, dải","type":"từ vựng","grammar":"这条船是作为游艇建造的。 — Chiếc thuyền này được đóng như một chiếc du thuyền.","example":"这条船是作为游艇建造的。"},{"hanzi":"同事","pinyin":"tóngshì","meaning":"Cộng sự Đồng nghiệp","type":"từ vựng","grammar":"他不顾同事的劝告辞了职。 — Anh từ chức bất chấp lời khuyên của các đồng nghiệp.","example":"他不顾同事的劝告辞了职。"},{"hanzi":"同意","pinyin":"tóngyì","meaning":"Đồng ý","type":"từ vựng","grammar":"绝不同意为了成功而不择手段，刻薄成家，理无久享。 — Đừng bao giờ đồng ý rằng muốn thành công thì phải lập gia thất, hưởng phúc lâu dài.","example":"绝不同意为了成功而不择手段，刻薄成家，理无久享。"},{"hanzi":"头发","pinyin":"tóufǎ","meaning":"Tóc","type":"từ vựng","grammar":"她那一头剪短了的头发乱蓬蓬的，像个孵蛋的母鸡尾 巴。 — Mái tóc cắt tỉa của cô ấy bù xù, giống như đuôi gà mái đang ấp trứng.","example":"她那一头剪短了的头发乱蓬蓬的，像个孵蛋的母鸡尾 巴。"},{"hanzi":"突然","pinyin":"túrán","meaning":"Đột nhiên, bất thình lình","type":"từ vựng","grammar":"你最好与前面的车保持相当的距离，以防它突然停下 来。 — Tốt hơn hết bạn nên giữ một khoảng cách đáng kể với xe phía trước đề phòng xe dừng đột ngột.","example":"你最好与前面的车保持相当的距离，以防它突然停下 来。"},{"hanzi":"图书馆","pinyin":"túshū guǎn","meaning":"Thư viện","type":"từ vựng","grammar":"世界上最壮丽的宫殿是藏书最多的图书馆。 — Cung điện tráng lệ nhất thế giới là thư viện có bộ sưu tập sách lớn nhất.","example":"世界上最壮丽的宫殿是藏书最多的图书馆。"},{"hanzi":"腿","pinyin":"tuǐ","meaning":"Đùi","type":"từ vựng","grammar":"我的两腿僵硬，行动不便。 — Chân tôi bị cứng và tôi không thể di chuyển dễ dàng.","example":"我的两腿僵硬，行动不便。"},{"hanzi":"完成","pinyin":"wánchéng","meaning":"Hoàn thành","type":"từ vựng","grammar":"业要当天完成，不容拖延。 — Bài tập trong ngày phải hoàn thành ngay trong ngày, không để chậm trễ.","example":"业要当天完成，不容拖延。"},{"hanzi":"碗","pinyin":"wǎn","meaning":"Bát","type":"từ vựng","grammar":"请把桌上的盘碗垫擦一下。 — Vui lòng lau thảm rửa chén trên bàn.","example":"请把桌上的盘碗垫擦一下。"},{"hanzi":"万","pinyin":"wàn","meaning":"Vạn","type":"từ vựng","grammar":"你一到那边，千万要来信。 — Khi bạn đến đó, ngàn vạn đừng gửi thư về.","example":"你一到那边，千万要来信。"},{"hanzi":"忘记","pinyin":"wàngjì","meaning":"Quên mất","type":"từ vựng","grammar":"她从不忘记每周给我写信。 — Cô ấy không bao giờ quên viết thư cho tôi mỗi tuần.","example":"她从不忘记每周给我写信。"},{"hanzi":"位","pinyin":"wèi","meaning":"Vị, ngài","type":"từ vựng","grammar":"我们这位客人要看轻你了。 — Khách của chúng tôi sẽ coi thường bạn.","example":"我们这位客人要看轻你了。"},{"hanzi":"为","pinyin":"wèi","meaning":"Vì, bởi vì, do","type":"từ vựng","grammar":"举国悼念为国死难的烈士。 — Cả nước thương tiếc các liệt sĩ đã hy sinh vì đất nước.","example":"举国悼念为国死难的烈士。"},{"hanzi":"为了","pinyin":"wèile","meaning":"Vì ….","type":"từ vựng","grammar":"我们是为了活命才打仗的。 — Chúng tôi đã chiến đấu để tồn tại.","example":"我们是为了活命才打仗的。"},{"hanzi":"文化","pinyin":"wénhuà","meaning":"Văn hóa","type":"từ vựng","grammar":"夜晚，江南文化园就更美 了！ — Về đêm, công viên văn hóa Giang Nam càng đẹp hơn!","example":"夜晚，江南文化园就更美 了！"},{"hanzi":"西","pinyin":"xī","meaning":"Tây","type":"từ vựng","grammar":"露西根本不愿听这样的话。 — Lucy không muốn nghe những lời như vậy chút nào.","example":"露西根本不愿听这样的话。"},{"hanzi":"习惯","pinyin":"Xíguàn","meaning":"Tập quán","type":"từ vựng","grammar":"所有的魅力在“习惯”面前都将无色。 — Mọi sự quyến rũ sẽ không màu khi đối mặt với “thói quen”.","example":"所有的魅力在“习惯”面前都将无色。"},{"hanzi":"洗手间","pinyin":"xǐshǒujiān","meaning":"Phòng rửa tay Nhà WC","type":"từ vựng","grammar":"只有坐在窗口的旅客才会起来上洗手间。 — Chỉ có những hành khách ngồi bên cửa sổ mới đứng dậy đi vệ sinh.","example":"只有坐在窗口的旅客才会起来上洗手间。"},{"hanzi":"洗澡","pinyin":"xǐzǎo","meaning":"Tắm rửa","type":"từ vựng","grammar":"他洗澡时想出了这个主意。 — Anh ấy nảy ra ý tưởng này khi đang tắm.","example":"他洗澡时想出了这个主意。"},{"hanzi":"喜欢","pinyin":"xǐhuān","meaning":"Thích","type":"từ vựng","grammar":"凌驾于他们之上。 — Tôi không thích ở trên họ.","example":"凌驾于他们之上。"},{"hanzi":"现","pinyin":"xiàn","meaning":"Hiện (nay)","type":"từ vựng","grammar":"我们现有的力量不能分散。 — Sức mạnh hiện có của chúng ta không thể bị phân tán.","example":"我们现有的力量不能分散。"},{"hanzi":"香蕉","pinyin":"xiāngjiāo","meaning":"Quả chuối","type":"từ vựng","grammar":"坚持每天做一件相同的事，很能锻炼我们，试试便知。 — Hãy kiên trì thực hiện cùng một việc hàng ngày, nó có thể rèn luyện sức khỏe cho chúng ta rất nhiều, hãy thử rồi biết.","example":"坚持每天做一件相同的事，很能锻炼我们，试试便知。"},{"hanzi":"相同","pinyin":"xiāngtóng","meaning":"Tương đồng","type":"từ vựng","grammar":"坚持每天做一件相同的事，很能锻炼我们，试试便知。 — Hãy kiên trì thực hiện cùng một việc hàng ngày, nó có thể rèn luyện sức khỏe cho chúng ta rất nhiều, hãy thử rồi biết.","example":"坚持每天做一件相同的事，很能锻炼我们，试试便知。"},{"hanzi":"相信","pinyin":"xiāngxìn","meaning":"Tin tưởng","type":"từ vựng","grammar":"他们相信电荷载体是质子。 — Họ tin rằng vật mang điện tích là proton.","example":"他们相信电荷载体是质子。"},{"hanzi":"像","pinyin":"xiàng","meaning":"Ảnh, tượng","type":"từ vựng","grammar":"她希望像水那般。 — Cô ấy hy vọng sẽ giống như nước.","example":"她希望像水那般。"},{"hanzi":"小心","pinyin":"xiǎoxīn","meaning":"Cẩn thận","type":"từ vựng","grammar":"我一辈子全靠谨慎小心，才躲过了许多奇灾异难。 — Tôi đã sống sót qua nhiều phép lạ và thảm họa trong suốt cuộc đời mình nhờ sự thận trọng.","example":"我一辈子全靠谨慎小心，才躲过了许多奇灾异难。"},{"hanzi":"校长","pinyin":"xiàozhǎng","meaning":"Hiệu trưởng","type":"từ vựng","grammar":"校长表彰了全优生和三好 生。 — Hiệu trưởng tuyên dương tất cả học sinh giỏi và ba học sinh giỏi.","example":"校长表彰了全优生和三好 生。"},{"hanzi":"鞋","pinyin":"xié","meaning":"Giày","type":"từ vựng","grammar":"她被一条树根绊住了雪鞋。 — Cô bị một gốc cây mắc vào móng tuyết.","example":"她被一条树根绊住了雪鞋。"},{"hanzi":"新闻","pinyin":"xīnwén","meaning":"Tin tức mới","type":"từ vựng","grammar":"新闻报道必须真 实，不许有半点虚假。 — Các bản tin phải đúng sự thật và không được phép sai sự thật.","example":"新闻报道必须真 实，不许有半点虚假。"},{"hanzi":"新鲜","pinyin":"xīnxiān","meaning":"Tươi mới","type":"từ vựng","grammar":"雨后，校园里的花开得格外新鲜。 — Sau cơn mưa, hoa trong khuôn viên trường nở rất tươi.","example":"雨后，校园里的花开得格外新鲜。"},{"hanzi":"信","pinyin":"xìn","meaning":"Tin","type":"từ vựng","grammar":"可用的冲突信息。 — Hiện tại không có thông tin xung đột có sẵn.","example":"可用的冲突信息。"},{"hanzi":"行李箱","pinyin":"xínglǐxiāng","meaning":"Hành lý vali","type":"từ vựng","grammar":"他无可奈何地插上钥匙，打开行李 箱。 — Anh miễn cưỡng tra chìa khóa và mở vali.","example":"他无可奈何地插上钥匙，打开行李 箱。"},{"hanzi":"兴趣","pinyin":"xìngqù","meaning":"Cảm hứng Hứng thú","type":"từ vựng","grammar":"我们对这一论题极感兴趣。 — Chúng tôi vô cùng quan tâm đến chủ đề này.","example":"我们对这一论题极感兴趣。"},{"hanzi":"熊猫","pinyin":"xióngmāo","meaning":"Gấu trúc","type":"từ vựng","grammar":"大熊猫身子胖，尾巴短，毛很光滑。 — Gấu trúc khổng lồ béo, có đuôi ngắn và lông mượt.","example":"大熊猫身子胖，尾巴短，毛很光滑。"},{"hanzi":"需要","pinyin":"xūyào","meaning":"Yêu cầu","type":"từ vựng","grammar":"当政客你需要一张厚脸皮。 — Bạn cần một sự táo bạo để trở thành một chính trị gia.","example":"当政客你需要一张厚脸皮。"},{"hanzi":"选择","pinyin":"xuǎnzé","meaning":"Chọn lựa","type":"từ vựng","grammar":"我们要做好人生的每一个选择。 — Chúng ta phải thực  hiện mọi lựa chọn trong cuộc sống.","example":"我们要做好人生的每一个选择。"},{"hanzi":"眼镜","pinyin":"yǎnjìng","meaning":"Mắt kính","type":"từ vựng","grammar":"眼镜后面的眼珠子突凸出 来。 — Nhãn cầu sau cặp kính lồi ra.","example":"眼镜后面的眼珠子突凸出 来。"},{"hanzi":"要求","pinyin":"yāoqiú","meaning":"Yêu cầu","type":"từ vựng","grammar":"此产品要求 8MB 存。 — Sản phẩm này yêu cầu RAM 8MB trở lên.","example":"此产品要求 8MB 存。"},{"hanzi":"爷爷","pinyin":"yéyé","meaning":"Ông nội","type":"từ vựng","grammar":"今天我上爷爷家去玩，爷爷给我捉了一只小 鸟。 — Hôm nay, tôi đến chơi nhà ông nội, và ông đã bắt được một con chim cho tôi.","example":"今天我上爷爷家去玩，爷爷给我捉了一只小 鸟。"},{"hanzi":"一定","pinyin":"yīdìng","meaning":"Nhất định","type":"từ vựng","grammar":"我们一定要得到这些东西。 — Chúng ta phải có được những thứ này.","example":"我们一定要得到这些东西。"},{"hanzi":"一共","pinyin":"yīgòng","meaning":"Tổng cộng","type":"từ vựng","grammar":"他先后一共当了十年校长。 — Anh ấy đã là hiệu trưởng được mười năm.","example":"他先后一共当了十年校长。"},{"hanzi":"一会儿","pinyin":"yīhuǐ’er","meaning":"Một lát nữa","type":"từ vựng","grammar":"金鱼一会儿浮在水面，一会 — Cá vàng nổi trên mặt nước một lúc, thả vào","example":"金鱼一会儿浮在水面，一会"},{"hanzi":"儿放在水中，一会儿沉在水底。","pinyin":"","meaning":"","type":"từ vựng","grammar":"","example":""},{"hanzi":"一样","pinyin":"yīyàng","meaning":"Như đúc, Giống nhau","type":"từ vựng","grammar":"我得到自由，就像鸟儿得到蓝天一 样！ — Tôi có được tự do, giống như một con chim được bầu trời xanh!","example":"我得到自由，就像鸟儿得到蓝天一 样！"},{"hanzi":"以后","pinyin":"yǐhòu","meaning":"Sau này","type":"từ vựng","grammar":"他死了以后，他太太疯了。 — Sau khi anh chết, vợ anh như phát điên.","example":"他死了以后，他太太疯了。"},{"hanzi":"以前","pinyin":"yǐqián","meaning":"Trước đây","type":"từ vựng","grammar":"我是从以前的立场后退了。 — Tôi rút lui khỏi vị trí cũ của mình.","example":"我是从以前的立场后退了。"},{"hanzi":"以为","pinyin":"yǐwéi","meaning":"Cho rằng (nhận định chủ quan, thường sẽ không đúng)","type":"từ vựng","grammar":"别人准以为我缺少家教呢。 — Mọi người phải nghĩ rằng tôi thiếu gia sư.","example":"别人准以为我缺少家教呢。"},{"hanzi":"一般","pinyin":"yībān","meaning":"Thông thường","type":"từ vựng","grammar":"水珠在海面上如同可爱的小精灵一 般，上下飞跃。 — Những giọt nước chồm lên nhảy xuống như một chú yêu tinh dễ thương trên biển.","example":"水珠在海面上如同可爱的小精灵一 般，上下飞跃。"},{"hanzi":"一边","pinyin":"yībiān","meaning":"Một bên","type":"từ vựng","grammar":"爷爷一边看着的考卷，一边表扬我。 — Ông nội khen tôi khi nhìn vào tờ giấy thi.","example":"爷爷一边看着的考卷，一边表扬我。"},{"hanzi":"一直","pinyin":"yīzhí","meaning":"Vẫn luôn","type":"từ vựng","grammar":"他多年来一直欺骗税收员。 — Anh ta đã lừa dối những người thu thuế trong nhiều năm.","example":"他多年来一直欺骗税收员。"},{"hanzi":"音乐","pinyin":"yīnyuè","meaning":"Âm nhạc","type":"từ vựng","grammar":"音乐就是我的生 命，感谢你们承认我的生 命。 — Âm nhạc là cuộc sống của tôi, cảm ơn bạn đã công nhận cuộc sống của tôi.","example":"音乐就是我的生 命，感谢你们承认我的生 命。"},{"hanzi":"银行","pinyin":"yínháng","meaning":"Ngân hàng","type":"từ vựng","grammar":"我的银行存款余额不多了。 — Số dư ngân hàng của tôi sắp hết.","example":"我的银行存款余额不多了。"},{"hanzi":"应该","pinyin":"yīnggāi","meaning":"Nên","type":"từ vựng","grammar":"他应该仔细考虑一段时间。 — Anh ấy nên suy nghĩ kỹ một lúc.","example":"他应该仔细考虑一段时间。"},{"hanzi":"影响","pinyin":"yǐngxiǎng","meaning":"Ảnh hưởng","type":"từ vựng","grammar":"的发生，应该看到这些事件对价格的影响正在逆转。 — Khi những điều này xảy ra, chúng ta sẽ thấy rằng tác động của những sự kiện này lên giá đang đảo ngược.","example":"的发生，应该看到这些事件对价格的影响正在逆转。"},{"hanzi":"用","pinyin":"yòng","meaning":"Dùng","type":"từ vựng","grammar":"1970 币。 — Năm 1970, Anh đã chuyển sang tiền tệ hệ mét.","example":"1970 币。"},{"hanzi":"游戏","pinyin":"yóuxì","meaning":"Trò chơi","type":"từ vựng","grammar":"这个游戏的难点就在这里。 — Khó khăn của trò chơi này là ở đây.","example":"这个游戏的难点就在这里。"},{"hanzi":"又","pinyin":"yòu","meaning":"Lại (lặp lại nhiều hơn 2 lần trở lên)","type":"từ vựng","grammar":"孩子们又活泼又漂亮，就像春天里的花蕾。 — Các em sinh động, xinh tươi như nụ hoa mùa xuân.","example":"孩子们又活泼又漂亮，就像春天里的花蕾。"},{"hanzi":"有名","pinyin":"yǒumíng","meaning":"Có danh, nổi danh","type":"từ vựng","grammar":"1492 年。 — Năm 1492 là một năm nổi tiếng trong lịch sử.","example":"1492 年。"},{"hanzi":"遇到","pinyin":"yù dào","meaning":"Gặp gỡ, gặp được","type":"từ vựng","grammar":"但愿我再也别遇到这类事。 — Tôi hy vọng mình sẽ không bao giờ gặp phải chuyện như thế này nữa.","example":"但愿我再也别遇到这类事。"},{"hanzi":"月亮","pinyin":"yuèliàng","meaning":"Mặt trăng","type":"từ vựng","grammar":"凝望夜 空，是否只见月亮和她的眼泪呢？ — Nhìn chằm chằm bầu trời đêm, bạn chỉ nhìn thấy trăng và nước mắt của cô ấy?","example":"凝望夜 空，是否只见月亮和她的眼泪呢？"},{"hanzi":"云","pinyin":"yún","meaning":"Mây","type":"từ vựng","grammar":"雨和雪通常都是来自雨云。 — Mưa và tuyết thường đến từ những đám mây mưa.","example":"雨和雪通常都是来自雨云。"},{"hanzi":"站","pinyin":"Zhàn","meaning":"Trạm, bến","type":"từ vựng","grammar":"我站在有风吹日晒的地方。 — Tôi đang đứng ở nơi có gió và nắng.","example":"我站在有风吹日晒的地方。"},{"hanzi":"长","pinyin":"zhǎng","meaning":"Dài","type":"từ vựng","grammar":"目录是一篇长文档的地图。 — Thư mục là một bản đồ của các tài liệu dài.","example":"目录是一篇长文档的地图。"},{"hanzi":"着急","pinyin":"zhāojí","meaning":"Gấp gáp, sốt ruột","type":"từ vựng","grammar":"看着弟弟着急的样子，他忽 — Thấy em trai vội vàng, anh chợt bật cười.","example":"看着弟弟着急的样子，他忽"},{"hanzi":"来。","pinyin":"","meaning":"","type":"từ vựng","grammar":"","example":""},{"hanzi":"照顾","pinyin":"zhàogù","meaning":"Chăm sóc","type":"từ vựng","grammar":"今晚请你照顾我的孩子们。 — Hãy chăm sóc các con của tôi đêm nay.","example":"今晚请你照顾我的孩子们。"},{"hanzi":"照片","pinyin":"zhàopiàn","meaning":"Ảnh","type":"từ vựng","grammar":"这几张照片具有独到之处。 — Những bức ảnh này là duy nhất.","example":"这几张照片具有独到之处。"},{"hanzi":"照相机","pinyin":"zhàoxiàngjī","meaning":"Máy ảnh","type":"từ vựng","grammar":"古有西门庆，今有陈冠希；小西见小希，亮出照相机。 — Thời xa xưa có Tây Môn Khánh và Edison Chen bây giờ; Tiểu Tây nhìn thấy Tiểu Hy và khoe máy ảnh của anh ấy.","example":"古有西门庆，今有陈冠希；小西见小希，亮出照相机。"},{"hanzi":"只","pinyin":"zhǐ","meaning":"Chỉ","type":"từ vựng","grammar":"那个小坏蛋还只有十九岁。 — Tên phản diện nhỏ đó mới mười chín tuổi.","example":"那个小坏蛋还只有十九岁。"},{"hanzi":"中间","pinyin":"Zhōngjiān","meaning":"Ở giữa","type":"từ vựng","grammar":"他在会议中间悄悄离开了。 — Anh lặng lẽ bỏ đi giữa cuộc họp.","example":"他在会议中间悄悄离开了。"},{"hanzi":"终于","pinyin":"zhōngyú","meaning":"Cuối cùng","type":"từ vựng","grammar":"运动会 上，我咬牙坚持，终于跑到了终点。 — Đến đại hội thể thao, tôi nghiến răng cố chấp, cuối cùng cũng chạy về đích.","example":"运动会 上，我咬牙坚持，终于跑到了终点。"},{"hanzi":"种","pinyin":"zhǒng","meaning":"Loại, chủng,","type":"từ vựng","grammar":"甚至总统亦否认此种谣传。 — Ngay cả tổng thống cũng phủ nhận những tin đồn như vậy.","example":"甚至总统亦否认此种谣传。"},{"hanzi":"重要","pinyin":"zhòngyào","meaning":"Quan trọng","type":"từ vựng","grammar":"今天的会很重要，请你务必按时参 加。 — Buổi họp hôm nay rất quan trọng, hãy nhớ đến tham dự đúng giờ.","example":"今天的会很重要，请你务必按时参 加。"},{"hanzi":"主要","pinyin":"zhǔyào","meaning":"Chủ yếu","type":"từ vựng","grammar":"它的主要缺点是无吸收性。 — Nhược điểm chính của nó là không thấm hút.","example":"它的主要缺点是无吸收性。"},{"hanzi":"周末","pinyin":"zhōumò","meaning":"Cuối tuần","type":"từ vựng","grammar":"一到周末我总是手头很紧。 — Tôi luôn luôn chặt tay vào cuối tuần.","example":"一到周末我总是手头很紧。"},{"hanzi":"祝","pinyin":"zhù","meaning":"Chúc","type":"từ vựng","grammar":"我们要给她开生日庆祝会。 — Chúng tôi sẽ tổ chức sinh nhật cho cô ấy.","example":"我们要给她开生日庆祝会。"},{"hanzi":"注意","pinyin":"zhùyì","meaning":"Chủ ý","type":"từ vựng","grammar":"注意听讲不要四处张望。 — Hãy cẩn thận không nhìn xung quanh khi bạn ở trong lớp.","example":"注意听讲不要四处张望。"},{"hanzi":"字典","pinyin":"zìdiǎn","meaning":"Tự điển","type":"từ vựng","grammar":"你当然可以用我的字典了。 — Tất nhiên bạn có thể sử dụng từ điển của tôi.","example":"你当然可以用我的字典了。"},{"hanzi":"自己","pinyin":"zìjǐ","meaning":"Bản thân","type":"từ vựng","grammar":"他吃力地签上自己的名字。 — Anh đấu tranh để ký tên của mình.","example":"他吃力地签上自己的名字。"},{"hanzi":"总是","pinyin":"zǒng shì","meaning":"Luôn luôn, lúc nào cũng","type":"từ vựng","grammar":"生活中总是有一些不开心的事，我们要笑着面对。 — Trong cuộc sống luôn có những điều không vui, và chúng ta phải mỉm cười đối mặt với chúng.","example":"生活中总是有一些不开心的事，我们要笑着面对。"},{"hanzi":"最近","pinyin":"zuìjìn","meaning":"Gần đây","type":"từ vựng","grammar":"最困苦的时候，往往是离成功最近的时候。 — Khoảng thời gian khó khăn nhất thường là lúc gần thành công nhất.","example":"最困苦的时候，往往是离成功最近的时候。"},{"hanzi":"作业","pinyin":"zuòyè","meaning":"Bài tập về nhà","type":"từ vựng","grammar":"交作业前一定要仔细检查。 — Nhớ kiểm tra kỹ trước khi giao bài.","example":"交作业前一定要仔细检查。"},{"hanzi":"作用","pinyin":"zuòyòng","meaning":"Tác dụng","type":"từ vựng","grammar":"环化作用本身是慢的一步。 — Bản thân chu trình là một bước chậm.","example":"环化作用本身是慢的一步。"}],"HSK 4":[{"hanzi":"爱情","pinyin":"àiqíng","meaning":"Tình yêu","type":"từ vựng","grammar":"在爱情的过程中，双方都要尽量努力。 — Trong tình yêu, đôi bên đều phải cố gắng hết mình.","example":"在爱情的过程中，双方都要尽量努力。"},{"hanzi":"安排","pinyin":"ānpái","meaning":"An bài","type":"từ vựng","grammar":"老师把明天的活动安排又重新讲了一遍。 — Cô giáo kể lại 1 lần lịch hoạt động ngày mai.","example":"老师把明天的活动安排又重新讲了一遍。"},{"hanzi":"安全","pinyin":"ānquán","meaning":"An toàn","type":"từ vựng","grammar":"我们注意安 全，避免发生事故。 — Các thầy cô giáo thường xuyên giáo dục chúng em chú ý an toàn, tránh tai nạn.","example":"我们注意安 全，避免发生事故。"},{"hanzi":"暗","pinyin":"àn","meaning":"Tối","type":"từ vựng","grammar":"明争暗斗 — Cấu xé lẫn nhau","example":"明争暗斗"},{"hanzi":"按时","pinyin":"ànshí","meaning":"Đúng giờ Chuẩn giờ","type":"từ vựng","grammar":"周末我要按时参加活动，不能陪你了。 — Tôi cần  tham gia các hoạt động đúng giờ vào cuối tuần nên không thể đi cùng bạn.","example":"周末我要按时参加活动，不能陪你了。"},{"hanzi":"按照","pinyin":"ànzhào","meaning":"Theo ….","type":"từ vựng","grammar":"按照学校的规定，我不能再迟到了。 — tuân theo quy định của trường, tôi không được lại đến muộn lần nữa.","example":"按照学校的规定，我不能再迟到了。"},{"hanzi":"包括","pinyin":"bāokuò","meaning":"Bao gồm","type":"từ vựng","grammar":"你说的价格包括保险费了 没？ — Giá của bạn có bao gồm phí bảo hiểm không?","example":"你说的价格包括保险费了 没？"},{"hanzi":"保护","pinyin":"bǎohù","meaning":"Bảo vệ Bảo hộ","type":"từ vựng","grammar":"你保护世界，我保护你。 — Bạn bảo vệ thế giới, tôi bảo vệ bạn.","example":"你保护世界，我保护你。"},{"hanzi":"抱","pinyin":"bào","meaning":"Ôm Bế Ẵm","type":"từ vựng","grammar":"左拥右抱 — Dùng để chỉ nhiều thê thiếp, trái ôm phải ấp","example":"左拥右抱"},{"hanzi":"抱歉","pinyin":"bàoqiàn","meaning":"Xin lỗi Thứ lỗi","type":"từ vựng","grammar":"打扰了教授的休息，他一再表示抱歉。 — Làm phiền vào việc nghỉ ngơi của giáo sư, anh ta liên tục xin lỗi.","example":"打扰了教授的休息，他一再表示抱歉。"},{"hanzi":"报道","pinyin":"bàodào","meaning":"Phóng sự","type":"từ vựng","grammar":"记者决定前往事发地，进行深入报道。 — Phóng viên quyết định đến tận nơi xảy ra vụ việc để phóng sự chuyên sâu.","example":"记者决定前往事发地，进行深入报道。"},{"hanzi":"报名","pinyin":"bàomíng","meaning":"Báo danh Báo tên","type":"từ vựng","grammar":"你到学校报名了没？ — Bạn đã báo danh tại trường học chưa?","example":"你到学校报名了没？"},{"hanzi":"倍","pinyin":"bèi","meaning":"Lần Bội","type":"từ vựng","grammar":"事倍功半 — Làm nhiều ăn ít","example":"事倍功半"},{"hanzi":"本来","pinyin":"běnlái","meaning":"Có lẽ, lẽ ra, đáng lẽ","type":"từ vựng","grammar":"这件事跟他本来没有任何关系 — Sự việc này  vốn dĩkhông liên quan gì đến anh taviệc này.","example":"这件事跟他本来没有任何关系"},{"hanzi":"笨","pinyin":"bèn","meaning":"Ngốc nghếch","type":"từ vựng","grammar":"太笨了你。 — Bạn quá ngốc rồi.","example":"太笨了你。"},{"hanzi":"笔记本","pinyin":"bǐjìběn","meaning":"Sổ tay","type":"từ vựng","grammar":"你准备笔记本了吗？ — Bạn đã chuẩn bị sổ tay chưa?","example":"你准备笔记本了吗？"},{"hanzi":"毕业","pinyin":"bìyè","meaning":"Tốt nghiệp","type":"từ vựng","grammar":"你毕业第几届？ — Bạn tốt nghiệp năm nào?","example":"你毕业第几届？"},{"hanzi":"遍","pinyin":"biàn","meaning":"Đoạn","type":"từ vựng","grammar":"请把这段话再读一遍。 — Vui lòng đọc lại đoạn văn này.","example":"请把这段话再读一遍。"},{"hanzi":"标准","pinyin":"biāozhǔn","meaning":"Tiêu chuẩn","type":"từ vựng","grammar":"很抱歉，你的产品太高档，超过我们的标准了。 — Xin lỗi, sản phẩm của bạn quá cao cấp và vượt qua yêu cầu của chúng tôi.","example":"很抱歉，你的产品太高档，超过我们的标准了。"},{"hanzi":"表达","pinyin":"biǎodá","meaning":"Biểu đạt Bày tỏ","type":"từ vựng","grammar":"双方代表首先讨论了会谈的程序。 — Đại diện của hai bên lần đầu tiên thảo luận về các thủ tục của cuộc hội đàm.","example":"双方代表首先讨论了会谈的程序。"},{"hanzi":"表格","pinyin":"biǎogé","meaning":"Bảng, biểu","type":"từ vựng","grammar":"（格）填好。 — Vui lòng điền vào biểu mẫu (biểu mẫu) này.","example":"（格）填好。"},{"hanzi":"表扬","pinyin":"biǎoyáng","meaning":"dương","type":"từ vựng","grammar":"王老师在台上表扬小李。 — Cô giáo Vương khen ngợi Tiểu Lí trên sân khấu.","example":"王老师在台上表扬小李。"},{"hanzi":"饼干","pinyin":"bǐnggān","meaning":"Bánh quy","type":"từ vựng","grammar":"我很喜欢吃饼干。 — Tôi rất thích ăn bánh quy..","example":"我很喜欢吃饼干。"},{"hanzi":"并且","pinyin":"bìngqiě","meaning":"Hơn nữa","type":"từ vựng","grammar":"一眨眼的时间你们就会长大并且离开。 — Trong nháy mắt,  mọi người sẽ lớn lên và rời đi.","example":"一眨眼的时间你们就会长大并且离开。"},{"hanzi":"博士","pinyin":"bóshì","meaning":"Tiến sĩ","type":"từ vựng","grammar":"小明考上了博士， — Tiểu Minh trúng tuyển tiến sĩ,","example":"小明考上了博士，"},{"hanzi":"不但","pinyin":"bù dànn","meaning":"Không những","type":"từ vựng","grammar":"她不但长得漂亮，而且还有好成绩。 — Cô ấy không chỉ xinh đẹp mà còn có thành tích cao.","example":"她不但长得漂亮，而且还有好成绩。"},{"hanzi":"不过","pinyin":"bùguò","meaning":"Chẳng qua, vừa mới, vừa chỉ","type":"từ vựng","grammar":"这只是不过是一件小事，你不用为了它而烦恼啊。 — Đây chỉ là một vấn đề nhỏ, bạn không phải lo lắng về nó.","example":"这只是不过是一件小事，你不用为了它而烦恼啊。"},{"hanzi":"不得不","pinyin":"bùdé bù","meaning":"Cần phải","type":"từ vựng","grammar":"作为一个好学生，你不得不听老师的话。 — Là một học sinh ngoan, bạn phải nghe lời giáo viên.","example":"作为一个好学生，你不得不听老师的话。"},{"hanzi":"不管","pinyin":"bùguǎn","meaning":"Mặc kệ, bỏ liều, bất chấp","type":"từ vựng","grammar":"不管白天还是黑夜，我都很努力达到最好的结果。 — Bất kể ngày hay đêm, tôi đều làm việc chăm chỉ để đạt được kết quả tốt nhất.","example":"不管白天还是黑夜，我都很努力达到最好的结果。"},{"hanzi":"不仅","pinyin":"bùjǐn","meaning":"Không chỉ","type":"từ vựng","grammar":"不仅是外貌之美，你还要又美德之善。 — Không chỉ có vẻ đẹp ngoại hình mà còn phải có phẩm hạnh.","example":"不仅是外貌之美，你还要又美德之善。"},{"hanzi":"部分","pinyin":"bùfèn","meaning":"Bộ phận","type":"từ vựng","grammar":"这个产品可以分为三个部 分。 — Sản phẩm này có thể được chia thành ba phần.","example":"这个产品可以分为三个部 分。"},{"hanzi":"擦","pinyin":"cā","meaning":"Sờ","type":"từ vựng","grammar":"哭眼擦泪 — Lấy nước mắt lau nước mắt","example":"哭眼擦泪"},{"hanzi":"猜","pinyin":"cāi","meaning":"Đoán","type":"từ vựng","grammar":"两小无猜 — Hai nhỏ vô tư","example":"两小无猜"},{"hanzi":"材料","pinyin":"cáiliào","meaning":"Tài liệu","type":"từ vựng","grammar":"你先把材料回家读一遍然后再说吧。 — Đầu tiên bạn đọc lại tài liệu rồi sau đó ta lại nói về nó.","example":"你先把材料回家读一遍然后再说吧。"},{"hanzi":"参观","pinyin":"cānguān","meaning":"Tham quan","type":"từ vựng","grammar":"明天我会带你去参观。 — Ngày mai anh đưa em đi thăm quan.","example":"明天我会带你去参观。"},{"hanzi":"差不多","pinyin":"chàbùduō","meaning":"Bình thường","type":"từ vựng","grammar":"童年那些大大小小的事情我差不多都忘得干干净净的 了。 — Tôi gần như quên hết những việc lớn nhỏ trong thời thơ ấu của mình.","example":"童年那些大大小小的事情我差不多都忘得干干净净的 了。"},{"hanzi":"尝","pinyin":"cháng","meaning":"Nếm","type":"từ vựng","grammar":"请你尝尝这个菜，然后给我评价。 — Mời bạn nếm thử món ăn này và cho tôi nhận xét nhé.","example":"请你尝尝这个菜，然后给我评价。"},{"hanzi":"长城","pinyin":"chángchéng","meaning":"Trường Thành","type":"từ vựng","grammar":"我想去参观万里长城。 — Tôi muốn đến thăm Vạn Lý Trường Thành.","example":"我想去参观万里长城。"},{"hanzi":"长江","pinyin":"chángjiāng","meaning":"Trường Giang","type":"từ vựng","grammar":"长江是中国最大的河流。 — Sông  Trường Giang là con sông lớn nhất ở Trung Quốc.","example":"长江是中国最大的河流。"},{"hanzi":"场","pinyin":"chǎng","meaning":"Trận","type":"từ vựng","grammar":"我们一起玩一场足球吧。 — Chúng tacùng chơi một trấn bóng đá đi","example":"我们一起玩一场足球吧。"},{"hanzi":"超过","pinyin":"chāoguò","meaning":"Vượt qua","type":"từ vựng","grammar":"你的能力已经超过我们的想象了。 — Khả năng của bạn đã vượt quá sức tưởng tượng của chúng tôi.","example":"你的能力已经超过我们的想象了。"},{"hanzi":"吵","pinyin":"chǎo","meaning":"Cãi nhau","type":"từ vựng","grammar":"吧，，太闹 了，麻烦我学习。 — Thôi cãi nhau đi, ồn ào quá, khó học lắm.","example":"吧，，太闹 了，麻烦我学习。"},{"hanzi":"成功","pinyin":"chénggōng","meaning":"Thành công","type":"từ vựng","grammar":"失败是成功之母。 — Thất bại là mẹ thành công.","example":"失败是成功之母。"},{"hanzi":"成熟","pinyin":"chéngshú","meaning":"Thành thục Trưởng thành Chín chắn","type":"từ vựng","grammar":"一个人只有经过千锤百炼才能成熟起来。 — Một người chỉ có thể trưởng thành sau hàng ngàn lần thử thách.","example":"一个人只有经过千锤百炼才能成熟起来。"},{"hanzi":"诚实","pinyin":"chéngshí","meaning":"Thành thực Thật thà","type":"từ vựng","grammar":"他是一个很单纯，很诚实的人。 — Anh ấy là một người rất đơn giản và trung thực.","example":"他是一个很单纯，很诚实的人。"},{"hanzi":"成为","pinyin":"chéngwéi","meaning":"Trở thành","type":"từ vựng","grammar":"我想成为一名歌手。 — Tôi muốn trở thành ca sĩ.","example":"我想成为一名歌手。"},{"hanzi":"乘坐","pinyin":"chéngzuò","meaning":"hỏa, …)","type":"từ vựng","grammar":"乘坐民航班 机，我们都十分安全的感 觉。 — Tất cả chúng tôi đều cảm thấy rất an toàn khi đi máy bay dân dụng.","example":"乘坐民航班 机，我们都十分安全的感 觉。"},{"hanzi":"吃惊","pinyin":"chījīng","meaning":"Kinh ngạc Giật mình Hoảng hốt","type":"từ vựng","grammar":"总而言之，他考试不及格并没使我吃惊。 — Nói chung, việc anh ấy thất bại trong kỳ thi không làm tôi ngạc nhiên.","example":"总而言之，他考试不及格并没使我吃惊。"},{"hanzi":"重新","pinyin":"chóngxīn","meaning":"Làm mới","type":"từ vựng","grammar":"你重新再做一次吧。 — Bạn có thể làm lại 1 lần.","example":"你重新再做一次吧。"},{"hanzi":"抽烟","pinyin":"chōuyān","meaning":"Hút thuốc","type":"từ vựng","grammar":"抽烟对身体有害。 — Hút thuốc có hại cho cơ thể.","example":"抽烟对身体有害。"},{"hanzi":"出差","pinyin":"chūchāi","meaning":"Công tác","type":"từ vựng","grammar":"我今月十五号五去北京出 差。 — Tôi đi công tác tại Bắc Kinh vào ngày 15 và 5 tháng này.","example":"我今月十五号五去北京出 差。"},{"hanzi":"出发","pinyin":"chūfā","meaning":"xuất phát","type":"từ vựng","grammar":"我们在学校大门口出发。 — Chúng tôi lên đường đến cổng trường.","example":"我们在学校大门口出发。"},{"hanzi":"出生","pinyin":"chūshēng","meaning":"Ra đời","type":"từ vựng","grammar":"孔子出生于公元前 年。 — Khổng Tử sinh năm 551 trước Công nguyên.","example":"孔子出生于公元前 年。"},{"hanzi":"传真","pinyin":"chuánzhēn","meaning":"Fax","type":"từ vựng","grammar":"你把材料传真发给我吧。 — Bạn có thể fax tài liệu cho tôi.","example":"你把材料传真发给我吧。"},{"hanzi":"窗户","pinyin":"chuānghù","meaning":"Cửa sổ","type":"từ vựng","grammar":"很多对联。 — Có rất nhiều câu đối trên cửa sổ.","example":"很多对联。"},{"hanzi":"词典","pinyin":"cídiǎn","meaning":"Từ điển","type":"từ vựng","grammar":"遇到不知道的汉字，可以查查词典。 — Gặp những từ nào mà bạn không biết thì có thể tra từ điển","example":"遇到不知道的汉字，可以查查词典。"},{"hanzi":"从来","pinyin":"cónglái","meaning":"Từ trước tới nay","type":"từ vựng","grammar":"她从来没来到这里。 — Cô ấy chưa bao giờ đến đây.","example":"她从来没来到这里。"},{"hanzi":"粗心","pinyin":"cūxīn","meaning":"Thờ ơ","type":"từ vựng","grammar":"我有点粗心 了，希望你原谅我。 — Tôi hơi bất cẩn, mong bạn thứ lỗi.","example":"我有点粗心 了，希望你原谅我。"},{"hanzi":"答案","pinyin":"dá’àn","meaning":"Đáp án","type":"từ vựng","grammar":"这是我的答案。 — Đây là câu trả lời của tôi.","example":"这是我的答案。"},{"hanzi":"打扮","pinyin":"dǎ bàn","meaning":"Trang điểm Ăn vận","type":"từ vựng","grammar":"你去哪呀？今天打扮这么漂亮。 — Bạn đi đâu? Hôm nay mặc đẹp quá.","example":"你去哪呀？今天打扮这么漂亮。"},{"hanzi":"打扰","pinyin":"dǎrǎo","meaning":"Làm phiền","type":"từ vựng","grammar":"今天太打扰你了。 — Hôm nay em làm phiền anh nhiều quá.","example":"今天太打扰你了。"},{"hanzi":"打印","pinyin":"dǎyìn","meaning":"In ấn","type":"từ vựng","grammar":"你可以帮我把这个材料打印一部吗？ — Bạn có thể in một bản sao của tài liệu này cho tôi?","example":"你可以帮我把这个材料打印一部吗？"},{"hanzi":"打折","pinyin":"dǎzhé","meaning":"Giảm giá","type":"từ vựng","grammar":"这个产品打不打折？ — Sản phẩm này có giảm giá không?","example":"这个产品打不打折？"},{"hanzi":"打针","pinyin":"dǎzhēn","meaning":"Châm cứu","type":"từ vựng","grammar":"我最害怕打 针，可以用其他药品吗？ — Tôi sợ nhất là tiêm, có thể dùng thuốc khác được không?","example":"我最害怕打 针，可以用其他药品吗？"},{"hanzi":"大概","pinyin":"dàgài","meaning":"Khoảng Tầm","type":"từ vựng","grammar":"85 我 80 块钱吧！ — Tổng của bạn khoảng 85 tệ, đưa tôi 80 tệ!","example":"85 我 80 块钱吧！"},{"hanzi":"大使馆","pinyin":"dàshǐ guǎn","meaning":"Đại sứ quản","type":"từ vựng","grammar":"想办移民手 续，你一定要到大使馆。 — Để làm thủ tục nhập cảnh, bạn phải đến đại sứ quán.","example":"想办移民手 续，你一定要到大使馆。"},{"hanzi":"代表","pinyin":"dàibiǎo","meaning":"Đại biểu","type":"từ vựng","grammar":"我代表公司来接待您。 — Tôi ở đây để tiếp bạn thay mặt cho công ty.","example":"我代表公司来接待您。"},{"hanzi":"代替","pinyin":"dàitì","meaning":"Thay thế","type":"từ vựng","grammar":"我代替王经理参加这次会 议。 — Tôi sẽ tham dự cuộc họp này thay mặt cho Giám đốc Vương.","example":"我代替王经理参加这次会 议。"},{"hanzi":"大夫","pinyin":"dàfū","meaning":"Có thể dùng để chỉ: tri thức","type":"từ vựng","grammar":"大夫，我身体不舒服! — Bác sĩ, tôi không được khỏe!","example":"大夫，我身体不舒服!"},{"hanzi":"当","pinyin":"dāng","meaning":"Đang Đương","type":"từ vựng","grammar":"我妈妈当老 师，爸爸当律师。 — Mẹ tôi là giáo viên và bố tôi là luật sư.","example":"我妈妈当老 师，爸爸当律师。"},{"hanzi":"当地","pinyin":"dāng dì","meaning":"Bản địa Bản xứ","type":"từ vựng","grammar":"他是当地人，他的方言有点难懂 — Anh ấy là người địa phương và nói tiếng địa phương nên hơi khó nghe.","example":"他是当地人，他的方言有点难懂"},{"hanzi":"当时","pinyin":"dāngshí","meaning":"Đương thời Lúc đó","type":"từ vựng","grammar":"他当时为了不听话而失败 了。 — Anh ta đã thất bại vì không vâng lời.","example":"他当时为了不听话而失败 了。"},{"hanzi":"刀","pinyin":"dāo","meaning":"Dao","type":"từ vựng","grammar":"一刀两断 — Dùng để chỉ dứt khoát","example":"一刀两断"},{"hanzi":"导游","pinyin":"dǎoyóu","meaning":"Hướng dẫn viên du lịch","type":"từ vựng","grammar":"我是你们的导游，有任何事情请联系我，谢谢。 — Tôi là hướng dẫn viên du lịch của bạn, vui lòng liên hệ với tôi nếu bạn có bất cứ vấn đề gì, cảm ơn bạn.","example":"我是你们的导游，有任何事情请联系我，谢谢。"},{"hanzi":"到处","pinyin":"dàochù","meaning":"Khắp nơi","type":"từ vựng","grammar":"我到处找也找不到我失去的东西。 — Tôi đã tìm khắp nơi và không thể tìm thấy thứ tôi đã mất.","example":"我到处找也找不到我失去的东西。"},{"hanzi":"到底","pinyin":"dàodǐ","meaning":"Rốt cục Đến cùng","type":"từ vựng","grammar":"你到底想干什么呢？ — Bạn muốn làm gì?","example":"你到底想干什么呢？"},{"hanzi":"道歉","pinyin":"dàoqiàn","meaning":"Xin lỗi Thứ lỗi","type":"từ vựng","grammar":"我今天想想你说一句：“道歉”。 — tôi nghĩ về những gì bạn đã nói hôm nay: “Xin lỗi.”","example":"我今天想想你说一句：“道歉”。"},{"hanzi":"得意","pinyin":"déyì","meaning":"Đắc ý","type":"từ vựng","grammar":"她很得意看到小王被老师批评。 — Cô rất đắc ý khi thấy Tiểu Vương bị giáo viên phê bình.","example":"她很得意看到小王被老师批评。"},{"hanzi":"得","pinyin":"dé","meaning":"Đắc","type":"từ vựng","grammar":"她唱歌唱得好听。 — Cô ấy hát hay.","example":"她唱歌唱得好听。"},{"hanzi":"等","pinyin":"děng","meaning":"Đợi","type":"từ vựng","grammar":"我在等回去。 — Tôi đang đợi để quay trở lại.","example":"我在等回去。"},{"hanzi":"低","pinyin":"dì","meaning":"Thấp","type":"từ vựng","grammar":"飞机低将绕场一周。 — Máy bay sẽ thực hiện một vòng tròn quanh sân.","example":"飞机低将绕场一周。"},{"hanzi":"地球","pinyin":"dìqiú","meaning":"Địa cầu","type":"từ vựng","grammar":"地球上的阳光和温暖都是太阳送来的。 — Anh nắng và hơi ấm trên trái đất là do mặt trời gửi đến.","example":"地球上的阳光和温暖都是太阳送来的。"},{"hanzi":"地址","pinyin":"dìzhǐ","meaning":"Địa chỉ","type":"từ vựng","grammar":"你把自己的地址写清楚在这儿吧。 — Vui lòng ghi rõ địa chỉ của bạn ở đây.","example":"你把自己的地址写清楚在这儿吧。"},{"hanzi":"掉","pinyin":"diào","meaning":"Rơi, hạ, giảm","type":"từ vựng","grammar":"我把项链弄掉了。 — Tôi đánh rơi sợi dây chuyền.","example":"我把项链弄掉了。"},{"hanzi":"调查","pinyin":"diàochá","meaning":"Điều tra","type":"từ vựng","grammar":"我在做一个调查圈。 — Tôi đang thực hiện một vòng khảo sát.","example":"我在做一个调查圈。"},{"hanzi":"丢","pinyin":"diū","meaning":"Mất","type":"từ vựng","grammar":"真太丢脸。 — Xấu hổ làm sao.","example":"真太丢脸。"},{"hanzi":"动作","pinyin":"dòngzuò","meaning":"Động tác","type":"từ vựng","grammar":"你的动作太慢了，快了点。 — Động tác của bạn quá chậm, nhanh lên.","example":"你的动作太慢了，快了点。"},{"hanzi":"堵车","pinyin":"dǔchē","meaning":"Tắc đường","type":"từ vựng","grammar":"对不起老师，因为堵车，我又迟到了。 — Xin lỗi thầy, em lại đến trễ vì tắc đường.","example":"对不起老师，因为堵车，我又迟到了。"},{"hanzi":"肚子","pinyin":"dùzi","meaning":"Bụng","type":"từ vựng","grammar":"我的肚子有点疼。 — bụng tôi hơi đau.","example":"我的肚子有点疼。"},{"hanzi":"断","pinyin":"duàn","meaning":"Đứt","type":"từ vựng","grammar":"恩断义绝 — Đoạn tuyệt ân nghĩa","example":"恩断义绝"},{"hanzi":"对话","pinyin":"duìhuà","meaning":"Đối thoại","type":"từ vựng","grammar":"他们两的对话太简单了。 — Cuộc nói chuyện giữa hai người họ quá đơn giản.","example":"他们两的对话太简单了。"},{"hanzi":"对面","pinyin":"duìmiàn","meaning":"Đối mặt Đối diện","type":"từ vựng","grammar":"我很怕跟老王面对面。 — Tôi sợ phải đối mặt với Lão Vương.","example":"我很怕跟老王面对面。"},{"hanzi":"顿","pinyin":"dùn","meaning":"Bữa Ngừng","type":"từ vựng","grammar":"明天有空吗，跟我一起去吃饭吧。 — Mai bạn có rảnh không? Mình đi ăn tối với bạn nhé.","example":"明天有空吗，跟我一起去吃饭吧。"},{"hanzi":"朵","pinyin":"duǒ","meaning":"Đóa","type":"từ vựng","grammar":"爸爸送妈妈一朵玫瑰花。 — Bố tặng mẹ một  đóa hồng","example":"爸爸送妈妈一朵玫瑰花。"},{"hanzi":"而","pinyin":"ér","meaning":"Mà","type":"từ vựng","grammar":"一扫而空 — Sạch sẽ triệt để","example":"一扫而空"},{"hanzi":"儿童","pinyin":"értóng","meaning":"Nhi đồng","type":"từ vựng","grammar":"“六一”是儿童节。 — “1 tháng 6” là Ngày của Trẻ em.","example":"“六一”是儿童节。"},{"hanzi":"Trẻ em","pinyin":"","meaning":"","type":"từ vựng","grammar":"","example":""},{"hanzi":"发","pinyin":"fā","meaning":"Phát","type":"từ vựng","grammar":"百发百中 — Bách phát bách trúng","example":"百发百中"},{"hanzi":"发生","pinyin":"fāshēng","meaning":"Xảy ra","type":"từ vựng","grammar":"今天发生什么事呢？ — Hôm nay có chuyện gì vậy?","example":"今天发生什么事呢？"},{"hanzi":"发展","pinyin":"fāzhǎn","meaning":"Phát triển","type":"từ vựng","grammar":"大力发展经 济，不断增强国防实力。 — Phát triển mạnh mẽ nền kinh tế và không ngừng nâng cao khả năng bảo vệ Tổ quốc.","example":"大力发展经 济，不断增强国防实力。"},{"hanzi":"法律","pinyin":"fǎlǜ","meaning":"Pháp luật","type":"từ vựng","grammar":"不管谁触犯了法律，都将受到制载。 — Bất kể ai vi phạm pháp luật, anh ta sẽ bị kiềm chế.","example":"不管谁触犯了法律，都将受到制载。"},{"hanzi":"翻译","pinyin":"fānyì","meaning":"Phiên dịch","type":"từ vựng","grammar":"我的梦想是成为一名翻译。 — Ước mơ của tôi là trở thành một phiên dịch.","example":"我的梦想是成为一名翻译。"},{"hanzi":"烦恼","pinyin":"fánnǎo","meaning":"Phiền não Buồn phiền","type":"từ vựng","grammar":"我有太多的烦恼了。 — Tôi có quá nhiều rắc rối.","example":"我有太多的烦恼了。"},{"hanzi":"反对","pinyin":"fǎnduì","meaning":"Phản đối","type":"từ vựng","grammar":"家庭反对我到国 ch 出留学去。 — Gia đình phản đối tôi đi du học.","example":"家庭反对我到国 ch 出留学去。"},{"hanzi":"反应","pinyin":"fǎnyìng","meaning":"Phản ứng","type":"từ vựng","grammar":"他的反应怎么样，惊喜还是害怕？ — Phản ứng của anh ấy như thế nào, ngạc nhiên hay sợ hãi","example":"他的反应怎么样，惊喜还是害怕？"},{"hanzi":"范围","pinyin":"fànwéi","meaning":"Phạm vi","type":"từ vựng","grammar":"你一定要在我范围面前。","example":"你一定要在我范围面前。"},{"hanzi":"方法","pinyin":"fāngfǎ","meaning":"Phương pháp","type":"từ vựng","grammar":"我找不到方法解决这个问 题。 — Tôi không thể tìm ra cách để giải quyết vấn đề này.","example":"我找不到方法解决这个问 题。"},{"hanzi":"方面","pinyin":"fāngmiàn","meaning":"Phương diện","type":"từ vựng","grammar":"在这方面上，我就是很清 楚。 — Về vấn đề này, tôi rất rõ ràng.","example":"在这方面上，我就是很清 楚。"},{"hanzi":"方向","pinyin":"fāngxiàng","meaning":"Phương hướng","type":"từ vựng","grammar":"我找不到方向了。 — Tôi không thể tìm ra phương hướng.","example":"我找不到方向了。"},{"hanzi":"访问","pinyin":"fǎngwèn","meaning":"Viếng thăm Thăm hỏi","type":"từ vựng","grammar":"中国的主席访问越南。 — Chủ tịch Trung Quốc thăm hỏi Việt Nam.","example":"中国的主席访问越南。"},{"hanzi":"放弃","pinyin":"fàngqì","meaning":"Vứt bỏ Từ bỏ","type":"từ vựng","grammar":"有，你去劝劝他吧。 — Anh ấy muốn từ bỏ mọi thứ, đi thuyết phục anh ấy.","example":"有，你去劝劝他吧。"},{"hanzi":"放暑假","pinyin":"fàng shǔjià","meaning":"Nghỉ hè","type":"từ vựng","grammar":"你什么时候放暑假呢？ — Bạn khi nào nghỉ hè","example":"你什么时候放暑假呢？"},{"hanzi":"…分之….","pinyin":"… fēn zhī….","meaning":"","type":"từ vựng","grammar":"百分之。。。千分之。。。 — phần trăm. . . phần nghìn. . .","example":"百分之。。。千分之。。。"},{"hanzi":"份","pinyin":"fèn","meaning":"Phần","type":"từ vựng","grammar":"你可以帮我买一份面条吗？ — Bạn có thể mua cho tôi một phần mì?","example":"你可以帮我买一份面条吗？"},{"hanzi":"丰富","pinyin":"fēngfù","meaning":"Phong phú","type":"từ vựng","grammar":"你的想象力很丰富。 — Trí tưởng tượng của bạn rất phong phú.","example":"你的想象力很丰富。"},{"hanzi":"风景","pinyin":"fēngjǐng","meaning":"Phong cảnh","type":"từ vựng","grammar":"这里的风情真美丽。 — Phong cảnh ở đây thật đẹp.","example":"这里的风情真美丽。"},{"hanzi":"否则","pinyin":"fǒuzé","meaning":"Nếu không thì Bằng không Nếu không","type":"từ vựng","grammar":"首先要把场地清理好，否
