// ===== STATE =====
const state = {
  currentLevel: null,
  currentIndex: 0,
  currentMode: 'quiz',
  answers: {},       // { index: { correct: bool, attempts: number } }
  correct: 0,
  total: 0,
  streak: 0,
  flipped: false,
  maxAttempts: 3,
};

// ===== INIT =====
function init() {
  state.currentLevel = Object.keys(DATA)[0];
  state.currentIndex = 0;
  renderLevelTabs();
  renderContent();
  updateStats();
}

// ===== LEVEL TABS =====
function renderLevelTabs() {
  const tabs = document.getElementById('levelTabs');
  tabs.innerHTML = '';
  Object.keys(DATA).forEach(level => {
    const tab = document.createElement('button');
    tab.className = 'level-tab' + (level === state.currentLevel ? ' active' : '');
    tab.textContent = level + ' (' + DATA[level].length + ')';
    tab.addEventListener('click', () => {
      state.currentLevel = level;
      state.currentIndex = 0;
      state.answers = {};
      state.flipped = false;
      renderLevelTabs();
      renderContent();
      updateStats();
    });
    tabs.appendChild(tab);
  });
}

// ===== MODE TOGGLE =====
document.getElementById('modeToggle').addEventListener('click', e => {
  if (!e.target.dataset.mode) return;
  state.currentMode = e.target.dataset.mode;
  state.flipped = false;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderContent();
});

// ===== GET ITEMS =====
function getItems() {
  return DATA[state.currentLevel] || [];
}

// ===== RENDER CONTENT =====
function renderContent() {
  const items = getItems();
  const content = document.getElementById('content');
  if (!items.length) {
    content.innerHTML = '<div class="card" style="text-align:center;color:var(--text-light)">Chưa có dữ liệu</div>';
    return;
  }
  if (state.currentMode === 'quiz') renderQuiz(items);
  else if (state.currentMode === 'flashcard') renderFlashcard(items);
  else renderList(items);
  updateProgress();
}

// ===== QUIZ =====
function renderQuiz(items) {
  const idx = state.currentIndex;
  const item = items[idx];
  if (!item) return;

  const answered = state.answers[idx];
  const types = ['meaning', 'hanzi', 'pinyin'];
  const qType = types[idx % 3];
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correctVal = item[field];

  // Build question display
  let questionHTML = '';
  if (qType === 'meaning') {
    questionHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div>' +
                   '<div class="pinyin">' + esc(item.pinyin) + '</div>' +
                   '<div class="question">Chọn nghĩa tiếng Việt đúng:</div>';
  } else if (qType === 'hanzi') {
    questionHTML = '<div class="question" style="font-size:1.2rem">' + esc(item.meaning) + '</div>' +
                   '<div class="pinyin">' + esc(item.pinyin) + '</div>' +
                   '<div class="question">Chọn chữ Hán đúng:</div>';
  } else {
    questionHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div>' +
                   '<div class="question">' + esc(item.meaning) + '</div>' +
                   '<div class="question">Chọn pinyin đúng:</div>';
  }

  // Build options
  let wrongs = items.filter(x => x[field] !== correctVal).map(x => x[field]).filter(Boolean);
  wrongs = [...new Set(wrongs)]; // deduplicate
  const picked = shuffle(wrongs).slice(0, 3);
  const options = shuffle([correctVal, ...picked]);

  const isDone = answered && answered.correct;
  const attempts = answered ? answered.attempts : 0;

  let optionsHTML = options.map(opt => {
    let cls = 'option';
    if (isDone) {
      if (opt === correctVal) cls += ' correct';
      cls += ' disabled';
    } else if (answered && answered.lastWrong === opt) {
      cls += ' wrong disabled';
    }
    return '<div class="' + cls + '" data-value="' + esc(opt) + '">' + esc(opt) + '</div>';
  }).join('');

  // Attempts left
  let attemptsHTML = '';
  if (!isDone) {
    const left = state.maxAttempts - attempts;
    attemptsHTML = '<div class="attempts">Còn <span>' + left + '</span> lần thử</div>';
  }

  // Feedback
  let fbHTML = '';
  if (isDone) {
    fbHTML = '<div class="feedback correct show">Chính xác!</div>';
  } else if (answered && !answered.correct && attempts >= state.maxAttempts) {
    fbHTML = '<div class="feedback wrong show">Sai rồi! Đáp án đúng: ' + esc(correctVal) + '</div>';
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = questionHTML +
    '<div class="options" id="options">' + optionsHTML + '</div>' +
    attemptsHTML +
    '<div id="feedbackArea">' + fbHTML + '</div>';

  document.getElementById('content').innerHTML = '';
  document.getElementById('content').appendChild(card);

  // Click handler
  if (!isDone) {
    card.querySelectorAll('.option:not(.disabled)').forEach(opt => {
      opt.addEventListener('click', () => handleOptionClick(opt, item, qType, items));
    });
  }

  updateNavButtons(items);
}

function handleOptionClick(optEl, item, qType, items) {
  const idx = state.currentIndex;
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correctVal = item[field];
  const selected = optEl.dataset.value;

  if (!state.answers[idx]) {
    state.answers[idx] = { attempts: 0, correct: false, lastWrong: null };
  }
  const ans = state.answers[idx];

  if (selected === correctVal) {
    // Correct!
    ans.correct = true;
    ans.attempts++;
    state.correct++;
    state.streak++;
    optEl.classList.add('correct');
    document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
    document.getElementById('feedbackArea').innerHTML = '<div class="feedback correct show">Chính xác!</div>';
    document.querySelector('.attempts')?.remove();
    updateStats();
    // Auto next after 1s
    setTimeout(() => { if (state.currentIndex < getItems().length - 1) { state.currentIndex++; renderContent(); } }, 1200);
  } else {
    // Wrong
    ans.attempts++;
    ans.lastWrong = selected;
    state.streak = 0;
    optEl.classList.add('wrong', 'disabled');
    updateStats();

    if (ans.attempts >= state.maxAttempts) {
      // Out of attempts - show correct answer and auto-skip
      document.querySelectorAll('.option').forEach(o => {
        if (o.dataset.value === correctVal) o.classList.add('correct');
        o.classList.add('disabled');
      });
      document.querySelector('.attempts')?.remove();
      document.getElementById('feedbackArea').innerHTML = '<div class="feedback wrong show">Sai rồi! Đáp án đúng: ' + esc(correctVal) + '</div>';
      // Auto next after 2s
      setTimeout(() => { if (state.currentIndex < getItems().length - 1) { state.currentIndex++; renderContent(); } }, 2200);
    } else {
      // Still have attempts - re-render to show remaining
      renderQuiz(items);
    }
  }
}

// ===== FLASHCARD =====
function renderFlashcard(items) {
  const item = items[state.currentIndex];
  const content = document.getElementById('content');
  content.innerHTML =
    '<div class="flashcard-wrap ' + (state.flipped ? 'flipped' : '') + '" id="flashcard">' +
      '<div class="flashcard-inner">' +
        '<div class="flashcard-front">' +
          '<div class="hanzi">' + esc(item.hanzi) + '</div>' +
          '<div class="flip-hint">Nhấn để lật</div>' +
        '</div>' +
        '<div class="flashcard-back">' +
          '<div class="info">' +
            '<div class="pinyin">' + esc(item.pinyin) + '</div>' +
            '<div class="meaning">' + esc(item.meaning) + '</div>' +
            (item.grammar ? '<div style="margin-top:8px;font-size:.75rem;color:var(--text-light)">' + esc(item.grammar) + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('flashcard').addEventListener('click', () => {
    state.flipped = !state.flipped;
    renderContent();
  });
  updateNavButtons(items);
}

// ===== LIST =====
function renderList(items) {
  const content = document.getElementById('content');
  let html = '<div class="vocab-list">';
  items.forEach(item => {
    html += '<div class="vocab-item">' +
      '<div class="char">' + esc(item.hanzi) + '</div>' +
      '<div><div class="py">' + esc(item.pinyin) + '</div>' +
      '<div class="mean">' + esc(item.meaning) + '</div>' +
      (item.grammar ? '<div class="ex">' + esc(item.grammar) + '</div>' : '') +
      '</div></div>';
  });
  html += '</div>';
  content.innerHTML = html;
  updateNavButtons(items);
}

// ===== NAVIGATION =====
function updateNavButtons(items) {
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.disabled = state.currentIndex <= 0;
  btnNext.disabled = state.currentIndex >= items.length - 1;
  btnPrev.style.opacity = btnPrev.disabled ? '.4' : '1';
  btnNext.style.opacity = btnNext.disabled ? '.4' : '1';
}

document.getElementById('btnPrev').addEventListener('click', () => {
  if (state.currentIndex > 0) { state.currentIndex--; renderContent(); }
});
document.getElementById('btnNext').addEventListener('click', () => {
  const items = getItems();
  if (state.currentIndex < items.length - 1) { state.currentIndex++; renderContent(); }
});

// ===== PROGRESS =====
function updateProgress() {
  const items = getItems();
  const pct = items.length ? ((state.currentIndex + 1) / items.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = (state.currentIndex + 1) + ' / ' + items.length;
}

// ===== STATS =====
function updateStats() {
  const items = getItems();
  const total = items.length;
  const done = Object.keys(state.answers).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = state.correct;
  document.getElementById('statStreak').textContent = state.streak;
}

// ===== HELPERS =====
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

// ===== START =====
init();
</script>
</body>
