<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 汉语吗？- Tiếng Trung hong? </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#F2E4C9;--secondary:#FDF6EB;--accent:#A60303;--accent-dark:#7A0202;--text:#1a1a2e;--text-light:#555;--success:#4CAF50;--error:#F44336;--white:#fff;--shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--primary));min-height:100vh;color:var(--text);overflow-x:hidden}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:20px 20px 16px}
header h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;background:linear-gradient(135deg,var(--accent-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:.9rem;color:var(--text-light);margin-top:6px}
.stats-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.stat-card{background:var(--white);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);text-align:center;flex:1;min-width:70px;max-width:140px}
.stat-card .num{font-size:1.3rem;font-weight:800;color:var(--accent)}
.stat-card .label{font-size:.65rem;color:var(--text-light);margin-top:2px}
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.level-tab{padding:7px 14px;border-radius:30px;border:2px solid var(--accent);background:rgba(255,255,255,.7);font-weight:600;font-size:.78rem;cursor:pointer;transition:.3s;user-select:none}
.level-tab:hover{background:var(--primary)}
.level-tab.active{background:var(--accent);color:var(--white);border-color:var(--accent)}
.group-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.group-tab{padding:5px 10px;border-radius:20px;border:1.5px solid #d4b896;background:rgba(255,255,255,.5);font-weight:500;font-size:.72rem;cursor:pointer;transition:.3s}
.group-tab:hover{background:var(--primary)}
.group-tab.active{background:var(--accent-dark);color:var(--white);border-color:var(--accent-dark)}
.mode-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{padding:7px 16px;border-radius:30px;border:none;font-weight:600;font-size:.76rem;cursor:pointer;transition:.3s;background:rgba(255,255,255,.7)}
.mode-btn.active{background:var(--accent);color:var(--white)}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 18px;margin-bottom:14px;transition:.3s;animation:fadeIn .4s ease}
.card.correct{border-left:4px solid var(--success)}
.card.wrong-final{border-left:4px solid var(--error);background:#FFF5F5}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.card-level{font-size:.68rem;font-weight:600;background:var(--secondary);color:var(--accent);padding:3px 10px;border-radius:20px}
.card-type{font-size:.68rem;font-weight:600;color:var(--text-light)}
.attempts-text{font-size:.68rem;color:var(--text-light);font-weight:500}
.hanzi{font-size:clamp(2.5rem,8vw,4rem);font-weight:800;text-align:center;color:var(--accent);margin:6px 0;line-height:1.2}
.pinyin{text-align:center;font-size:1rem;color:var(--accent-dark);margin-bottom:4px}
.meaning-q{text-align:center;font-size:.9rem;color:var(--text-light);margin-bottom:14px;font-weight:600}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.option{padding:11px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:.2s;font-weight:500;font-size:.82rem;text-align:center;user-select:none;background:var(--white)}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--secondary)}
.option.correct-answer{border-color:var(--success)!important;background:#E8F5E9!important}
.option.wrong-answer{border-color:var(--error)!important;background:#FFEBEE!important;opacity:.6}
.option.disabled{pointer-events:none;opacity:.5}
.option.disabled.correct-answer{opacity:1}
.feedback{margin-top:10px;padding:9px 12px;border-radius:10px;font-weight:600;font-size:.82rem;display:none}
.feedback.show{display:block}
.feedback.correct{background:#E8F5E9;color:#2E7D32}
.feedback.wrong{background:#FFF3E0;color:#E65100}
.feedback.wrong-final{background:#FFEBEE;color:#C62828}
.progress-bar{width:100%;height:5px;background:#e0e0e0;border-radius:10px;margin:14px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:10px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.72rem;color:var(--text-light)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 20px;border:none;border-radius:30px;font-weight:700;font-size:.8rem;cursor:pointer;transition:.3s;font-family:inherit}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.8);color:var(--accent);border:2px solid var(--accent)}
.btn-secondary:hover{background:var(--primary)}
.btn-group{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.flashcard{perspective:1000px;height:250px;cursor:pointer;margin:14px 0}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.flashcard-front{background:var(--white)}
.flashcard-back{background:var(--secondary);transform:rotateY(180deg)}
.flashcard-front .hanzi{font-size:4.2rem}
.flashcard-back .info{text-align:center}
.flashcard-back .pinyin{font-size:1.1rem;font-weight:600}
.flashcard-back .meaning{font-size:.95rem;margin-top:5px;color:var(--text)}
.flip-hint{font-size:.68rem;color:var(--text-light);margin-top:6px}
.vocab-list{display:grid;gap:7px}
.vocab-item{display:flex;align-items:center;gap:10px;background:var(--white);border-radius:10px;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.vocab-item .char{font-size:1.5rem;font-weight:700;color:var(--accent);min-width:40px;text-align:center}
.vocab-item .info{flex:1}
.vocab-item .info .py{font-weight:600;color:var(--accent-dark);font-size:.82rem}
.vocab-item .info .mean{font-size:.76rem;color:var(--text-light)}
.vocab-item .badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px}
.vocab-item .badge.done{background:#E8F5E9;color:#2E7D32}
.vocab-item .badge.failed{background:#FFEBEE;color:#C62828}
.result{text-align:center;padding:28px 18px}
.result .score{font-size:3.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result .msg{font-size:1rem;font-weight:600;margin:6px 0 3px}
.result .detail{color:var(--text-light);font-size:.82rem}
.reset-row{text-align:center;margin-bottom:10px}
.btn-reset{background:transparent;color:var(--accent);border:1px solid var(--accent);font-size:.68rem;padding:5px 12px;border-radius:20px;cursor:pointer;font-weight:600;font-family:inherit;transition:.3s}
.btn-reset:hover{background:var(--accent);color:var(--white)}
/* ADD CARD FORM */
.add-card-section{margin-top:8px}
.add-card-section h3{font-size:.9rem;font-weight:700;margin-bottom:10px;color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:.68rem;font-weight:600;color:var(--text-light)}
.form-group input,.form-group select{padding:8px 12px;border:1.5px solid #d4b896;border-radius:10px;font-size:.85rem;font-family:inherit;outline:none;transition:.3s;background:var(--white)}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(166,3,3,.1)}
.form-actions{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.btn-add{background:var(--accent);color:var(--white);border:none;padding:9px 24px;border-radius:30px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.3s}
.btn-add:hover{background:var(--accent-dark)}
.btn-export{background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:9px 20px;border-radius:30px;font-weight:600;font-size:.76rem;cursor:pointer;font-family:inherit;transition:.3s}
.btn-export:hover{background:var(--accent);color:var(--white)}
.btn-import{background:transparent;color:#0288D1;border:1.5px solid #0288D1;padding:9px 20px;border-radius:30px;font-weight:600;font-size:.76rem;cursor:pointer;font-family:inherit;transition:.3s}
.btn-import:hover{background:#0288D1;color:var(--white)}
.my-cards-list{margin-top:16px}
.my-cards-list h3{font-size:.85rem;font-weight:700;margin-bottom:8px;color:var(--accent)}
.my-card-item{display:flex;align-items:center;gap:10px;background:var(--white);border-radius:10px;padding:9px 14px;box-shadow:0 2px 6px rgba(0,0,0,.04);margin-bottom:6px}
.my-card-item .char{font-size:1.4rem;font-weight:700;color:var(--accent);min-width:36px;text-align:center}
.my-card-item .info{flex:1}
.my-card-item .py{font-weight:600;color:var(--accent-dark);font-size:.8rem}
.my-card-item .mean{font-size:.74rem;color:var(--text-light)}
.my-card-item .del-btn{background:none;border:none;color:var(--error);cursor:pointer;font-size:1.1rem;padding:4px 8px;border-radius:8px;transition:.2s}
.my-card-item .del-btn:hover{background:#FFEBEE}
.hidden{display:none!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
@media(max-width:600px){.container{padding:10px}header{padding:16px 10px 10px}.card{padding:16px 12px}.options{grid-template-columns:1fr}.stat-card{padding:7px 10px;min-width:65px}.stat-card .num{font-size:1.1rem}.level-tab{padding:6px 10px;font-size:.72rem}.group-tab{padding:4px 8px;font-size:.68rem}.flashcard{height:210px}.flashcard-front .hanzi{font-size:3.2rem}.btn{padding:7px 16px;font-size:.74rem}.form-row{grid-template-columns:1fr}}
@media(max-width:380px){.stats-bar{gap:5px}.stat-card{padding:5px 7px;min-width:60px}.stat-card .num{font-size:1rem}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}
</style>
</head>

  <header>
    <h1>汉语吗？- Tiếng Trung hong? </h1>
    <p>Phát Triển Hán Ngữ · Sơ Cấp · Bài 16-25 · 229 từ vựng</p>

  </div>
</div>

const STORAGE_PROGRESS = 'hnnu_progress';
const STORAGE_CARDS = 'hnnu_custom_cards';

const state = {
  currentLevel: null, currentGroup: 0, currentMode: 'quiz',
  currentIndex: 0, attempts: 0, answered: false, isCorrect: false, selected: null,
  correct: 0, total: 0, streak: 0,
  learned: new Set(), flipped: false,
  mastery: {},
  customCards: [],
};

const $ = s => document.querySelector(s);
const content = $('#content');

// ===== PERSISTENCE =====
function saveProgress() {
  const obj = {
    currentLevel: state.currentLevel, currentGroup: state.currentGroup,
    currentMode: state.currentMode, currentIndex: state.currentIndex,
    mastery: state.mastery, correct: state.correct, total: state.total,
    streak: state.streak,
  };
  try { localStorage.setItem(STORAGE_PROGRESS, JSON.stringify(obj)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_PROGRESS);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj.currentLevel && DATA[obj.currentLevel]) state.currentLevel = obj.currentLevel;
    state.currentGroup = obj.currentGroup || 0;
    state.currentMode = obj.currentMode || 'quiz';
    state.currentIndex = obj.currentIndex || 0;
    state.mastery = obj.mastery || {};
    state.correct = obj.correct || 0;
    state.total = obj.total || 0;
    state.streak = obj.streak || 0;
    Object.entries(state.mastery).forEach(([k, v]) => { if (v) state.learned.add(k); });
  } catch(e) {}
}

function loadCustomCards() {
  try {
    const raw = localStorage.getItem(STORAGE_CARDS);
    state.customCards = raw ? JSON.parse(raw) : [];
  } catch(e) { state.customCards = []; }
}

function saveCustomCards() {
  try { localStorage.setItem(STORAGE_CARDS, JSON.stringify(state.customCards)); } catch(e) {}
}

function resetProgress() {
  if (!confirm('Xóa tiến trình? Bạn sẽ học lại từ đầu.')) return;
  try { localStorage.removeItem(STORAGE_PROGRESS); } catch(e) {}
  state.mastery = {}; state.learned = new Set();
  state.correct = 0; state.total = 0; state.streak = 0;
  state.currentLevel = Object.keys(DATA)[0];
  state.currentGroup = 0; state.currentIndex = 0;
  renderLevelTabs(); renderGroupTabs(); renderContent(); updateStats(); updateProgress();
}
$('#resetBtn').addEventListener('click', resetProgress);

// ===== EXPORT / IMPORT =====
function exportCards() {
  if (!state.customCards.length) { alert('Chưa có thẻ nào để export.'); return; }
  const blob = new Blob([JSON.stringify(state.customCards, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'custom_cards.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importCards() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const cards = JSON.parse(ev.target.result);
        if (!Array.isArray(cards)) throw new Error('Invalid format');
        let added = 0;
        cards.forEach(c => {
          if (c.hanzi && c.pinyin && c.meaning) {
            const exists = state.customCards.some(x => x.hanzi === c.hanzi && x.pinyin === c.pinyin);
            if (!exists) { state.customCards.push(c); added++; }
          }
        });
        saveCustomCards();
        renderMyCards();
        alert('Đã import ' + added + ' thẻ mới!');
      } catch(err) { alert('Lỗi đọc file: ' + err.message); }
    };
    reader.readAsText(file);
  });
  input.click();
}

// ===== INIT =====
function init() {
  loadProgress();
  loadCustomCards();
  if (!state.currentLevel) state.currentLevel = Object.keys(DATA)[0];
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.currentMode);
  });
  renderLevelTabs(); renderGroupTabs(); renderContent(); updateStats(); updateProgress();
}

// ===== LEVEL TABS =====
function renderLevelTabs() {
  const tabs = $('#levelTabs'); tabs.innerHTML = '';
  Object.keys(DATA).forEach(level => {
    const tab = document.createElement('div');
    tab.className = 'level-tab' + (level === state.currentLevel ? ' active' : '');
    const total = DATA[level].reduce((s, g) => s + g.length, 0);
    tab.textContent = level + ' (' + total + ')';
    tab.addEventListener('click', () => {
      state.currentLevel = level; state.currentGroup = 0; state.currentIndex = 0;
      state.attempts = 0; state.answered = false;
      renderLevelTabs(); renderGroupTabs(); renderContent(); updateProgress(); saveProgress();
    });
    tabs.appendChild(tab);
  });
}

function renderGroupTabs() {
  const tabs = $('#groupTabs'); tabs.innerHTML = '';
  const groups = DATA[state.currentLevel] || [];
  groups.forEach((_, idx) => {
    const tab = document.createElement('div');
    tab.className = 'group-tab' + (idx === state.currentGroup ? ' active' : '');
    tab.textContent = 'Nhóm ' + (idx + 1);
    tab.addEventListener('click', () => {
      state.currentGroup = idx; state.currentIndex = 0;
      state.attempts = 0; state.answered = false;
      renderGroupTabs(); renderContent(); updateProgress(); saveProgress();
    });
    tabs.appendChild(tab);
  });
}

// ===== MODE TOGGLE =====
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentMode = btn.dataset.mode;
    state.flipped = false; state.attempts = 0; state.answered = false;
    renderContent(); saveProgress();
  });
});

function getItems() {
  const groups = DATA[state.currentLevel];
  return groups && groups[state.currentGroup] ? groups[state.currentGroup] : [];
}

function renderContent() {
  const items = getItems();
  if (state.currentMode === 'mycards') { renderMyCardsForm(); return; }
  if (!items.length) {
    content.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text-light)">Nhóm này chưa có dữ liệu</p></div>';
    return;
  }
  if (state.currentMode === 'quiz') renderQuiz(items);
  else if (state.currentMode === 'flashcard') renderFlashcard(items);
  else renderList(items);
  updateProgress();
}

// ===== QUIZ =====
function renderQuiz(items) {
  const item = items[state.currentIndex];
  const types = ['meaning', 'hanzi', 'pinyin'];
  const qType = types[state.currentIndex % 3];
  let qHTML = '';
  if (qType === 'meaning') {
    qHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning-q">Chọn nghĩa tiếng Việt đúng:</div>';
  } else if (qType === 'hanzi') {
    qHTML = '<div class="meaning-q" style="font-size:1.3rem">' + esc(item.meaning) + '</div><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning-q">Chọn chữ Hán đúng:</div>';
  } else {
    qHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div><div class="meaning-q" style="font-size:1rem">' + esc(item.meaning) + '</div><div class="meaning-q">Chọn pinyin đúng:</div>';
  }
  const optionsHTML = generateOptions(item, qType, items);
  const attemptsText = state.answered ? '' : '<span class="attempts-text">' + (state.attempts > 0 ? 'Lần: ' + state.attempts + '/3' : '') + '</span>';
  const cardCls = 'card' + (state.answered ? (state.isCorrect ? ' correct' : ' wrong-final') : '');
  content.innerHTML =
    '<div class="' + cardCls + '" id="quizCard">' +
    '<div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + esc(item.type) + '</span>' + attemptsText + '</div>' +
    qHTML + '<div class="options" id="options">' + optionsHTML + '</div>' +
    '<div class="feedback" id="feedback"></div></div>';
  if (!state.answered) {
    document.querySelectorAll('.option:not(.disabled)').forEach(opt => {
      opt.addEventListener('click', () => selectOption(opt, item, qType, items));
    });
  }
}

function generateOptions(item, qType, allItems) {
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correct = item[field];
  let wrongs = allItems.filter(x => x[field] !== correct).map(x => x[field]).filter(Boolean);
  wrongs = [...new Set(wrongs)];
  const picked = shuffle(wrongs).slice(0, 3);
  const options = shuffle([correct, ...picked]);
  return options.map(opt => {
    let cls = 'option';
    if (state.answered) {
      if (opt === correct) cls = 'option correct-answer';
      else if (opt === state.selected && !state.isCorrect) cls = 'option wrong-answer';
      else cls += ' disabled';
    }
    return '<div class="' + cls + '" data-value="' + esc(opt) + '">' + esc(opt) + '</div>';
  }).join('');
}

function selectOption(opt, item, qType) {
  if (state.answered) return;
  const selected = opt.dataset.value;
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correct = item[field];
  const isCorrect = selected === correct;
  state.attempts++; state.selected = selected;

  if (isCorrect) {
    state.answered = true; state.isCorrect = true;
    state.correct++; state.total++; state.streak++;
    state.mastery[item.hanzi] = true; state.learned.add(item.hanzi);
    opt.classList.add('correct-answer');
    const fb = $('#feedback'); fb.textContent = 'Chính xác! ✓'; fb.className = 'feedback correct show';
    $('#quizCard').classList.add('correct', 'pop');
    updateStats(); saveProgress();
    setTimeout(() => {
      if (state.currentIndex < getItems().length - 1) {
        state.currentIndex++; state.attempts = 0; state.answered = false; state.selected = null;
        renderContent(); saveProgress();
      } else { renderResult(getItems()); }
    }, 600);
  } else {
    state.total++; state.streak = 0; updateStats(); saveProgress();
    opt.classList.add('wrong-answer', 'shake', 'disabled');
    if (state.attempts >= 3) {
      state.answered = true; state.isCorrect = false; state.mastery[item.hanzi] = false;
      document.querySelectorAll('.option').forEach(o => {
        if (o.dataset.value === correct) o.classList.add('correct-answer');
        else o.classList.add('disabled');
      });
      const fb = $('#feedback'); fb.textContent = 'Sai rồi! Đáp án: ' + correct;
      fb.className = 'feedback wrong-final show';
      $('#quizCard').classList.add('wrong-final');
      saveProgress();
      setTimeout(() => {
        if (state.currentIndex < getItems().length - 1) {
          state.currentIndex++; state.attempts = 0; state.answered = false; state.selected = null;
          renderContent(); saveProgress();
        } else { renderResult(getItems()); }
      }, 1200);
    } else {
      const fb = $('#feedback'); fb.textContent = 'Sai rồi! Còn ' + (3 - state.attempts) + ' lần thử nữa.';
      fb.className = 'feedback wrong show';
      setTimeout(() => opt.classList.remove('shake'), 400);
    }
  }
}

function renderResult(items) {
  const correctCount = Object.keys(state.mastery).filter(k => state.mastery[k]).length;
  content.innerHTML = '<div class="result"><div class="score">' + Math.round(correctCount / items.length * 100) + '%</div><div class="msg">Hoàn thành nhóm này!</div><div class="detail">' + correctCount + ' / ' + items.length + ' từ đã thuộc</div></div>';
  if (correctCount === items.length) launchConfetti();
}

// ===== FLASHCARD =====
function renderFlashcard(items) {
  const item = items[state.currentIndex];
  const mastered = state.mastery[item.hanzi];
  content.innerHTML =
    '<div class="card"><div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + esc(item.type) + '</span></div>' +
    '<div class="flashcard ' + (state.flipped ? 'flipped' : '') + '" id="flashcard">' +
    '<div class="flashcard-inner">' +
    '<div class="flashcard-front"><div class="hanzi">' + esc(item.hanzi) + '</div><div class="flip-hint">Nhấn để lật</div></div>' +
    '<div class="flashcard-back"><div class="info"><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning">' + esc(item.meaning) + '</div>' + (mastered !== undefined ? '<div style="margin-top:6px;font-size:.72rem;color:' + (mastered ? 'var(--success)' : 'var(--error)') + '">' + (mastered ? '✓ Đã thuộc' : '✗ Chưa thuộc') + '</div>' : '') + '</div></div>' +
    '</div></div></div>';
  $('#flashcard').addEventListener('click', () => { state.flipped = !state.flipped; $('#flashcard').classList.toggle('flipped'); });
}

// ===== LIST =====
function renderList(items) {
  content.innerHTML =
    '<div class="card"><div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + items.length + ' mục</span></div>' +
    '<div class="vocab-list">' + items.map(item => {
      const m = state.mastery[item.hanzi];
      const badge = m === true ? '<span class="badge done">✓ Thuộc</span>' : m === false ? '<span class="badge failed">✗ Sai</span>' : '';
      return '<div class="vocab-item"><div class="char">' + esc(item.hanzi) + '</div><div class="info"><div class="py">' + esc(item.pinyin) + '</div><div class="mean">' + esc(item.meaning) + '</div></div>' + badge + '</div>';
    }).join('') + '</div></div>';
}

// ===== MY CARDS (Custom Flashcards) =====
function renderMyCardsForm() {
  const lessons = Object.keys(DATA).join(',');
  content.innerHTML =
    '<div class="card add-card-section">' +
    '  <h3>📝 Thêm thẻ từ vựng mới</h3>' +
    '  <div class="form-row">' +
    '    <div class="form-group"><label>Chữ Hán</label><input type="text" id="cardHanzi" placeholder="例: 吃饭" autocomplete="off"></div>' +
    '    <div class="form-group"><label>Pinyin</label><input type="text" id="cardPinyin" placeholder="例: chī fàn" autocomplete="off"></div>' +
    '  </div>' +
    '  <div class="form-row">' +
    '    <div class="form-group"><label>Nghĩa tiếng Việt</label><input type="text" id="cardMeaning" placeholder="例: ăn cơm" autocomplete="off"></div>' +
    '    <div class="form-group"><label>Bài</label><input type="text" id="cardLesson" placeholder="例: Bài 16" autocomplete="off"></div>' +
    '  </div>' +
    '  <div class="form-actions">' +
    '    <button class="btn-add" id="addCardBtn">＋ Thêm thẻ</button>' +
    '  </div>' +
    '</div>' +
    '<div class="card">' +
    '  <div class="form-actions" style="margin-bottom:12px">' +
    '    <button class="btn-export" id="exportBtn">📥 Export JSON</button>' +
    '    <button class="btn-import" id="importBtn">📤 Import JSON</button>' +
    '  </div>' +
    '  <div class="my-cards-list">' +
    '    <h3>Thẻ của tui (' + state.customCards.length + ')</h3>' +
    '    <div id="myCardsList"></div>' +
    '  </div>' +
    '</div>';

  $('#addCardBtn').addEventListener('click', addCard);
  $('#exportBtn').addEventListener('click', exportCards);
  $('#importBtn').addEventListener('click', importCards);

  // Enter key to add
  ['cardHanzi','cardPinyin','cardMeaning','cardLesson'].forEach(id => {
    $('#' + id).addEventListener('keydown', e => { if (e.key === 'Enter') addCard(); });
  });

  renderMyCardsList();
}

function addCard() {
  const hanzi = ($('#cardHanzi').value || '').trim();
  const pinyin = ($('#cardPinyin').value || '').trim();
  const meaning = ($('#cardMeaning').value || '').trim();
  const lesson = ($('#cardLesson').value || '').trim() || 'Thẻ của tui';

  if (!hanzi || !meaning) { alert('Nhập ít nhất Chữ Hán và Nghĩa!'); return; }
  if (state.customCards.some(c => c.hanzi === hanzi && c.pinyin === pinyin)) { alert('Thẻ này đã tồn tại!'); return; }

  state.customCards.push({ hanzi, pinyin, meaning, lesson, type: 'từ vựng', grammar: '', example: '' });
  saveCustomCards();

  // Clear inputs
  $('#cardHanzi').value = '';
  $('#cardPinyin').value = '';
  $('#cardMeaning').value = '';
  $('#cardLesson').value = '';
  $('#cardHanzi').focus();

  renderMyCardsList();
}

function renderMyCardsList() {
  const container = $('#myCardsList');
  if (!container) return;
  const heading = container.previousElementSibling;
  if (heading) heading.textContent = 'Thẻ của tui (' + state.customCards.length + ')';

  if (!state.customCards.length) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-light);font-size:.82rem;padding:16px">Chưa có thẻ nào. Thêm ở trên nha!</p>';
    return;
  }

  container.innerHTML = state.customCards.map((c, i) =>
    '<div class="my-card-item">' +
    '  <div class="char">' + esc(c.hanzi) + '</div>' +
    '  <div class="info"><div class="py">' + esc(c.pinyin) + '</div><div class="mean">' + esc(c.meaning) + '</div></div>' +
    '  <button class="del-btn" data-idx="' + i + '" title="Xóa">🗑</button>' +
    '</div>'
  ).join('');

  container.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      state.customCards.splice(idx, 1);
      saveCustomCards();
      renderMyCardsList();
    });
  });
}

// ===== NAV =====
$('#prevBtn').addEventListener('click', () => {
  if (state.currentMode === 'mycards') return;
  if (state.currentIndex > 0) { state.currentIndex--; state.attempts = 0; state.answered = false; state.selected = null; state.flipped = false; renderContent(); saveProgress(); }
});
$('#nextBtn').addEventListener('click', () => {
  if (state.currentMode === 'mycards') return;
  const items = getItems();
  if (state.currentIndex < items.length - 1) { state.currentIndex++; state.attempts = 0; state.answered = false; state.selected = null; state.flipped = false; renderContent(); saveProgress(); }
});

function updateProgress() {
  if (state.currentMode === 'mycards') { $('#progressFill').style.width = '0%'; $('#progressText').textContent = state.customCards.length + ' thẻ'; return; }
  const items = getItems();
  const pct = items.length ? ((state.currentIndex + 1) / items.length * 100) : 0;
  $('#progressFill').style.width = pct + '%';
  $('#progressText').textContent = (state.currentIndex + 1) + ' / ' + items.length;
}

function updateStats() {
  let total = 0;
  Object.values(DATA).forEach(groups => groups.forEach(g => total += g.length));
  $('#totalChars').textContent = total;
  $('#learned').textContent = state.learned.size;
  $('#accuracy').textContent = state.total ? Math.round(state.correct / state.total * 100) + '%' : '0%';
  $('#streak').textContent = state.streak;
}

function launchConfetti() {
  const canvas = $('#confetti'); const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#A60303','#F2E4C9','#D4A574','#7A0202','#4CAF50','#FFD54F'];
  for (let i = 0; i < 120; i++) {
    pieces.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
      w: Math.random()*10+5, h: Math.random()*6+3, color: colors[Math.floor(Math.random()*colors.length)],
      vy: Math.random()*3+2, vx: Math.random()*2-1, r: Math.random()*Math.PI*2, vr: Math.random()*.2-.1 });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => { ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.r);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      p.y+=p.vy; p.x+=p.vx; p.r+=p.vr; });
    frame++; if(frame<180) requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

document.addEventListener('keydown', e => {
  if (state.currentMode === 'mycards') return;
  if (e.key === 'ArrowRight') $('#nextBtn').click();
  if (e.key === 'ArrowLeft') $('#prevBtn').click();
  if (e.key === ' ' && state.currentMode === 'flashcard') { e.preventDefault(); state.flipped = !state.flipped; const fc = $('#flashcard'); if (fc) fc.classList.toggle('flipped'); }
});

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

init();
</script>
