<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hán Ngữ Ký Ức - Học Tiếng Trung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#F2E4C9;--secondary:#FDF6EB;--accent:#A60303;--accent-dark:#7A0202;--text:#1a1a2e;--text-light:#555;--success:#4CAF50;--error:#F44336;--white:#fff;--shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--primary));min-height:100vh;color:var(--text);overflow-x:hidden}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 20px 20px}
header h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;background:linear-gradient(135deg,var(--accent-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:.9rem;color:var(--text-light);margin-top:6px}
.upload-zone{border:2px dashed var(--accent);border-radius:var(--radius);padding:32px 20px;text-align:center;background:rgba(255,255,255,.6);backdrop-filter:blur(10px);transition:.3s;cursor:pointer;margin-bottom:20px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent-dark);background:rgba(255,255,255,.85);transform:scale(1.01)}
.upload-zone svg{width:48px;height:48px;fill:var(--accent);margin-bottom:12px}
.upload-zone h3{font-weight:700;margin-bottom:4px}
.upload-zone p{font-size:.8rem;color:var(--text-light)}
.upload-zone input[type=file]{display:none}
.stats-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);text-align:center;flex:1;min-width:80px;max-width:140px}
.stat-card .num{font-size:1.4rem;font-weight:800;color:var(--accent)}
.stat-card .label{font-size:.7rem;color:var(--text-light);margin-top:2px}
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.level-tab{padding:8px 16px;border-radius:30px;border:2px solid var(--accent);background:rgba(255,255,255,.7);font-weight:600;font-size:.82rem;cursor:pointer;transition:.3s;user-select:none}
.level-tab:hover{background:var(--primary)}
.level-tab.active{background:var(--accent);color:var(--white);border-color:var(--accent)}
.group-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.group-tab{padding:6px 12px;border-radius:20px;border:1.5px solid #d4b896;background:rgba(255,255,255,.5);font-weight:500;font-size:.75rem;cursor:pointer;transition:.3s}
.group-tab:hover{background:var(--primary)}
.group-tab.active{background:var(--accent-dark);color:var(--white);border-color:var(--accent-dark)}
.mode-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.mode-btn{padding:8px 18px;border-radius:30px;border:none;font-weight:600;font-size:.8rem;cursor:pointer;transition:.3s;background:rgba(255,255,255,.7)}
.mode-btn.active{background:var(--accent);color:var(--white)}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;margin-bottom:16px;transition:.3s;animation:fadeIn .4s ease}
.card.correct{border-left:4px solid var(--success)}
.card.wrong{border-left:4px solid var(--error)}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-level{font-size:.72rem;font-weight:600;background:var(--secondary);color:var(--accent);padding:3px 10px;border-radius:20px}
.card-type{font-size:.72rem;font-weight:600;color:var(--text-light)}
.hanzi{font-size:clamp(2.5rem,8vw,4rem);font-weight:800;text-align:center;color:var(--accent);margin:8px 0;line-height:1.2}
.pinyin{text-align:center;font-size:1rem;color:var(--accent-dark);margin-bottom:4px}
.meaning-q{text-align:center;font-size:.95rem;color:var(--text-light);margin-bottom:16px;font-weight:600}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.option{padding:12px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:.2s;font-weight:500;font-size:.85rem;text-align:center;user-select:none;background:var(--white)}
.option:hover{border-color:var(--accent);background:var(--secondary)}
.option.correct-answer{border-color:var(--success);background:#E8F5E9}
.option.wrong-answer{border-color:var(--error);background:#FFEBEE}
.feedback{margin-top:12px;padding:10px 14px;border-radius:10px;font-weight:600;font-size:.85rem;display:none}
.feedback.show{display:block}
.feedback.correct{background:#E8F5E9;color:#2E7D32}
.feedback.wrong{background:#FFEBEE;color:#C62828}
.progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin:16px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:10px;transition:width .4s ease}
.progress-text{text-align:center;font-size:.75rem;color:var(--text-light)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 24px;border:none;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;transition:.3s;font-family:inherit}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.8);color:var(--accent);border:2px solid var(--accent)}
.btn-secondary:hover{background:var(--primary)}
.btn-group{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.flashcard{perspective:1000px;height:260px;cursor:pointer;margin:16px 0}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.flashcard-front{background:var(--white)}
.flashcard-back{background:var(--secondary);transform:rotateY(180deg)}
.flashcard-front .hanzi{font-size:4.5rem}
.flashcard-back .info{text-align:center}
.flashcard-back .pinyin{font-size:1.2rem;font-weight:600}
.flashcard-back .meaning{font-size:1rem;margin-top:6px;color:var(--text)}
.flip-hint{font-size:.72rem;color:var(--text-light);margin-top:8px}
.vocab-list{display:grid;gap:8px}
.vocab-item{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.vocab-item .char{font-size:1.6rem;font-weight:700;color:var(--accent);min-width:45px;text-align:center}
.vocab-item .info{flex:1}
.vocab-item .info .py{font-weight:600;color:var(--accent-dark);font-size:.85rem}
.vocab-item .info .mean{font-size:.8rem;color:var(--text-light)}
.result{text-align:center;padding:32px 20px}
.result .score{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result .msg{font-size:1.1rem;font-weight:600;margin:8px 0 4px}
.result .detail{color:var(--text-light);font-size:.85rem}
.hidden{display:none!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
@media(max-width:600px){.container{padding:12px}header{padding:20px 12px 12px}.card{padding:18px 14px}.options{grid-template-columns:1fr}.stat-card{padding:8px 12px;min-width:70px}.stat-card .num{font-size:1.2rem}.level-tab{padding:7px 12px;font-size:.75rem}.group-tab{padding:5px 10px;font-size:.7rem}.flashcard{height:220px}.flashcard-front .hanzi{font-size:3.5rem}.btn{padding:8px 18px;font-size:.78rem}}
@media(max-width:380px){.stats-bar{gap:6px}.stat-card{padding:6px 8px;min-width:65px}.stat-card .num{font-size:1rem}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

  </div>
</div>

const state = {
  currentLevel: null,
  currentGroup: 0,
  currentMode: 'quiz',
  currentIndex: 0,
  answers: {},
  correct: 0,
  total: 0,
  streak: 0,
  learned: new Set(),
  flipped: false
};
const $ = s => document.querySelector(s);
const content = $('#content');
const uploadZone = $('#uploadZone');
const fileInput = $('#fileInput');

function init() {
  state.currentLevel = Object.keys(DATA)[0];
  state.currentGroup = 0;
  renderLevelTabs(); renderGroupTabs(); renderContent(); updateStats();
}

function renderLevelTabs() {
  const tabs = $('#levelTabs'); tabs.innerHTML = '';
  Object.keys(DATA).forEach(level => {
    const tab = document.createElement('div');
    tab.className = 'level-tab' + (level === state.currentLevel ? ' active' : '');
    const total = DATA[level].reduce((s, g) => s + g.length, 0);
    tab.textContent = level + ' (' + total + ')';
    tab.addEventListener('click', () => {
      state.currentLevel = level; state.currentGroup = 0; state.currentIndex = 0;
      state.answers = {}; state.flipped = false;
      renderLevelTabs(); renderGroupTabs(); renderContent(); updateProgress();
    });
    tabs.appendChild(tab);
  });
}

function renderGroupTabs() {
  const tabs = $('#groupTabs'); tabs.innerHTML = '';
  const groups = DATA[state.currentLevel] || [];
  groups.forEach((_, idx) => {
    const tab = document.createElement('div');
    tab.className = 'group-tab' + (idx === state.currentGroup ? ' active' : '');
    tab.textContent = 'Nhóm ' + (idx + 1);
    tab.addEventListener('click', () => {
      state.currentGroup = idx; state.currentIndex = 0;
      state.answers = {}; state.flipped = false;
      renderGroupTabs(); renderContent(); updateProgress();
    });
    tabs.appendChild(tab);
  });
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentMode = btn.dataset.mode; state.flipped = false; renderContent();
  });
});

function getItems() {
  const groups = DATA[state.currentLevel];
  return groups && groups[state.currentGroup] ? groups[state.currentGroup] : [];
}

function renderContent() {
  const items = getItems();
  if (!items.length) {
    content.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text-light)">Nhóm này chưa có dữ liệu</p></div>';
    return;
  }
  if (state.currentMode === 'quiz') renderQuiz(items);
  else if (state.currentMode === 'flashcard') renderFlashcard(items);
  else renderList(items);
  updateProgress();
}

function renderQuiz(items) {
  const item = items[state.currentIndex];
  const answered = state.answers[state.currentIndex];
  const isCorrect = answered && answered.correct;
  const types = ['meaning', 'hanzi', 'pinyin'];
  const qType = types[state.currentIndex % 3];
  let qHTML = '';
  if (qType === 'meaning') {
    qHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning-q">Chọn nghĩa tiếng Việt đúng:</div>';
  } else if (qType === 'hanzi') {
    qHTML = '<div class="meaning-q" style="font-size:1.3rem">' + esc(item.meaning) + '</div><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning-q">Chọn chữ Hán đúng:</div>';
  } else {
    qHTML = '<div class="hanzi">' + esc(item.hanzi) + '</div><div class="meaning-q" style="font-size:1rem">' + esc(item.meaning) + '</div><div class="meaning-q">Chọn pinyin đúng:</div>';
  }
  const optionsHTML = generateOptions(item, qType, items);
  content.innerHTML =
    '<div class="card ' + (answered ? (isCorrect ? 'correct' : 'wrong') : '') + '" id="quizCard">' +
    '<div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + esc(item.type) + '</span></div>' +
    qHTML + '<div class="options" id="options">' + optionsHTML + '</div>' +
    '<div class="feedback ' + (answered ? (isCorrect ? 'correct show' : 'wrong show') : '') + '" id="feedback">' +
    (answered ? (isCorrect ? 'Chính xác!' : 'Sai rồi! Đáp án: ' + esc(getCorrectAnswer(item, qType))) : '') +
    '</div></div>';
  if (!answered) {
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => selectOption(opt, item, qType, items));
    });
  }
}

function generateOptions(item, qType, allItems) {
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correct = item[field];
  let wrongs = allItems.filter(x => x[field] !== correct).map(x => x[field]).filter(Boolean);
  wrongs = [...new Set(wrongs)];
  const picked = shuffle(wrongs).slice(0, 3);
  const options = shuffle([correct, ...picked]);
  const answered = state.answers[state.currentIndex];
  return options.map(opt => {
    let cls = 'option';
    if (answered) {
      if (opt === correct) cls += ' correct-answer';
      else if (opt === answered.selected && !answered.correct) cls += ' wrong-answer';
    }
    return '<div class="' + cls + '" data-value="' + esc(opt) + '">' + esc(opt) + '</div>';
  }).join('');
}

function getCorrectAnswer(item, qType) {
  if (qType === 'meaning') return item.meaning;
  if (qType === 'hanzi') return item.hanzi;
  return item.pinyin;
}

function selectOption(opt, item, qType) {
  if (state.answers[state.currentIndex]) return;
  const selected = opt.dataset.value;
  const field = qType === 'hanzi' ? 'hanzi' : qType === 'pinyin' ? 'pinyin' : 'meaning';
  const correct = item[field];
  const isCorrect = selected === correct;
  state.answers[state.currentIndex] = { selected, correct: isCorrect };
  state.total++;
  if (isCorrect) {
    state.correct++; state.streak++; state.learned.add(item.hanzi);
    opt.classList.add('correct-answer');
    $('#feedback').textContent = 'Chính xác!';
    $('#feedback').className = 'feedback correct show';
    $('#quizCard').classList.add('correct', 'pop');
  } else {
    state.streak = 0;
    opt.classList.add('wrong-answer');
    document.querySelectorAll('.option').forEach(o => { if (o.dataset.value === correct) o.classList.add('correct-answer'); });
    $('#feedback').textContent = 'Sai rồi! Đáp án: ' + correct;
    $('#feedback').className = 'feedback wrong show';
    $('#quizCard').classList.add('wrong', 'shake');
  }
  updateStats();
}

function renderFlashcard(items) {
  const item = items[state.currentIndex];
  content.innerHTML =
    '<div class="card"><div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + esc(item.type) + '</span></div>' +
    '<div class="flashcard ' + (state.flipped ? 'flipped' : '') + '" id="flashcard">' +
    '<div class="flashcard-inner">' +
    '<div class="flashcard-front"><div class="hanzi">' + esc(item.hanzi) + '</div><div class="flip-hint">Nhấn để lật</div></div>' +
    '<div class="flashcard-back"><div class="info"><div class="pinyin">' + esc(item.pinyin) + '</div><div class="meaning">' + esc(item.meaning) + '</div></div></div>' +
    '</div></div></div>';
  $('#flashcard').addEventListener('click', () => { state.flipped = !state.flipped; $('#flashcard').classList.toggle('flipped'); });
}

function renderList(items) {
  content.innerHTML =
    '<div class="card"><div class="card-header"><span class="card-level">' + esc(state.currentLevel) + ' · Nhóm ' + (state.currentGroup + 1) + '</span><span class="card-type">' + items.length + ' mục</span></div>' +
    '<div class="vocab-list">' + items.map(item =>
      '<div class="vocab-item"><div class="char">' + esc(item.hanzi) + '</div><div class="info"><div class="py">' + esc(item.pinyin) + '</div><div class="mean">' + esc(item.meaning) + '</div></div></div>'
    ).join('') + '</div></div>';
}

$('#prevBtn').addEventListener('click', () => { if (state.currentIndex > 0) { state.currentIndex--; state.flipped = false; renderContent(); } });
$('#nextBtn').addEventListener('click', () => { const items = getItems(); if (state.currentIndex < items.length - 1) { state.currentIndex++; state.flipped = false; renderContent(); } });

function updateProgress() {
  const items = getItems();
  const pct = items.length ? ((state.currentIndex + 1) / items.length * 100) : 0;
  $('#progressFill').style.width = pct + '%';
  $('#progressText').textContent = (state.currentIndex + 1) + ' / ' + items.length;
}

function updateStats() {
  let total = 0;
  Object.values(DATA).forEach(groups => groups.forEach(g => total += g.length));
  $('#totalChars').textContent = total;
  $('#learned').textContent = state.learned.size;
  $('#accuracy').textContent = state.total ? Math.round(state.correct / state.total * 100) + '%' : '0%';
  $('#streak').textContent = state.streak;
}

function launchConfetti() {
  const canvas = $('#confetti'); const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#A60303','#F2E4C9','#D4A574','#7A0202','#4CAF50','#FFD54F'];
  for (let i = 0; i < 120; i++) {
    pieces.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
      w: Math.random()*10+5, h: Math.random()*6+3, color: colors[Math.floor(Math.random()*colors.length)],
      vy: Math.random()*3+2, vx: Math.random()*2-1, r: Math.random()*Math.PI*2, vr: Math.random()*.2-.1 });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => { ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.r);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      p.y+=p.vy; p.x+=p.vx; p.r+=p.vr; });
    frame++; if(frame<180) requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') $('#nextBtn').click();
  if (e.key === 'ArrowLeft') $('#prevBtn').click();
  if (e.key === ' ' && state.currentMode === 'flashcard') { e.preventDefault(); state.flipped = !state.flipped; const fc = $('#flashcard'); if (fc) fc.classList.toggle('flipped'); }
});

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function chunkArr(arr, size) { const chunks=[]; for(let i=0;i<arr.length;i+=size) chunks.push(arr.slice(i,i+size)); return chunks; }

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); uploadZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls'].includes(ext)) { alert('Chỉ hỗ trợ file Excel (.xlsx, .xls)'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const newData = {};
      wb.SheetNames.forEach(name => {
        const sheet = wb.Sheets[name];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        if (!rows.length) return;
        let headerIdx = -1, colMap = {};
        for (let i = 0; i < Math.min(rows.length, 5); i++) {
          const row = rows[i];
          const joined = row.map(String).join(' ').toLowerCase();
          if (joined.includes('chữ hán') || joined.includes('汉字') || joined.includes('hán') || joined.includes('pinyin') || joined.includes('phiên âm')) {
            headerIdx = i;
            row.forEach((val, ci) => {
              const v = String(val).toLowerCase().trim();
              if (v.includes('hán') || v.includes('chữ') || v.includes('汉字')) colMap.hanzi = ci;
              else if (v.includes('phiên âm') || v.includes('pinyin')) colMap.pinyin = ci;
              else if (v.includes('nghĩa') || v.includes('tiếng việt')) colMap.meaning = ci;
            });
            if (!colMap.hanzi) { const used = new Set(Object.values(colMap)); for (let c = 0; c < row.length; c++) { if (!used.has(c) && rows[headerIdx+1] && /[一-鿿]/.test(String(rows[headerIdx+1][c]||''))) { colMap.hanzi = c; break; } } if (!colMap.hanzi) colMap.hanzi = 0; }
            if (!colMap.pinyin) { const used = new Set(Object.values(colMap)); for (let c = 0; c < row.length; c++) { if (!used.has(c)) { colMap.pinyin = c; break; } } }
            if (!colMap.meaning) { const used = new Set(Object.values(colMap)); for (let c = 0; c < row.length; c++) { if (!used.has(c)) { colMap.meaning = c; break; } } }
            break;
          }
        }
        if (headerIdx === -1) return;
        const items = [];
        for (let i = headerIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          const hanzi = String(r[colMap.hanzi]||'').trim();
          const pinyin = colMap.pinyin !== undefined ? String(r[colMap.pinyin]||'').trim() : '';
          const meaning = colMap.meaning !== undefined ? String(r[colMap.meaning]||'').trim() : '';
          if (!hanzi && !pinyin && !meaning) continue;
          items.push({ hanzi, pinyin, meaning, type: 'từ vựng', grammar: '', example: '' });
        }
        const key = name.replace(/\s+/g,' ').trim();
        if (!newData[key]) newData[key] = [];
        newData[key].push(...items);
      });
      const grouped = {};
      Object.entries(newData).forEach(([level, items]) => { grouped[level] = chunkArr(items, 15); });
      Object.keys(DATA).forEach(k => delete DATA[k]);
      Object.assign(DATA, grouped);
      state.currentLevel = Object.keys(DATA)[0]; state.currentGroup = 0; state.currentIndex = 0;
      state.answers = {}; state.flipped = false;
      renderLevelTabs(); renderGroupTabs(); renderContent(); updateStats();
      const total = Object.values(DATA).reduce((s,g) => s + g.reduce((a,b) => a + b.length, 0), 0);
      alert('Đã load ' + total + ' mục từ file!');
    } catch(err) { alert('Lỗi đọc file: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

init();
</script>
