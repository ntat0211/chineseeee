来恭喜我。 — Cảm ơn bạn đã đến chúc mừng tôi ngày hôm nay.","example":"很感谢你们今天来恭喜我。"},{"hanzi":"干","pinyin":"gàn","meaning":"Làm","type":"từ vựng","grammar":"你别干了，去休息一会儿 吧。 — Đừng làm vậy, đi nghỉ ngơi một lát.","example":"你别干了，去休息一会儿 吧。"},{"hanzi":"感觉","pinyin":"gǎnjué","meaning":"Cảm giác","type":"từ vựng","grammar":"我感觉有点不舒服。 — Tôi cảm thấy hơi khó chịu.","example":"我感觉有点不舒服。"},{"hanzi":"刚刚","pinyin":"gānggāng","meaning":"Vừa Vừa mới Vừa vặn","type":"từ vựng","grammar":"老师刚刚说完，我又忘了。 — Cô giáo vừa nói xong, tôi quên mất.","example":"老师刚刚说完，我又忘了。"},{"hanzi":"高级","pinyin":"gāojí","meaning":"Cao cấp","type":"từ vựng","grammar":"中文分为三 级：初级，中级和高级。 — Tiếng Trung được chia thành ba cấp độ: sơ cấp, trung cấp và cao cấp.","example":"中文分为三 级：初级，中级和高级。"},{"hanzi":"各","pinyin":"gè","meaning":"Mỗi, các","type":"từ vựng","grammar":"各个地方都有特产，你知道河内的特产是啥吗？ — Có những sản phẩm đặc sản ở nhiều nơi, bạn có biết đặc sản Hà Nội là gì không?","example":"各个地方都有特产，你知道河内的特产是啥吗？"},{"hanzi":"个子","pinyin":"gè zi","meaning":"Vóc dáng Dáng người Thân hình","type":"từ vựng","grammar":"这只猫个子大。 — Con mèo này vóc dáng thật to.","example":"这只猫个子大。"},{"hanzi":"公里","pinyin":"gōnglǐ","meaning":"Km","type":"từ vựng","grammar":"从这到学校大概八公里。 — Từ đây đến trường khoảng tám cây số.","example":"从这到学校大概八公里。"},{"hanzi":"工具","pinyin":"gōngjù","meaning":"Công cụ","type":"từ vựng","grammar":"你准备好工具了没？ — Bạn đã sẵn sàng cho các công cụ?","example":"你准备好工具了没？"},{"hanzi":"工资","pinyin":"gōngzī","meaning":"Tiền lương","type":"từ vựng","grammar":"你的工资每月多少？ — Lương hàng tháng của bạn là bao nhiêu?","example":"你的工资每月多少？"},{"hanzi":"共同","pinyin":"gòngtóng","meaning":"Đồng thời Cùng nhau Có chung","type":"từ vựng","grammar":"我们有共同的爱好是看书。 — Sở thích chung của chúng tôi là đọc sách.","example":"我们有共同的爱好是看书。"},{"hanzi":"够","pinyin":"gòu","meaning":"Đủ","type":"từ vựng","grammar":"你买够了没？ — Bạn đã mua đủ chưa?","example":"你买够了没？"},{"hanzi":"购物","pinyin":"gòuwù","meaning":"Mua sắm","type":"từ vựng","grammar":"我想到购物中心购买礼物。 — Tôi muốn mua quà ở trung tâm mua sắm.","example":"我想到购物中心购买礼物。"},{"hanzi":"孤单","pinyin":"gūdān","meaning":"Cô đơn","type":"từ vựng","grammar":"很久很久以 前，女娲一个人在世上感到非常孤单。 — Đã lâu rồi, Nữ Oa cảm thấy rất cô đơn trong thế giới một mình.","example":"很久很久以 前，女娲一个人在世上感到非常孤单。"},{"hanzi":"估计","pinyin":"gūjìì","meaning":"Đánh giá, dự tính, nhận định, ước đoán","type":"từ vựng","grammar":"估计他今天回来。 — Theo ước tính rằng anh ấy sẽ trở lại trong ngày hôm nay.","example":"估计他今天回来。"}],"HSK 5":[{"hanzi":"唉","pinyin":"āi","meaning":"Ôi Dạ Vâng","type":"từ vựng","grammar":"唉，我错 了，因为我迷了路。 — Chao ôi, tôi sai rồi vì tôi đã lạc đường.","example":"唉，我错 了，因为我迷了路。"},{"hanzi":"爱护","pinyin":"àihù","meaning":"Bảo vệ Giữ gìn Trân quý","type":"từ vựng","grammar":"让我们一起来：关心集体，爱护公物，保护环境！ — Chúng ta hãy cùng nhau: quan tâm đến tập thể, quan tâm đến tài sản công, bảo vệ môi trường!","example":"让我们一起来：关心集体，爱护公物，保护环境！"},{"hanzi":"爱惜","pinyin":"àixī","meaning":"Yêu quý Quý trọng","type":"từ vựng","grammar":"爱惜自己的眼睛吧，它是我们观察世界的窗 户。 — Hãy trân trọng đôi mắt của bạn, nó là cửa sổ quan sát thế giới của chúng ta.","example":"爱惜自己的眼睛吧，它是我们观察世界的窗 户。"},{"hanzi":"爱心","pinyin":"àixīn","meaning":"Tình Yêu thương, lòng yêu thương","type":"từ vựng","grammar":"他们做任何事情都应当出于爱心。 — Họ làm mọi thứ đều vì tình yêu.","example":"他们做任何事情都应当出于爱心。"},{"hanzi":"岸","pinyin":"àn","meaning":"Bờ Bến bờ","type":"từ vựng","grammar":"鱼还在岸上扑扑地跳动着。 — Cá vẫn nhởn nhơ trên bờ.","example":"鱼还在岸上扑扑地跳动着。"},{"hanzi":"安装","pinyin":"ānzhuāng","meaning":"Lắp đặt Cài đặt","type":"từ vựng","grammar":"教室里又安装了几盏日光灯。 — Một số bóng đèn huỳnh quang đã được lắp đặt trong lớp học.","example":"教室里又安装了几盏日光灯。"},{"hanzi":"傍晚","pinyin":"bàngwǎn","meaning":"Chạng vạng Gần tối Sẩm tối Nhá nhem","type":"từ vựng","grammar":"傍晚，夕阳欲落。 — Chiều tối, hoàng hôn sắp lặn.","example":"傍晚，夕阳欲落。"},{"hanzi":"办理","pinyin":"bànlǐ","meaning":"Xử lý","type":"từ vựng","grammar":"我的出国手续已办理好了。 — Thủ tục đi nước ngoài của tôi đã hoàn tất.","example":"我的出国手续已办理好了。"},{"hanzi":"班主任","pinyin":"bānzhǔrèn","meaning":"Chủ nhiệm lớp; giáo viên chủ nhiệm; giáo viên phụ trách","type":"từ vựng","grammar":"。我们班的班主任是一位刚毕业于北京师范大学的老师。 — Giáo viên chủ nhiệm của lớp chúng tôi là một vị giáo viên vừa tốt nghiệp Đại học Sư phạm Bắc Kinh.","example":"。我们班的班主任是一位刚毕业于北京师范大学的老师。"},{"hanzi":"保存","pinyin":"bǎocún","meaning":"Bảo tồn","type":"từ vựng","grammar":"这些书保存得很好。 — Những cuốn sách này được bảo quản tốt.","example":"这些书保存得很好。"},{"hanzi":"报告","pinyin":"bàogào","meaning":"Báo cáo","type":"từ vựng","grammar":"他把那事添枝加叶地向校长报告 了。 — Anh đã thêm mắm dặm muối rồi báo cáo sự việc với hiệu trưởng.","example":"他把那事添枝加叶地向校长报告 了。"},{"hanzi":"宝贵","pinyin":"bǎoguì","meaning":"Quý báu","type":"từ vựng","grammar":"他们的时间是非常宝贵的。 — Thời gian của họ rất quý giá.","example":"他们的时间是非常宝贵的。"},{"hanzi":"包裹","pinyin":"bāoguǒ","meaning":"Bưu phẩm Vật phẩm Gói hàng","type":"từ vựng","grammar":"他们搜了我的口袋和包裹。 — Họ lục túi và gói hàng của tôi.","example":"他们搜了我的口袋和包裹。"},{"hanzi":"包含","pinyin":"bāohán","meaning":"Bao hàm Chứa đựng","type":"từ vựng","grammar":"礼物虽小，却包含着朋友的一份深情。 — Món quà tuy nhỏ nhưng chứa đựng tình cảm của một người bạn.","example":"礼物虽小，却包含着朋友的一份深情。"},{"hanzi":"保留","pinyin":"bǎoliú","meaning":"Gìn giữ Bảo lưu","type":"từ vựng","grammar":"许多代表对这个决议持保留态度。 — Nhiều đại diện bảo lưu về cách giải quyết này.","example":"许多代表对这个决议持保留态度。"},{"hanzi":"保险","pinyin":"bǎoxiǎn","meaning":"Bảo hiểm","type":"từ vựng","grammar":"现在倒有一个保险的办法。 — Bây giờ có một cách bảo hiểm.","example":"现在倒有一个保险的办法。"},{"hanzi":"把握","pinyin":"bǎwò","meaning":"Nắm vững Nắm chắc","type":"từ vựng","grammar":"成功不是回首，不是寄望，而是把握现在。 — Thành công không phải là nhìn lại quá khứ, không phải là trông mong mà là nắm vững hiện tại.","example":"成功不是回首，不是寄望，而是把握现在。"},{"hanzi":"倍","pinyin":"bèi","meaning":"Bội Bậc Lần","type":"từ vựng","grammar":"这些细胞持有二倍体核型。 — Các tế bào này có 2 lần karyotype.","example":"这些细胞持有二倍体核型。"},{"hanzi":"悲观","pinyin":"bēiguān","meaning":"Bi quan","type":"từ vựng","grammar":"悲观些看成功，乐观些看失败。 — Người bi quan trông mong thành thành công, người lạc quan học tập được từ những thất bại.","example":"悲观些看成功，乐观些看失败。"},{"hanzi":"背景","pinyin":"bèijǐng","meaning":"Hậu cảnh  Bối cảnh Nền","type":"từ vựng","grammar":"他们在画中背景有很多花。 — Họ có nhiều hoa trong nền của bức tranh.","example":"他们在画中背景有很多花。"},{"hanzi":"被子","pinyin":"bèizi","meaning":"Cái chăn Chăn bông","type":"từ vựng","grammar":"我把被子往下一推。 — Tôi đẩy chăn bông xuống.","example":"我把被子往下一推。"},{"hanzi":"本科","pinyin":"běnkē","meaning":"Khoa chính","type":"từ vựng","grammar":"在此期间，他们被称为 — Trong thời kỳ này, họ được gọi là sinh viên đại học.","example":"在此期间，他们被称为"},{"hanzi":"本领","pinyin":"běnlǐng","meaning":"Bản lĩnh","type":"từ vựng","grammar":"我们当前的任务是学习知识，练好本领。 — Nhiệm vụ hiện tại của chúng ta là học kiến thức và rèn luyện bản lĩnh.","example":"我们当前的任务是学习知识，练好本领。"},{"hanzi":"本质","pinyin":"běnzhí","meaning":"Bản chất","type":"từ vựng","grammar":"这是一个本质变化的时期。 — Đây là thời kỳ có những bản chất thay đổi.","example":"这是一个本质变化的时期。"},{"hanzi":"便","pinyin":"biàn","meaning":"Thêm Càng","type":"từ vựng","grammar":"我听了这消息便沉思起来。 — Khi biết tin, tôi càng thêm nghĩ về điều đó.","example":"我听了这消息便沉思起来。"},{"hanzi":"编辑","pinyin":"biānjí","meaning":"Biên tập","type":"từ vựng","grammar":"那位编辑恢复了镇静的态度。 — Biên tập viên lấy lại bình tĩnh.","example":"那位编辑恢复了镇静的态度。"},{"hanzi":"辩论","pinyin":"biànlùn","meaning":"Biện luận Tranh luận","type":"từ vựng","grammar":"最善言的演说家或最雄辩的辩论 家，往往不是最正直的思想家。 — Nhà hùng biện hùng hồn nhất hay nhà tranh luận hùng hồn nhất thường không phải là người suy nghĩ trung thực nhất.","example":"最善言的演说家或最雄辩的辩论 家，往往不是最正直的思想家。"},{"hanzi":"鞭炮","pinyin":"biānpào","meaning":"pháo","type":"từ vựng","grammar":"过年了，我要买烟花来放，爸爸却说要买鞭 炮。 — Ngày Tết, tôi muốn mua pháo hoa để đốt, nhưng bố tôi lại muốn mua đốt pháo dây.","example":"过年了，我要买烟花来放，爸爸却说要买鞭 炮。"},{"hanzi":"标点","pinyin":"biāodiǎn","meaning":"Dấu câu","type":"từ vựng","grammar":"朗读课文要注意标点符号的停顿 — Chú ý đến khoảng dừng của dấu câu khi đọc to văn bản.","example":"朗读课文要注意标点符号的停顿"},{"hanzi":"表格","pinyin":"biǎogé","meaning":"Bảng Biểu","type":"từ vựng","grammar":"FrontPage包含若干创建表格的工具。 — FrontPage chứa một số công cụ để tạo bảng.","example":"FrontPage包含若干创建表格的工具。"},{"hanzi":"表面","pinyin":"biǎomiàn","meaning":"Bề ngoài Bề mặt","type":"từ vựng","grammar":"星星颜色不同，是由于 — Màu sắc khác nhau của các ngôi sao là do nhiệt độ","example":"星星颜色不同，是由于"},{"hanzi":"表明","pinyin":"biǎomíng","meaning":"Thể hiện","type":"từ vựng","grammar":"他的行动表明了他是个诚实可靠的人。 — Hành động của anh ấy cho thấy anh ấy là một người đàn ông trung thực và đáng tin cậy.","example":"他的行动表明了他是个诚实可靠的人。"},{"hanzi":"表情","pinyin":"biǎoqíng","meaning":"Biểu tình Biểu cảm","type":"từ vựng","grammar":"他的表情却是富于感情的。 — Biểu cảm của anh ấy là cảm xúc.","example":"他的表情却是富于感情的。"},{"hanzi":"表示","pinyin":"biǎoshì","meaning":"Biểu thị Bày tỏ","type":"từ vựng","grammar":"她向我们表示了虚假的热情。 — Cô ấy bày tỏ sự nhiệt tình giả tạo với chúng tôi.","example":"她向我们表示了虚假的热情。"},{"hanzi":"表现","pinyin":"biǎoxiàn","meaning":"Biểu hiện","type":"từ vựng","grammar":"他往往会表现得更亲近些。 — Anh ấy có biểu hiện gần gũi hơn.","example":"他往往会表现得更亲近些。"},{"hanzi":"表演","pinyin":"biǎoyǎn","meaning":"Biểu diễn","type":"từ vựng","grammar":"观众对艺术家的精彩表演赞不绝 口。 — Khán giả hết lời khen ngợi màn trình diễn tuyệt vời của nghệ sĩ.","example":"观众对艺术家的精彩表演赞不绝 口。"},{"hanzi":"表扬","pinyin":"biǎoyáng","meaning":"Biểu dương Khen ngợi","type":"từ vựng","grammar":"你会得到哪一种表扬 呢？ — Bạn sẽ nhận được những lời khen ngợi nào?","example":"你会得到哪一种表扬 呢？"},{"hanzi":"标志","pinyin":"biāozhì","meaning":"Dấu hiệu Kí hiệu","type":"từ vựng","grammar":"那可能是某一事物的标志。 — Đó có thể là dấu hiệu của điều gì đó.","example":"那可能是某一事物的标志。"},{"hanzi":"彼此","pinyin":"bǐcǐ","meaning":"Lẫn nhau","type":"từ vựng","grammar":"我们为彼此的健康干 杯。 — Chúng tôi nâng ly chúc sức khỏe nhau.","example":"我们为彼此的健康干 杯。"},{"hanzi":"别","pinyin":"bié","meaning":"Khác","type":"từ vựng","grammar":"当心不要侵犯别人的权利。 — Hãy cẩn thận để không vi phạm quyền của người khác.","example":"当心不要侵犯别人的权利。"},{"hanzi":"毕竟","pinyin":"bìjìng","meaning":"cùng","type":"từ vựng","grammar":"虽然我回答了这个问 题，然而不一定正确， — Mặc dù tôi đã trả lời câu hỏi này, nhưng nó không hẳn là chính xác,","example":"虽然我回答了这个问 题，然而不一定正确，"},{"hanzi":"比例","pinyin":"bǐlì","meaning":"Tỷ lệ Tỷ số","type":"từ vựng","grammar":"画中左边那棵树不合比例。 — Cây bên trái trong hình không đúng tỷ lệ.","example":"画中左边那棵树不合比例。"},{"hanzi":"避免","pinyin":"bìmiǎn","meaning":"Tránh khỏi Thoát khỏi","type":"từ vựng","grammar":"别人的优 点，你未必学得来；但别人的缺 点，你可以避免。 — Bạn có thể không học được ưu điểm của người khác nhưng bạn có thể tránh được nhược điểm của người khác.","example":"别人的优 点，你未必学得来；但别人的缺 点，你可以避免。"},{"hanzi":"丙","pinyin":"bǐng","meaning":"Bính","type":"từ vựng","grammar":"小布什当然是纨裤子弟,当年混进耶鲁大学,是个丙等学生。 — Bush Jr tất nhiên là công tử nhà giàu ăn chơi, nhưng ông ấy vào Đại học Yale và xếp xếp hạng 3.","example":"小布什当然是纨裤子弟,当年混进耶鲁大学,是个丙等学生。"},{"hanzi":"病毒","pinyin":"bìngdú","meaning":"Bệnh dịch Bệnh","type":"từ vựng","grammar":"体力劳动是防止一切社会病毒的伟大的消毒 剂。 — Lao động chân tay là một chất khử trùng tuyệt vời để ngăn chặn tất cả các vi rút xã hội.","example":"体力劳动是防止一切社会病毒的伟大的消毒 剂。"},{"hanzi":"饼干","pinyin":"bǐnggān","meaning":"Bánh quy","type":"từ vựng","grammar":"他在饼干里加了肉桂。 — Anh ấy thêm quế vào bánh quy.","example":"他在饼干里加了肉桂。"},{"hanzi":"并且","pinyin":"bìngqiě","meaning":"đồng thời","type":"từ vựng","grammar":"我踢足球时踢到了玻 璃，并且把它踢碎了。 — Tôi đã đập kính khi chơi bóng và làm vỡ nó.","example":"我踢足球时踢到了玻 璃，并且把它踢碎了。"},{"hanzi":"冰箱","pinyin":"bīngxiāng","meaning":"Tủ lạnh","type":"từ vựng","grammar":"他一进门就扔下书包，还没换鞋就去开冰箱找冷饮。 — Anh ta ném cặp sách xuống ngay khi bước vào cửa, và mở tủ lạnh tìm đồ uống lạnh trước khi thay giày.","example":"他一进门就扔下书包，还没换鞋就去开冰箱找冷饮。"},{"hanzi":"必然","pinyin":"quèrán","meaning":"Tất nhiên Tất yếu Thế nào cũng","type":"từ vựng","grammar":"当一个人一心一意做好事情的时 候，他最终 — Khi một người hết lòng làm tốt công việc, thì cuối cùng người đó nhất","example":"当一个人一心一意做好事情的时 候，他最终"},{"hanzi":"比如","pinyin":"lìrú","meaning":"Ví dụ Chẳng hạn như","type":"từ vựng","grammar":"有几样好东西，比如阿斯匹林。 — Có một số thứ tốt, chẳng hạn như aspirin.","example":"有几样好东西，比如阿斯匹林。"},{"hanzi":"必须","pinyin":"bìxū","meaning":"Tất yếu Thế nào cũng","type":"từ vựng","grammar":"我们必须乐观地面对未来。 — Chúng ta phải lạc quan đối mặt với tương lai.","example":"我们必须乐观地面对未来。"},{"hanzi":"必要","pinyin":"bìyào","meaning":"Cấn thiết Thiết yếu Tất yếu","type":"từ vựng","grammar":"他递交了必要的装货单据。 — Anh ta đã nộp các tài liệu vận chuyển cần thiết.","example":"他递交了必要的装货单据。"},{"hanzi":"玻璃","pinyin":"bōlí","meaning":"Gương Thủy tinh","type":"từ vựng","grammar":"两只玻璃珠似的大眼睛里，闪动着青春、热情的光芒。 — Hai đôi mắt to tròn như hạt thủy tinh lóe lên sức trẻ và đam mê.","example":"两只玻璃珠似的大眼睛里，闪动着青春、热情的光芒。"},{"hanzi":"博士","pinyin":"bóshì","meaning":"Tiến sĩ","type":"từ vựng","grammar":"小明考上了博士,大家奔走相告。 — mọi người truyền tai nhau tin Tiểu Minh trúng tuyển Tiến sĩ.","example":"小明考上了博士,大家奔走相告。"},{"hanzi":"博物馆","pinyin":"bówùguǎn","meaning":"tàng","type":"từ vựng","grammar":"博物馆里陈列着新出土的文物。 — Bảo tàng trưng bày những di vật văn hóa mới được khai quật.","example":"博物馆里陈列着新出土的文物。"},{"hanzi":"脖子","pinyin":"bózi","meaning":"Cổ","type":"từ vựng","grammar":"我从来不低头，现在脖子也硬得铁筒一般。 — Tôi không bao giờ cúi đầu, và bây giờ cổ tôi cũng cứng như sắt.","example":"我从来不低头，现在脖子也硬得铁筒一般。"},{"hanzi":"布","pinyin":"bù","meaning":"(vải bố, tuyên bố)","type":"từ vựng","grammar":"那个老牧师懒洋洋地布道。 — Vị linh mục già giảng một cách uể oải.","example":"那个老牧师懒洋洋地布道。"},{"hanzi":"不好意思","pinyin":"bù hǎoyìsi","meaning":"","type":"từ vựng","grammar":"我都不好意思抓你了，你怎么还好意思偷呢？ — Ta đã không tiện bắt ngươi, sao lại xấu hổ đi ăn trộm?","example":"我都不好意思抓你了，你怎么还好意思偷呢？"},{"hanzi":"不耐烦","pinyin":"bú nàifán","meaning":"Sốt ruột Không kiên nhẫn","type":"từ vựng","grammar":"你那不耐烦的跺脚吓不了我。 — Sự dậm chân thiếu kiên nhẫn của bạn không thể làm tôi sợ.","example":"你那不耐烦的跺脚吓不了我。"},{"hanzi":"不安","pinyin":"bù’ān","meaning":"Bất an","type":"từ vựng","grammar":"听了这消息我心里很不安。 — Tôi rất băn khoăn sau khi nghe tin.","example":"听了这消息我心里很不安。"},{"hanzi":"不必","pinyin":"búbì","meaning":"cần thiết","type":"từ vựng","grammar":"话不必多 说，有诚意就行。 — Không cần nói nhiều, chỉ cần có sự chân thành.","example":"话不必多 说，有诚意就行。"},{"hanzi":"补充","pinyin":"bǔchōng","meaning":"Bổ sung","type":"từ vựng","grammar":"我的发言完了，老师又在旁边补充了两点。 — Sau khi tôi phát biểu xong, tôi được giáo viên ở bên cạnh bổ sung thêm hai điểm.","example":"我的发言完了，老师又在旁边补充了两点。"},{"hanzi":"不得了","pinyin":"bùdéliǎo","meaning":"Quá Quá sức Cực kì","type":"từ vựng","grammar":"他们已经逼得我进退不得了！ — Họ đã ép buộc tôi tới mức tiến không được được mà lùi cũng không xong!","example":"他们已经逼得我进退不得了！"},{"hanzi":"不断","pinyin":"búduàn","meaning":"ngừng","type":"từ vựng","grammar":"他不断地提出自己的要求。 — Anh ấy cứ đưa ra những yêu cầu của riêng mình.","example":"他不断地提出自己的要求。"},{"hanzi":"部分","pinyin":"bùfèn","meaning":"Bộ phận","type":"từ vựng","grammar":"不变性指的是一致的部分。 — Tính bất biến đề cập đến phần nhất quán.","example":"不变性指的是一致的部分。"},{"hanzi":"不见得","pinyin":"bújiàn dé","meaning":"Chưa chắc Chưa từng","type":"từ vựng","grammar":"半真半假的话不见得比说谎要好. — Một nửa sự thật chưa chắc tốt hơn nói dối.","example":"半真半假的话不见得比说谎要好."},{"hanzi":"部门","pinyin":"bùmén","meaning":"Bộ môn; ngành; chi; nhánh, bộ phận","type":"từ vựng","grammar":"这项计划牵涉到许多部门。 — Kế hoạch này liên quan đến nhiều phòng ban.","example":"这项计划牵涉到许多部门。"},{"hanzi":"不免","pinyin":"bùmiǎn","meaning":"Không tránh được Sao khỏi","type":"từ vựng","grammar":"他每次被召见，心里总不免惴惴不安。 — Mỗi lần bị triệu tập, trong lòng anh ấy luôn lo sợ bất an.","example":"他每次被召见，心里总不免惴惴不安。"},{"hanzi":"不然","pinyin":"bùrán","meaning":"Không phải Không phải vậy Nếu không thì","type":"từ vựng","grammar":"我怀疑她生病了，不然她不会缺课的。 — Tôi nghi ngờ cô ấy bị ốm rồi, nếu không cô ấy đã không nghỉ học.","example":"我怀疑她生病了，不然她不会缺课的。"},{"hanzi":"不如","pinyin":"bùrú","meaning":"Không bằng Thua kém hơn","type":"từ vựng","grammar":"与其哭着忍受，不如笑着享受。 — Thay vì khóc và chịu đựng, tốt hơn là bạn nên cười và tận hưởng.","example":"与其哭着忍受，不如笑着享受。"},{"hanzi":"不要紧","pinyin":"búyàojǐn","meaning":"Không sao cả Không hề gì","type":"từ vựng","grammar":"我决定了要成为海贼王便要为此而战，就算死也不要紧。 — Tôi quyết định rằng nếu tôi muốn trở thành One Piece, tôi sẽ chiến đấu vì nó, ngay cả khi tôi chết.","example":"我决定了要成为海贼王便要为此而战，就算死也不要紧。"},{"hanzi":"步骤","pinyin":"bùzhòu","meaning":"Bước Bước đi Trình tự","type":"từ vựng","grammar":"对测定方 法、步骤及影响因素做了详细介 绍。 — Các phương pháp đo lường, các bước và các yếu tố ảnh hưởng được giới thiệu chi tiết.","example":"对测定方 法、步骤及影响因素做了详细介 绍。"},{"hanzi":"不足","pinyin":"bùzú","meaning":"Chưa đạt","type":"từ vựng","grammar":"人多不足以依赖,要生存只要靠自 己。 — Có quá nhiều người cũng không thể dựa dẫm, bạn chỉ cần dựa vào chính mình để tồn tại.","example":"人多不足以依赖,要生存只要靠自 己。"},{"hanzi":"踩","pinyin":"cǎi","meaning":"Dẫm Đạp Dậm (chân)","type":"từ vựng","grammar":"他不知道她是脚踩两只船。 — Anh không biết rằng cô đang bắt cá hai tay.","example":"他不知道她是脚踩两只船。"},{"hanzi":"财产","pinyin":"cáichǎn","meaning":"Tài sản Của cải","type":"từ vựng","grammar":"他能随意处置一大笔财产。 — Anh ta có thể định đoạt một lượng lớn tài sản theo ý muốn.","example":"他能随意处置一大笔财产。"},{"hanzi":"采访","pinyin":"cǎifǎng","meaning":"Phỏng vấn","type":"từ vựng","grammar":"你知道我为什么想采访你吗？ — Bạn có biết tại sao tôi muốn phỏng vấn bạn không?","example":"你知道我为什么想采访你吗？"},{"hanzi":"彩虹","pinyin":"cǎihóng","meaning":"Cầu vồng","type":"từ vựng","grammar":"青春如同雨后的彩虹， — Tuổi trẻ giống như cầu vồng sau cơn","example":"青春如同雨后的彩虹，"},{"hanzi":"采取","pinyin":"cǎiqǔ","meaning":"Áp dụng Dùng Thực hành","type":"từ vựng","grammar":"要跟成功者有同样的结果，就必须采取同样的行动。 — Để có kết quả giống như những người thành thành công, bạn phải thực hiện các hành động tương tự.","example":"要跟成功者有同样的结果，就必须采取同样的行动。"},{"hanzi":"残疾","pinyin":"cánjí","meaning":"Tàn tật","type":"từ vựng","grammar":"残疾人的成功通常不易招致嫉妒。 — Thành công của người khuyết tật thường không dễ dẫn đến sự ghen tị.","example":"残疾人的成功通常不易招致嫉妒。"},{"hanzi":"参考","pinyin":"cānkǎo","meaning":"khảo","type":"từ vựng","grammar":"我提供的情况仅供老师处理问题时作参考。 — Thông tin tôi cung cấp chỉ mang tính chất tham khảo khi giáo viên xử lý vấn đề.","example":"我提供的情况仅供老师处理问题时作参考。"},{"hanzi":"惭愧","pinyin":"cánkuì","meaning":"Xấu hổ Hổ thẹn","type":"từ vựng","grammar":"他很惭愧，因为刚才自己说了谎 话。 — Anh xấu hổ vì vừa rồi anh nói dối.","example":"他很惭愧，因为刚才自己说了谎 话。"},{"hanzi":"餐厅","pinyin":"cāntīng","meaning":"Phòng ăn  Nhà ăn","type":"từ vựng","grammar":"我家对面新开了一家餐厅,顾客源源不断,门庭若市,生意非常红火。 — Một nhà hàng mới được mở đối diện nhà tôi, với lượng khách hàng ổn định và công việc kinh doanh phát đạt.","example":"我家对面新开了一家餐厅,顾客源源不断,门庭若市,生意非常红火。"},{"hanzi":"参与","pinyin":"cānyù","meaning":"Tham gia Tham dự","type":"từ vựng","grammar":"这次聚会你必须参与，否则你将会失去一次好机会。 — Bạn phải tham gia vào cuộc tụ họp này, nếu không bạn sẽ đánh mất cơ hội tốt.","example":"这次聚会你必须参与，否则你将会失去一次好机会。"},{"hanzi":"操场","pinyin":"cāochǎng","meaning":"trường","type":"từ vựng","grammar":"我们的操场延伸到那些树前。 — Sân chơi của chúng tôi mở rộng đến chỗ chỗ những cái cây kia.","example":"我们的操场延伸到那些树前。"},{"hanzi":"操心","pinyin":"cāoxīn","meaning":"Lo nghĩ","type":"từ vựng","grammar":"教师工作，操心费力， — Giáo viên làm việc nhọc lòng tốn sức, nhưng tận","example":"教师工作，操心费力，"},{"hanzi":"册","pinyin":"cè","meaning":"Quyển cuốn","type":"từ vựng","grammar":"其中，精华的不超过 100 册。 — Trong số đó, tinh hoa không quá 100 quyển.","example":"其中，精华的不超过 100 册。"},{"hanzi":"曾经","pinyin":"céngjīng","meaning":"Đã từng","type":"từ vựng","grammar":"李曾经使我忙得不可开交。 — Lí đã từng khiến tôi bận rộn đến mức tối tăm mặt mặt mày.","example":"李曾经使我忙得不可开交。"},{"hanzi":"厕所","pinyin":"cèsuǒ","meaning":"sinh","type":"từ vựng","grammar":"我肚子痛，要上厕所大便。 — Tôi bị đau bụng và cần đi đại tiện.","example":"我肚子痛，要上厕所大便。"},{"hanzi":"测验","pinyin":"cèyàn","meaning":"Thực nghiệm","type":"từ vựng","grammar":"测验一个人的智力是否属于上乘，只看脑子里能否同时容纳两种相反的思想，而无碍于其处世行事。 — Để kiểm tra xem trí thông minh của một người có vượt trội hay không, chỉ để xem liệu tâm trí có thể chứa hai suy nghĩ trái ngược nhau cùng một lúc mà không cản trở hành vi của người đó trong thế giới bên ngoài hay không.","example":"测验一个人的智力是否属于上乘，只看脑子里能否同时容纳两种相反的思想，而无碍于其处世行事。"},{"hanzi":"插","pinyin":"chā","meaning":"Cắm Đút","type":"từ vựng","grammar":"他把双手插在裤子口袋里。 — Anh đút tay vào túi quần.","example":"他把双手插在裤子口袋里。"},{"hanzi":"差别","pinyin":"chābié","meaning":"biệt","type":"từ vựng","grammar":"没有多大差别，完全一样。 — Không chênh lệch nhiều, giống hệt nhau.","example":"没有多大差别，完全一样。"},{"hanzi":"拆","pinyin":"chāi","meaning":"Mở ra Tháo ra Gỡ ra","type":"từ vựng","grammar":"这种谎言很容易被人拆穿。 — Loại dối trá này rất dễ bị vạch trần.","example":"这种谎言很容易被人拆穿。"},{"hanzi":"常识","pinyin":"chángshì","meaning":"Thường thấy","type":"từ vựng","grammar":"古人常识无遗力，少壮工夫老始 成。 — Lẽ thường của người xưa là nhân lúc trẻ khỏe dốc sức học hành làm làm làm lụng, về già thành danh.","example":"古人常识无遗力，少壮工夫老始 成。"},{"hanzi":"长途","pinyin":"chángtú","meaning":"dài","type":"từ vựng","grammar":"长途跋涉使他筋疲力 尽。 — Chuyến đi dài khiến anh kiệt sức.","example":"长途跋涉使他筋疲力 尽。"},{"hanzi":"产品","pinyin":"chǎnpǐn","meaning":"Sản phẩm","type":"từ vựng","grammar":"开发的是市场而不是产品。 — Những gì đang phát triển là thị trường, không phải sản phẩm.","example":"开发的是市场而不是产品。"},{"hanzi":"产生","pinyin":"chǎnshēng","meaning":"Sản sinh Nảy sinh Xuất hiện","type":"từ vựng","grammar":"新老师刚 来，就使孩子们产生了好感。 — Ngay khi cô giáo mới đến, các con đã có ấn tượng tốt.","example":"新老师刚 来，就使孩子们产生了好感。"},{"hanzi":"朝","pinyin":"cháo","meaning":"ngoảnh mặt về; hướng về","type":"từ vựng","grammar":"他一头说，一头朝门口走。 — Anh nói, và đi về phía cửa.","example":"他一头说，一头朝门口走。"},{"hanzi":"炒","pinyin":"chǎo","meaning":"Xào Món xào","type":"từ vựng","grammar":"他被新来的厂长炒了鱿鱼。 — Anh ta bị giám đốc mới sa thải.","example":"他被新来的厂长炒了鱿鱼。"},{"hanzi":"抄","pinyin":"chāo","meaning":"Sao Sao chép","type":"từ vựng","grammar":"我穿过田野抄近路去上学。 — Tôi băng qua những cánh đồng để đến trường.","example":"我穿过田野抄近路去上学。"},{"hanzi":"朝代","pinyin":"cháodài","meaning":"Triều đại","type":"từ vựng","grammar":"朝代不同，眉毛的式样也不同。 — Các triều đại khác nhau có các kiểu lông mày khác nhau.","example":"朝代不同，眉毛的式样也不同。"},{"hanzi":"吵架","pinyin":"chǎojià","meaning":"Cãi nhau","type":"từ vựng","grammar":"吵架永远不嫌晚，道歉总是嫌太 迟。 — Không bao giờ là quá muộn để tranh cãi, luôn luôn là quá muộn để nói lời xin lỗi.","example":"吵架永远不嫌晚，道歉总是嫌太 迟。"},{"hanzi":"叉子","pinyin":"chāzi","meaning":"Cãi dĩa Nĩa Xiên Ngã ba","type":"từ vựng","grammar":"西南边的河叉子已经被冻得很结实了。 — Ngã ba sông ở phía Tây Nam đã bị đóng băng rất mạnh.","example":"西南边的河叉子已经被冻得很结实了。"},{"hanzi":"彻底","pinyin":"chèdǐ","meaning":"Triệt để Đến cùng","type":"từ vựng","grammar":"这一切彻底没希望了，我觉得眼前一片黑暗。 — Tất cả điều này là hoàn toàn vô vọng, và tôi cảm thấy bóng tối trước mắt.","example":"这一切彻底没希望了，我觉得眼前一片黑暗。"},{"hanzi":"车库","pinyin":"chēkù","meaning":"Gara Nhà để xe ô tô","type":"từ vựng","grammar":"家的现代概念是：人从车库里出来后要去的地方。 — Khái niệm hiện đại về nhà là: nơi mọi người đi sau khi họ ra khỏi nhà để xe.","example":"家的现代概念是：人从车库里出来后要去的地方。"},{"hanzi":"趁","pinyin":"chèn","meaning":"Thừa dịp","type":"từ vựng","grammar":"我趁他忙乱的时候逃走了。 — Tôi chạy đi trong lúc anh ta đang vội vàng.","example":"我趁他忙乱的时候逃走了。"},{"hanzi":"称","pinyin":"chēng","meaning":"Xưng Gọi Hô","type":"từ vựng","grammar":"HTML 使用称为标记的样式名。 — HTML sử dụng tên kiểu được gọi là thẻ.","example":"HTML 使用称为标记的样式名。"},{"hanzi":"承担","pinyin":"chéngdān","meaning":"Đảm đương Gánh vác","type":"từ vựng","grammar":"该桥承担着东西向的交通。 — Cầu này đảm nhận giao thông đông tây.","example":"该桥承担着东西向的交通。"},{"hanzi":"程度","pinyin":"chéngdù","meaning":"Trình độ Mức độ","type":"từ vựng","grammar":"句子都狂妄到野蛮的程度。 — Những câu nói ngạo mạn đến mức dã man.","example":"句子都狂妄到野蛮的程度。"},{"hanzi":"成分","pinyin":"chéngfèn","meaning":"phần","type":"từ vựng","grammar":"非活性的成分也是重要的。 — Các thành phần không hoạt động cũng rất quan trọng.","example":"非活性的成分也是重要的。"},{"hanzi":"成果","pinyin":"chéngguǒ","meaning":"Thành quả  Kết quả","type":"từ vựng","grammar":"成功是他多年工作的成果。 — Thành công là kết quả của nhiều năm làm việc của anh ấy.","example":"成功是他多年工作的成果。"},{"hanzi":"成就","pinyin":"chéngjiù","meaning":"tựu","type":"từ vựng","grammar":"他的成就,是苦心孤诣的结果。 — Thành quả của anh ấy là kết quả của những nỗ lực không ngừng nghỉ.","example":"他的成就,是苦心孤诣的结果。"},{"hanzi":"诚恳","pinyin":"chéngkěn","meaning":"khẩn","type":"từ vựng","grammar":"她的态度几乎是相当诚恳。 — Thái độ của cô ấy gần như là chân thành.","example":"她的态度几乎是相当诚恳。"},{"hanzi":"成立","pinyin":"chénglì","meaning":"lập","type":"từ vựng","grammar":"同年，威斯康星大学成立。 — Cùng năm, Đại học Wisconsin được thành lập.","example":"同年，威斯康星大学成立。"},{"hanzi":"承认","pinyin":"chéngrèn","meaning":"Thừa nhận","type":"từ vựng","grammar":"他在老师面前战战兢兢地承认了自己的错误。 — Anh run rẩy nhận lỗi của mình trước cô giáo.","example":"他在老师面前战战兢兢地承认了自己的错误。"},{"hanzi":"程序","pinyin":"chéngxù","meaning":"Trình tự","type":"từ vựng","grammar":"双方代表首先讨论了会谈的程序。 — Đại diện của hai bên lần đầu tiên thảo luận về các trình tự của cuộc hội đàm.","example":"双方代表首先讨论了会谈的程序。"},{"hanzi":"成语","pinyin":"chéngyǔ","meaning":"ngữ","type":"từ vựng","grammar":"这是暗喻他自己的失败的成语。 — Đây là một thành ngữ ẩn dụ về sự thất bại của chính anh ta.","example":"这是暗喻他自己的失败的成语。"},{"hanzi":"称赞","pinyin":"chēngzàn","meaning":"Tán thưởng Khoan nghênh Khen ngợi","type":"từ vựng","grammar":"听着妈妈温柔的称赞，我的心头感到非常温 暖。 — Nghe mẹ khen hiền mà lòng tôi ấm áp vô cùng.","example":"听着妈妈温柔的称赞，我的心头感到非常温 暖。"},{"hanzi":"成长","pinyin":"chéng zhǎng","meaning":"thành","type":"từ vựng","grammar":"成长路上，有快乐，有幸福；有苦涩，有艰 辛。 — Trên con đường trưởng thành, có niềm vui hạnh phúc và hạnh phúc, có cay đắng và gian khổ.","example":"成长路上，有快乐，有幸福；有苦涩，有艰 辛。"},{"hanzi":"沉默","pinyin":"chénmò","meaning":"Trầm mặc","type":"từ vựng","grammar":"他因浑俗如光的沉默而受到人们的批评。 — Anh bị chỉ trích vì sự im lặng trầm mặc của mình.","example":"他因浑俗如光的沉默而受到人们的批评。"},{"hanzi":"车厢","pinyin":"chēxiāng","meaning":"Toa hàng khách Thùng xe ô tô","type":"từ vựng","grammar":"我挤在闷热的车厢里喘不过气来。 — Tôi chen chúc bị ép vào trong khoangcỗ xe ngột ngạt không thở được, hụt hơi.","example":"我挤在闷热的车厢里喘不过气来。"},{"hanzi":"翅膀","pinyin":"chìbǎng","meaning":"Đôi cánh","type":"từ vựng","grammar":"小鸡集聚在母鸡翅膀下面。 — Những chú gà con quây quần dưới cánh gà mẹ.","example":"小鸡集聚在母鸡翅膀下面。"},{"hanzi":"吃亏","pinyin":"chīkuī","meaning":"thòi","type":"từ vựng","grammar":"他宁可自己受损，也不让别人吃 亏。 — Anh thà tự làm khổ mình còn hơn để người khác chịu thiệt.","example":"他宁可自己受损，也不让别人吃 亏。"},{"hanzi":"持续","pinyin":"chíxù","meaning":"Tiếp tục","type":"từ vựng","grammar":"电的流动只持续短暂时间。 — Dòng điện chỉ tồn tại trong thời gian ngắn.","example":"电的流动只持续短暂时间。"},{"hanzi":"池子","pinyin":"chízi","meaning":"Vũng","type":"từ vựng","grammar":"坐落在北京东城区南池子大街南日东边，靠近故宫东侧。 — Nó nằm ở khu Đông Thành Bắc Kinh, trên phía đông của phố Nam Trì, phía Đông của Nam Nhật, Bắc Kinh, gần phía đông của Cố CungTử Cấm Thành.","example":"坐落在北京东城区南池子大街南日东边，靠近故宫东侧。"},{"hanzi":"尺子","pinyin":"chǐzi","meaning":"Thước kẻ","type":"từ vựng","grammar":"这把尺子太长了，请再给我拿一 把。 — Cái thước này dài quá, làm ơn lấy cho tôi cái khác.","example":"这把尺子太长了，请再给我拿一 把。"},{"hanzi":"冲","pinyin":"chōng","meaning":"Xông","type":"từ vựng","grammar":"这种茶叶经得起多次冲泡。 — Loại trà này có thể pha được nhiều lầnchịu được nhiều lần pha.","example":"这种茶叶经得起多次冲泡。"},{"hanzi":"充电器","pinyin":"chōngdiàn qì","meaning":"Bộ sạc điện","type":"từ vựng","grammar":"冲过一条堵满了叫卖汽车坐垫和手机充电器的小贩的街道后，他们在尖叫声和拥抱中重逢。 — Sau khi lao qua một con phố đầy những sạp người giao hàng bán ngồi trên ghế nệm xe hơi và sạc cùng điện thoại sạc đầy pin, họ gặp lại nhau trong tiếng rao mời ầm ĩ hét và những cái ôm.","example":"冲过一条堵满了叫卖汽车坐垫和手机充电器的小贩的街道后，他们在尖叫声和拥抱中重逢。"},{"hanzi":"充分","pinyin":"chōngfèn","meaning":"Dồi dào Đầy đủ","type":"từ vựng","grammar":"此项诺言得到了充分实现。 — Lời hứa này đã được thực hiện đầy đủ.","example":"此项诺言得到了充分实现。"},{"hanzi":"重复","pinyin":"chóngfù","meaning":"Lặp lại lần nữa","type":"từ vựng","grammar":"老师将考试中的注意事项重复了一遍。 — Cô giáo nhắc lại 1 lần những lưu ý trong đề thi.","example":"老师将考试中的注意事项重复了一遍。"},{"hanzi":"充满","pinyin":"chōngmǎn","meaning":"Lấp đầy Làm đầyây Tràn đầy","type":"từ vựng","grammar":"春天，它他轻轻地吹了一口气，带给我们一片充满生机的绿色。 — Hơi thở mùa xuân nhẹ nhàng thổi đếnMùa xuân, anh nhẹ nhàng thở ra, mang đến cho chúng tôi một màu xanh đầy sức sống.","example":"春天，它他轻轻地吹了一口气，带给我们一片充满生机的绿色。"},{"hanzi":"宠物","pinyin":"chǒngwù","meaning":"Vật nuôi Sủng vật","type":"từ vựng","grammar":"宠物店里的小狗很可 爱，有的在玩耍，有的在打闹，还有的在睡 觉。 — Những chú chó con trong cửa hàng thú cưng rất dễ thương, một số đang chơi, một số đang đùa nghịch và một số đang ngủ.","example":"宠物店里的小狗很可 爱，有的在玩耍，有的在打闹，还有的在睡 觉。"},{"hanzi":"臭","pinyin":"chòu","meaning":"Hôi","type":"từ vựng","grammar":"你得付钱才能闻这种臭气。 — Bạn phải trả tiền để ngửi mùi hôi này.","example":"你得付钱才能闻这种臭气。"},{"hanzi":"丑","pinyin":"chǒu","meaning":"Xấu","type":"từ vựng","grammar":"在大家的印象中雨是一个很丑的女孩子。 — Trong ấn tượng của mọi người, mưaVũ là một cô gái xấu xí.","example":"在大家的印象中雨是一个很丑的女孩子。"},{"hanzi":"抽屉","pinyin":"chōutì","meaning":"kéo","type":"từ vựng","grammar":"这抽屉太紧了，我打不开。 — Ngăn kéo này quá chặt khiến tôi không thể mở được.","example":"这抽屉太紧了，我打不开。"},{"hanzi":"抽象","pinyin":"chōuxiàng","meaning":"Trừu tượng","type":"từ vựng","grammar":"钱对她来说就是个抽象的东西，她从不去想 钱。 — Tiền là một thứ trừu tượng với cô ấy, cô không bao giờ nghĩ đến tiền.","example":"钱对她来说就是个抽象的东西，她从不去想 钱。"},{"hanzi":"除","pinyin":"chú","meaning":"Trừ","type":"từ vựng","grammar":"除父母外，无人能帮助我。 — Không ai có thể giúp tôi ngoại trừ cha mẹ tôi.","example":"除父母外，无人能帮助我。"},{"hanzi":"传播","pinyin":"chuánbōò","meaning":"Phổ biến","type":"từ vựng","grammar":"传播知识，就是播种希望，播种幸福。 — Truyền bá kiến thức là gieo hy vọng và hạnh phúc.","example":"传播知识，就是播种希望，播种幸福。"},{"hanzi":"传递","pinyin":"chuándì","meaning":"Chuyền Chuyển","type":"từ vựng","grammar":"这封信在传递中被耽误了。 — Bức thư đã bị chậm trễ trong việc giao hàng.","example":"这封信在传递中被耽误了。"},{"hanzi":"闯","pinyin":"chuǎng","meaning":"Đâm bổ","type":"từ vựng","grammar":"他们吵吵嚷嚷地闯入房间。 — Họ nói chuyện ồn ào xông vào phòng ồn ào.","example":"他们吵吵嚷嚷地闯入房间。"},{"hanzi":"窗户","pinyin":"chuānghù","meaning":"Cửa sổ","type":"từ vựng","grammar":"恐怕会下 雨，把窗户关上。 — Tôi sợ trời sẽ mưa, hãy đóng cửa sổ lại.","example":"恐怕会下 雨，把窗户关上。"},{"hanzi":"窗帘","pinyin":"chuānglián","meaning":"Rèm cửa","type":"từ vựng","grammar":"阳光晒得窗帘褪了色。 — Nắng đã làm bạc màu rèm cửa sổ.","example":"阳光晒得窗帘褪了色。"},{"hanzi":"创造","pinyin":"chuàngzào","meaning":"Sáng tạo Tạo ra cái mới","type":" pinyin":"děnghòu","meaning":"Chờ đợi","type":"từ vựng","grammar":"他们排着队等候看电 影。 — Họ xếp hàng dài đợi để xem phim.","example":"他们排着队等候看电 影。"},{"hanzi":"等于","pinyin":"děngyú","meaning":"Bằng với","type":"từ vựng","grammar":"两个错误不等于一个正确。 — Hai lỗi sai không bằng một lần sửa saiđúng.","example":"两个错误不等于一个正确。"},{"hanzi":"递","pinyin":"dì","meaning":"Chuyển Đưa","type":"từ vựng","grammar":"我递给他绳子，他接住了。 — Tôi đưa cho anh ấy sợi dây, và anh ấy đã bắt được.","example":"我递给他绳子，他接住了。"},{"hanzi":"滴","pinyin":"dī","meaning":"Tí tách (âm thanh)","type":"từ vựng","grammar":"雨滴滴嗒嗒地落在屋顶上。 — Mưa tí ta tí tách/ trên mái nhà.","example":"雨滴滴嗒嗒地落在屋顶上。"},{"hanzi":"电池","pinyin":"diànchí","meaning":"Pin","type":"từ vựng","grammar":"他给汽车的电池充了 电。 — Anh ấy đã sạc ắc quy cho xe.","example":"他给汽车的电池充了 电。"},{"hanzi":"电台","pinyin":"diàntái","meaning":"Đài truyền hình","type":"từ vựng","grammar":"收听电台广播是奶奶每天都要做的事情。 — Nghe đài là việc bà ngoại làm hàng ngày.","example":"收听电台广播是奶奶每天都要做的事情。"},{"hanzi":"点头","pinyin":"diǎntóu","meaning":"Gật đầu","type":"từ vựng","grammar":"小树摆动着枝叶，向我们点头笑。 — Cây nhỏ đung đưa cành và gật đầu mỉm cười với chúng tôi.","example":"小树摆动着枝叶，向我们点头笑。"},{"hanzi":"电信","pinyin":"diànxìn","meaning":"Điện tín","type":"từ vựng","grammar":"我开始拼命地研究无线电信标。 — Tôi bắt đầu lao vào dốc sức nghiên cứu các điện tín hiệu vô tuyến một cách tuyệt vọng.","example":"我开始拼命地研究无线电信标。"},{"hanzi":"钓","pinyin":"diào","meaning":"Móc, câu","type":"từ vựng","grammar":"钓鱼吗？ 这是我最喜欢的。 — Câu cá? Đó là sở thích của tôi.","example":"钓鱼吗？ 这是我最喜欢的。"},{"hanzi":"地理","pinyin":"dìlǐ","meaning":"Địa lí","type":"từ vựng","grammar":"我对地理只是一知半 解。 — Tôi chỉ biết một chút về địa lý.","example":"我对地理只是一知半 解。"},{"hanzi":"顶","pinyin":"dǐng","meaning":"Đỉnh, ngọon Chóp","type":"từ vựng","grammar":"我小妹有一顶红色游泳帽。 — Em gái tôi có một chiếc mũ bơi màu đỏ.","example":"我小妹有一顶红色游泳帽。"},{"hanzi":"丁","pinyin":"dīng","meaning":"Con trai Chỉ ng làm việc gì đó…. Họ: Đinh","type":"từ vựng","grammar":"她把布丁从窗户倒出去了。 — Cô ấy đổ bánh pudding ra ngoài cửa sổ.","example":"她把布丁从窗户倒出去了。"},{"hanzi":"地区","pinyin":"dìqū","meaning":"Khu vực","type":"từ vựng","grammar":"这一地区的水分状况怎样？ — Điều kiện nước trong khu vực này như thế nàolà gì?","example":"这一地区的水分状况怎样？"},{"hanzi":"的确","pinyin":"díquè","meaning":"Chính xác","type":"từ vựng","grammar":"他明天的确要去北京出差的。 — Anh ấy đúng là đi công tác đến Bắc Kinh vào ngày mai.","example":"他明天的确要去北京出差的。"},{"hanzi":"敌人","pinyin":"dírén","meaning":"Kẻ địch","type":"từ vựng","grammar":"我们的敌人完全被歼灭了。 — Kẻ thù của ta đã bị tiêu diệt hoàn toàn.","example":"我们的敌人完全被歼灭了。"},{"hanzi":"地毯","pinyin":"dìtǎn","meaning":"Thảm","type":"từ vựng","grammar":"我细看着米色地毯上的花纹。 — Tôi nhìn kỹ hoa văn trên tấm thảm màu be.","example":"我细看着米色地毯上的花纹。"},{"hanzi":"地位","pinyin":"dìwèi","meaning":"Địa vị Vị trí","type":"từ vựng","grammar":"我们这时正处有利的地位。 — Bây giờ chúng tôi đang ở một vị trí tốt.","example":"我们这时正处有利的地位。"},{"hanzi":"地震","pinyin":"dìzhèn","meaning":"Địa chấn Động đất","type":"từ vựng","grammar":"地震资料的质量变化巨大。 — Chất lượng của dữ liệu địa chấn rất khác nhau.","example":"地震资料的质量变化巨大。"},{"hanzi":"洞","pinyin":"dòng","meaning":"Hang động Động Lỗ","type":"từ vựng","grammar":"那鸟在冰上啄出了一个洞。 — Con chim đã mổ một lỗ trên băng.","example":"那鸟在冰上啄出了一个洞。"},{"hanzi":"冻","pinyin":"dòng","meaning":"Đông (lạnh)","type":"từ vựng","grammar":"窗户给冻上了，我打不开。 — Cửa sổ bị đông cứng và tôi không thể mở được.","example":"窗户给冻上了，我打不开。"},{"hanzi":"动画片","pinyin":"dònghuà piàn","meaning":"Phim hoạt hình","type":"từ vựng","grammar":"小弟弟高兴地看动画片 — Em trai vui vẻ khi xem phim hoạt hình.","example":"小弟弟高兴地看动画片"},{"hanzi":"逗","pinyin":"dòu","meaning":"Đùa giỡn Pha trò Đậu","type":"từ vựng","grammar":"月亮是豆子般的一颗小粒。 — Mặt trăng là một hạt nhỏ như hạt đậu.","example":"月亮是豆子般的一颗小粒。"},{"hanzi":"豆腐","pinyin":"dòufu","meaning":"Đậu phụ","type":"từ vựng","grammar":"我非常喜欢那儿的臭豆腐。 — Tôi thích món đậu phụ thối ở đó lắm.","example":"我非常喜欢那儿的臭豆腐。"},{"hanzi":"短信","pinyin":"duǎnxìn","meaning":"Tin nhắn","type":"từ vựng","grammar":"给我写封短信告诉我你来的时间。 — Viết cho tôi một tin nhắn cho tôi biết thời bạn đếnkhi bạn ở đây.","example":"给我写封短信告诉我你来的时间。"},{"hanzi":"堵车","pinyin":"dǔchē","meaning":"Kẹt xe","type":"từ vựng","grammar":"我之所以迟到，是因为堵车。 — Tôi đã đến muộn vì tắc đường.","example":"我之所以迟到，是因为堵车。"},{"hanzi":"堆","pinyin":"du ī","meaning":"Đống","type":"từ vựng","grammar":"他只好把这些全挤在一堆。 — Anh ấy đành phải ép tất cả thành một đống.","example":"他只好把这些全挤在一堆。"},{"hanzi":"对比","pinyin":"duìbǐ","meaning":"So với Đối với","type":"từ vựng","grammar":"用自己的逆境与别人的顺境对比，是糊涂。 — Thật bối rối khi so sánh nghịch cảnh của chính mình với sự thịnh vượng của người khác.","example":"用自己的逆境与别人的顺境对比，是糊涂。"},{"hanzi":"对待","pinyin":"duìdài","meaning":"Đối đãi Đối xử","type":"từ vựng","grammar":"你这样对待学生，太简单粗暴了。 — Bạn đối xử với học sinh như vậy là quá qua quýtđơn giản và thô lỗ.","example":"你这样对待学生，太简单粗暴了。"},{"hanzi":"对方","pinyin":"duìfāng","meaning":"Đối phương Bên kia","type":"từ vựng","grammar":"对方在谈判中还没有关门。 — Bên kia vẫn chưađã không đóng cửa trong cuộc đàm phán.","example":"对方在谈判中还没有关门。"},{"hanzi":"对手","pinyin":"duìshǒu","meaning":"Đối thủ","type":"từ vựng","grammar":"感谢对手，感谢敌人，是乐观。 — Cảm ơn đối thủ, cảm ơn kẻ địch, là lạc quan.","example":"感谢对手，感谢敌人，是乐观。"},{"hanzi":"对象","pinyin":"duìxiàng","meaning":"Đối tượng","type":"từ vựng","grammar":"属性依对象的类型而变化。 — Các thuộc tính khác nhau tùy thuộc vào loại đối tượng.","example":"属性依对象的类型而变化。"},{"hanzi":"对于","pinyin":"duìyú","meaning":"Đối với","type":"từ vựng","grammar":"对于这个我不会信口开河。 — Tôi sẽ không nói về nó.","example":"对于这个我不会信口开河。"},{"hanzi":"独立","pinyin":"dúlì","meaning":"Độc lập","type":"từ vựng","grammar":"你从现在起可以独立工作了。 — Bạn có thể làm việc độc lập từ bây giờ.","example":"你从现在起可以独立工作了。"},{"hanzi":"吨","pinyin":"dūn","meaning":"Tấn","type":"từ vựng","grammar":"每吨矿砂的净利达 20 美元。 — Lợi nhuận ròng trên mỗi tấn quặng là 20 đô la Mỹ.","example":"每吨矿砂的净利达 20 美元。"},{"hanzi":"蹲","pinyin":"dūn","meaning":"Quỳ","type":"từ vựng","grammar":"他们蹲在荫翳的山坡 上。 — Họ quỳ xổm trên sườn đồi râm mát.","example":"他们蹲在荫翳的山坡 上。"},{"hanzi":"躲藏","pinyin":"duǒcáng","meaning":"tránh","type":"từ vựng","grammar":"他们劝她先躲藏一下。 — Họ khuyên cô nên trốn trước.","example":"他们劝她先躲藏一下。"},{"hanzi":"多亏","pinyin":"duōkuī","meaning":"May làm sao","type":"từ vựng","grammar":"我们搬家那天，多亏邻居们来帮 忙。 — Vào ngày chúng tôi chuyển đi, may làm sao nhờ sự giúp đỡ của hàng xóm.","example":"我们搬家那天，多亏邻居们来帮 忙。"},{"hanzi":"多余","pinyin":"duōyú","meaning":"Dư thừa Thừa thãi","type":"từ vựng","grammar":"这种客套未免有点儿多余 — Lễ phép kiểu này hơi thừa","example":"这种客套未免有点儿多余"},{"hanzi":"独特","pinyin":"dútè","meaning":"Độc đáo","type":"từ vựng","grammar":"我有自己奇怪的独特的路。 — Tôi có con đường lạ và độc đáo của riêng mình.","example":"我有自己奇怪的独特的路。"},{"hanzi":"恶劣","pinyin":"èliè","meaning":"Ác liệt","type":"từ vựng","grammar":"恶劣的天气使我不能动身。 — Thời tiết xấu đã ngăn cản tôi ra đi.","example":"恶劣的天气使我不能动身。"},{"hanzi":"发愁","pinyin":"fāchóu","meaning":"Phát sầu","type":"từ vựng","grammar":"不要为这事发愁。 — Đừng vì chuyện này mà u sầu.","example":"不要为这事发愁。"},{"hanzi":"发达","pinyin":"fādá","meaning":"Phát đạt Phát triển","type":"từ vựng","grammar":"这是一个发达的企业。 — Đây là một doanh nghiệp phát triển.","example":"这是一个发达的企业。"},{"hanzi":"发抖","pinyin":"fādǒu","meaning":"Run rẩy","type":"từ vựng","grammar":"听了这话，他气得发 抖。 — Anh run lên vì tức giận vì điều này.","example":"听了这话，他气得发 抖。"},{"hanzi":"发挥","pinyin":"fāhuī","meaning":"Phát huy","type":"từ vựng","grammar":"这一论点有待进一步发挥。 — Lập luận này cần được phát huy thêm.","example":"这一论点有待进一步发挥。"},{"hanzi":"罚款","pinyin":"fákuǎn","meaning":"Khoản phạt","type":"từ vựng","grammar":"他违章开车,被罚款了。 — Anh ta đã lái xe trái phép và bị phạt.","example":"他违章开车,被罚款了。"},{"hanzi":"发明","pinyin":"fǎ míng","meaning":"Phát minh","type":"từ vựng","grammar":"他为他的发明申请了专利。 — Ông đã nộp đơn xin cấp bằng sáng chế cho phát minh của mình.","example":"他为他的发明申请了专利。"},{"hanzi":"翻","pinyin":"fān","meaning":"Lật","type":"từ vựng","grammar":"他在书架上翻找可读的书。 — Anh lục tung giá sách ra những cuốn sách có thể đọc được.","example":"他在书架上翻找可读的书。"},{"hanzi":"反而","pinyin":"fǎn’ér","meaning":"Ngược lại Nhưng mà","type":"từ vựng","grammar":"不求全不求美，生活反而周全又完美。 — Thay vì tìm kiếm cái đẹp, cuộc sống là suy nghĩ và hoàn hảo.","example":"不求全不求美，生活反而周全又完美。"},{"hanzi":"反复","pinyin":"fǎnfù","meaning":"này đến lần khác","type":"từ vựng","grammar":"病情可能还会反复，要特别注意。 — Tình trạng bệnh có thể tái phát nên cần đặc biệt chú ý.","example":"病情可能还会反复，要特别注意。"},{"hanzi":"方","pinyin":"fāng","meaning":"Vuông Phương Chiếc","type":"từ vựng","grammar":"立方框左侧面的物距为 63cm。 — Khoảng cách vật ở mặt trái của hình hộp vuông là 63cm.","example":"立方框左侧面的物距为 63cm。"},{"hanzi":"妨碍","pinyin":"fáng’ài","meaning":"Gây trở ngại Ảnh hưởng","type":"từ vựng","grammar":"上课随便说话会妨碍别人学习。 — Nói chuyện phiếm trong lớp sẽ cản trở việc học của người khác.","example":"上课随便说话会妨碍别人学习。"},{"hanzi":"方案","pinyin":"fāng’àn","meaning":"Kế hoạch","type":"từ vựng","grammar":"校长正在拟订学校的教改方案。 — Hiệu trưởng đang vạch ra kế hoạch cải cách giáo dục của trường.","example":"校长正在拟订学校的教改方案。"},{"hanzi":"房东","pinyin":"fángdōng","meaning":"Chủ trọ Chủ cho thuê","type":"từ vựng","grammar":"至于女房东到底卖什 么，我还是模模糊糊 的。 — Còn về việc bà chủ đang bán gì thì tôi vẫn còn mơ hồ.","example":"至于女房东到底卖什 么，我还是模模糊糊 的。"},{"hanzi":"仿佛","pinyin":"fǎngfú","meaning":"Dường như","type":"từ vựng","grammar":"他高兴得眉开眼笑，仿佛见到祥龙咏唱。 — Anh ta mỉm cười vui sướng, như thể nhìn thấy một con rồng đang hót.","example":"他高兴得眉开眼笑，仿佛见到祥龙咏唱。"},{"hanzi":"方式","pinyin":"fāngshì","meaning":"Phương thức","type":"từ vựng","grammar":"人民的生活水平提高 了，生活方式也有很大改变。 — Mức sống của người dân được cải thiện, lối sống cũng có nhiều thay đổi.","example":"人民的生活水平提高 了，生活方式也有很大改变。"},{"hanzi":"放松","pinyin":"Động từ","meaning":"mái","type":"từ vựng","grammar":"我们绝不能放松对敌人的警惕。 — Chúng ta không được thả lỏng cảnh giác trước kẻ thù.","example":"我们绝不能放松对敌人的警惕。"},{"hanzi":"繁荣","pinyin":"fánróng","meaning":"vinh","type":"từ vựng","grammar":"我们的国家繁荣富强 了。 — Đất nước ta thịnh vượng và giàu mạnh.","example":"我们的国家繁荣富强 了。"},{"hanzi":"凡是","pinyin":"fánshì","meaning":"Phàm là","type":"từ vựng","grammar":"凡是学生,都应好好学 习。 — Phàm là học sinh nên học tập chăm chỉ.","example":"凡是学生,都应好好学 习。"},{"hanzi":"反应","pinyin":"fǎnyìng","meaning":"Phản ứng","type":"từ vựng","grammar":"小明脑筋灵活，反应 快。 — Tiểu Minh có một bộ não linh hoạt và phản ứng nhanh.","example":"小明脑筋灵活，反应 快。"},{"hanzi":"反映","pinyin":"fǎnyìng","meaning":"ánh","type":"từ vựng","grammar":"同学们对新老师的教学反映良好。 — Các học sinh đã phản hồi tốt lời giảng của giáo viên mới.","example":"同学们对新老师的教学反映良好。"},{"hanzi":"反正","pinyin":"fǎnzhèng","meaning":"Dù cho Cho dù","type":"từ vựng","grammar":"做这些徒劳的反抗也没 — Dù sao đi nữa cũng vô ích khi thực hiện những","example":"做这些徒劳的反抗也没"},{"hanzi":"发票","pinyin":"fāpiào","meaning":"Phát vé","type":"từ vựng","grammar":"其他未按规定取得发票的行为. — Các hành vi khác không lấy hóa đơn theo yêu cầu.","example":"其他未按规定取得发票的行为."},{"hanzi":"发言","pinyin":"fǎ yán","meaning":"Phát ngôn","type":"từ vựng","grammar":"会上,他作了简短的发 言。 — Tại cuộc họp, ông đã có một bài phát ngôn ngắn gọn.","example":"会上,他作了简短的发 言。"},{"hanzi":"法院","pinyin":"fǎyuàn","meaning":"Tòa án","type":"từ vựng","grammar":"中级人民法院还是维持原判。 — Tòa án nhân dân trung cấp giữ nguyên bản án ban đầu.","example":"中级人民法院还是维持原判。"},{"hanzi":"非","pinyin":"fēi","meaning":"Phi Không","type":"từ vựng","grammar":"我们非需要迈开第一 步。 — Chúng tôi không cần thực hiện bước đầu tiên.","example":"我们非需要迈开第一 步。"},{"hanzi":"肺","pinyin":"fèi","meaning":"Phổi","type":"từ vựng","grammar":"多年来我只靠一页肺活着。 — Trong nhiều năm, tôi chỉ sống trên một lá phổi của mình.","example":"多年来我只靠一页肺活着。"},{"hanzi":"废话","pinyin":"fèihuà","meaning":"Lời nhảm","type":"từ vựng","grammar":"他讲的这些废话一钱不值。 — Những điều anh ấy nói đều vô giá trị.","example":"他讲的这些废话一钱不值。"},{"hanzi":"费用","pinyin":"fèiyòng","meaning":"Phí tổn","type":"từ vựng","grammar":"爷爷每月有一千多元的退休金，足够生活费用了。 — Lương hưu hàng tháng của ông nội là hơn 1.000 nhân dân tệ, đủ chi phí sinh hoạt.","example":"爷爷每月有一千多元的退休金，足够生活费用了。"},{"hanzi":"肥皂","pinyin":"féizào","meaning":"Xà phòng Xà bông","type":"từ vựng","grammar":"洗衣肥皂看起来像乳 酪。 — Xà phòng giặt trông giống như pho mát.","example":"洗衣肥皂看起来像乳 酪。"},{"hanzi":"分别","pinyin":"fēnbié","meaning":"biệt","type":"từ vựng","grammar":"我的妈妈分别已经有一个月了 — Mẹ tôi đã xa nhau được một tháng","example":"我的妈妈分别已经有一个月了"},{"hanzi":"分布","pinyin":"fēnbù","meaning":"Phân bố","type":"từ vựng","grammar":"我国境内分布着很多岛屿。 — Có nhiều đảo phân bố ở khắp nước ta.","example":"我国境内分布着很多岛屿。"},{"hanzi":"奋斗","pinyin":"fèndòu","meaning":"Phấn đấu","type":"từ vựng","grammar":"我们要继承和发扬前辈艰苦奋斗的精神。 — Chúng ta phải kế thừa và tiếp nối tinh thần phấn đấu làm việc chăm chỉ của các bậc tiền bối.","example":"我们要继承和发扬前辈艰苦奋斗的精神。"},{"hanzi":"纷纷","pinyin":"fēnfēn","meaning":"Ồn ào Nhộn nhịp","type":"từ vựng","grammar":"秋天到了，树叶纷纷落下。 — Mùa thu đến rồi lá nhộn nhịp lìa cành.","example":"秋天到了，树叶纷纷落下。"},{"hanzi":"讽刺","pinyin":"fèng cì","meaning":"Châm biếm Mỉa mai Trào phúng","type":"từ vựng","grammar":"这幅漫画讽刺了不讲社会公德的 人。 — Phim hoạt hình này châm biếm những người không nói về đạo đức xã hội.","example":"这幅漫画讽刺了不讲社会公德的 人。"},{"hanzi":"风格","pinyin":"fēnggé","meaning":"Phong cách","type":"từ vựng","grammar":"这首诗富于浪漫主义风格。 — Bài thơ này giàu phong cách lãng mạn.","example":"这首诗富于浪漫主义风格。"},{"hanzi":"风俗","pinyin":"fēngsú","meaning":"tục","type":"từ vựng","grammar":"我国有许多古老的风 俗。 — Có nhiều phong tục cổ ở nước ta.","example":"我国有许多古老的风 俗。"},{"hanzi":"风险","pinyin":"fēngxiǎn","meaning":"hiểm","type":"từ vựng","grammar":"做生意难免要承担风 险。 — Không thể tránh khỏi rủi ro trong kinh doanh.","example":"做生意难免要承担风 险。"},{"hanzi":"愤怒","pinyin":"fènnù","meaning":"Phẫn nộ","type":"từ vựng","grammar":"他愤怒斥责贪污分子的罪行。 — Ông tức giận quở trách tội ác của những kẻ tham ô.","example":"他愤怒斥责贪污分子的罪行。"},{"hanzi":"分配","pinyin":"fēnpèi","meaning":"Phân phối Bố trí","type":"từ vựng","grammar":"毕业后，他被分配到一家化工厂工作。 — Sau khi tốt nghiệp, anh được phân công làm việc trong một nhà máy hóa chất.","example":"毕业后，他被分配到一家化工厂工作。"},{"hanzi":"分析","pinyin":"fēnxī","meaning":"Phân tích","type":"từ vựng","grammar":"他对那个问题的分析有条有理。 — Phân tích của anh ấy về vấn đề là có phương pháp.","example":"他对那个问题的分析有条有理。"},{"hanzi":"否定","pinyin":"fǒudìng","meaning":"Phủ định","type":"từ vựng","grammar":"否定是事物发展的一个环节。 — Phủ định là một mắt xích trong","example":"否定是事物发展的一个环节。"},{"hanzi":"否认","pinyin":"fǒurèn","meaning":"Phủ nhận","type":"từ vựng","grammar":"两人对这种说法均予以否认。 — Cả hai đều phủ nhận tuyên bố này.","example":"两人对这种说法均予以否认。"},{"hanzi":"幅","pinyin":"fú","meaning":"Phú","type":"từ vựng","grammar":"以往很多风光摄影师使用了大画幅相机。 — Nhiều nhiếp ảnh gia phong cảnh đã sử dụng máy ảnh khổ lớn trong quá khứ.","example":"以往很多风光摄影师使用了大画幅相机。"},{"hanzi":"扶","pinyin":"fú","meaning":"Vịn Đỡ Dìu","type":"từ vựng","grammar":"他扶养了那个被遗弃的小女孩。 — Anh đã nuôi nấng đứa con gái nhỏ bị bỏ rơi.","example":"他扶养了那个被遗弃的小女孩。"},{"hanzi":"服从","pinyin":"fúcóng","meaning":"Phục tùng Vâng lời","type":"từ vựng","grammar":"领导绝对不会错，服从总是没有 错。 — Lãnh đạo hoàn toàn không có gì sai, và luôn luôn không có gì sai khi vâng lời.","example":"领导绝对不会错，服从总是没有 错。"},{"hanzi":"辅导","pinyin":"fǔdǎo","meaning":"Phụ đạo","type":"từ vựng","grammar":"李老师每个周末都坚持给我们辅导功课。 — Cô giáo Lý khăng khăng dạy chúng tôi bài tập về nhà vào mỗi cuối tuần.","example":"李老师每个周末都坚持给我们辅导功课。"},{"hanzi":"复制","pinyin":"fùzhì","meaning":"Phục chế Làm lại","type":"từ vựng","grammar":"复制成功者的想法和行为到自己的行动中。 — Sao chép ý tưởng và hành động của những người thành công thành hành động của chính bạn.","example":"复制成功者的想法和行为到自己的行动中。"},{"hanzi":"付款","pinyin":"fùkuǎn","meaning":"Thanh toán Trả tiền Chuyển khoản","type":"từ vựng","grammar":"一言为定，这次你付 款，下次就让我付。 — Một lời đã quyết, lần này bạn trả và lần sau tôi sẽ trả.","example":"一言为定，这次你付 款，下次就让我付。"},{"hanzi":"妇女","pinyin":"fùnǚ","meaning":"Phụ nữ","type":"từ vựng","grammar":"那个妇女正在采茶叶。 — Người phụ nữ đang hái lá chè.","example":"那个妇女正在采茶叶。"},{"hanzi":"服装","pinyin":"fúzhuāng","meaning":"phục","type":"từ vựng","grammar":"懂得出现在什么场合着什么服装。 — Bây giờ hiểu quần áo đang mặc trong những dịp nào.","example":"懂得出现在什么场合着什么服装。"},{"hanzi":"盖","pinyin":"gài","meaning":"đậy","type":"từ vựng","grammar":"好，现在可以盖上箱子了。 — Được rồi, bây giờ bạn có thể đóng hộp.","example":"好，现在可以盖上箱子了。"},{"hanzi":"改革","pinyin":"gǎigé","meaning":"Cải cách Cải thiện","type":"từ vựng","grammar":"改革的方案还没有定 局，明天可以继续讨 论。 — Kế hoạch cải cách vẫn chưa được hoàn thiện và các cuộc thảo luận có thể tiếp tục vào ngày mai.","example":"改革的方案还没有定 局，明天可以继续讨 论。"},{"hanzi":"改进","pinyin":"gǎijìn","meaning":"Cải tiến","type":"từ vựng","grammar":"他改进了学习方法，效果立竿见 影。 — Anh đã cải tiến phương pháp học và hiệu quả ngay lập tức.","example":"他改进了学习方法，效果立竿见 影。"},{"hanzi":"概括","pinyin":"gàikuò","meaning":"Khái quát Nhìn chung Tổng thể","type":"từ vựng","grammar":"对文章的中心的概括应再简略些。 — Phần khái quát trọng tâm của bài viết nên ngắn gọn hơn một chút.","example":"对文章的中心的概括应再简略些。"},{"hanzi":"概念","pinyin":"gàiniàn","meaning":"niệm","type":"từ vựng","grammar":"不好的书告诉错误的概念，使无知者变得更无知。 — Sách xấu nói lên những khái niệm sai lầm và làm cho những người ngu dốt càng thêm hiểu biết.","example":"不好的书告诉错误的概念，使无知者变得更无知。"},{"hanzi":"改善","pinyin":"gǎishàn","meaning":"Cải thiện","type":"từ vựng","grammar":"国家投入大量资金，改善农村中小学的办学条件。 — Nhà nước đã đầu tư rất nhiều tiền để cải thiện điều kiện hoạt động của các trường tiểu học và trung học cơ sở ở nông thôn.","example":"国家投入大量资金，改善农村中小学的办学条件。"},{"hanzi":"改正","pinyin":"gǎizhèng","meaning":"Cải chính Đính chính Sửa chữa","type":"từ vựng","grammar":"认识到自己的错误，就要坚决改 正。 — Nếu đã nhận ra lỗi của mình thì phải kiên quyết sửa chữa.","example":"认识到自己的错误，就要坚决改 正。"},{"hanzi":"干活儿","pinyin":"gàn huó er","meaning":"Làm việc","type":"từ vựng","grammar":"年轻时，爸爸曾在农村种地干活 儿。 — Khi còn nhỏ, bố thường làm việc ở nông thôn.","example":"年轻时，爸爸曾在农村种地干活 儿。"},{"hanzi":"钢铁","pinyin":"gāngtiě","meaning":"Gang thép","type":"từ vựng","grammar":"由于钢铁价格上涨，最近钢材比较紧缺。 — Do giá thép tăng cao nên gần đây nguồn cung thép bị thiếu hụt.","example":"由于钢铁价格上涨，最近钢材比较紧缺。"},{"hanzi":"感激","pinyin":"gǎnjī","meaning":"kích","type":"từ vựng","grammar":"我感激爸爸妈妈给我的爱。 — Tôi rất cảm kích tình yêu mà cha mẹ đã dành cho tôi.","example":"我感激爸爸妈妈给我的爱。"},{"hanzi":"赶紧","pinyin":"gǎnjǐn","meaning":"Nhanh chóng","type":"từ vựng","grammar":"我赶紧拭干了泪，怕他看见，也怕别人看见。 — Tôi vội lau nước mắt vì sợ anh nhìn thấy sẽ bị người khác nhìn thấy.","example":"我赶紧拭干了泪，怕他看见，也怕别人看见。"},{"hanzi":"赶快","pinyin":"gǎnkuài","meaning":"Gấp rút Nhanh chóng","type":"từ vựng","grammar":"你去或者是不去,请赶快作出决定。 — Còn đi hay không thì hãy nhanh chóng đưa ra quyết định.","example":"你去或者是不去,请赶快作出决定。"},{"hanzi":"感受","pinyin":"gǎnshòu","meaning":"Cảm nhận","type":"từ vựng","grammar":"学生们欢聚一堂，分享留学感受。 — Các bạn sinh viên đã cùng nhau quây quần chia sẻ những cảm nhận khi đi du học.","example":"学生们欢聚一堂，分享留学感受。"},{"hanzi":"感想","pinyin":"gǎnxiǎng","meaning":"Cảm tưởng Cảm nghĩ","type":"từ vựng","grammar":"听了战斗英雄的报告，你有什么感想？ — Bạn nghĩ gì sau khi nghe báo cáo của anh hùng trận mạc?","example":"听了战斗英雄的报告，你有什么感想？"},{"hanzi":"搞","pinyin":"gǎo","meaning":"Làm","type":"từ vựng","grammar":"我没有搞过任何政治交易。 — Tôi không tham gia vào bất kỳ giao dịch chính trị nào.","example":"我没有搞过任何政治交易。"},{"hanzi":"告别","pinyin":"gàobié","meaning":"Cáo biệt Cáo từ","type":"từ vựng","grammar":"她伸手，告别，然后离去。 — Cô ấy duỗi tay ra, chào tạm biệt rồi rời đi.","example":"她伸手，告别，然后离去。"},{"hanzi":"高档","pinyin":"gāodàng","meaning":"Cao cấp","type":"từ vựng","grammar":"我已经减少用高档货 了。 — Tôi đã giảm bớt việc sử dụng hàng hóa cao cấp.","example":"我已经减少用高档货 了。"},{"hanzi":"高速公路","pinyin":"gāosù gōnglù","meaning":"Đường cao tốc","type":"từ vựng","grammar":"汽车在高速公路上奔 驰。 — Chiếc xe đang chạy trên đường cao tốc.","example":"汽车在高速公路上奔 驰。"},{"hanzi":"隔壁","pinyin":"gébì","meaning":"Sát vách","type":"từ vựng","grammar":"隔壁新开了一家饼屋，生意好极 了。 — Một tiệm bánh mì mới được mở bên cạnh và công việc kinh doanh rất tốt.","example":"隔壁新开了一家饼屋，生意好极 了。"},{"hanzi":"个别","pinyin":"gèbié","meaning":"Cá biệt","type":"từ vựng","grammar":"个别同学上课迟到，影响老师教 学。 — Một số học sinh đến lớp muộn ảnh hưởng đến việc giảng dạy của giáo viên.","example":"个别同学上课迟到，影响老师教 学。"},{"hanzi":"胳膊","pinyin":"gēbó","meaning":"Cánh tay","type":"từ vựng","grammar":"小李的胳膊被玻璃碴儿划破了。 — Cánh tay của Tiểu Lý đã bị cắt bởi một quả cầu thủy tinh.","example":"小李的胳膊被玻璃碴儿划破了。"},{"hanzi":"革命","pinyin":"gémìng","meaning":"mạng","type":"từ vựng","grammar":"革命尚未成功，同志仍需努力 — Cách mạng chưa thành công, các đồng chí vẫn cần nỗ lực","example":"革命尚未成功，同志仍需努力"},{"hanzi":"根","pinyin":"gēn","meaning":"Gốc, rễ Dây (lượng từ)","type":"từ vựng","grammar":"给我一根绳子，多长都行。 — Đưa cho tôi một sợi dây, chiều dài nào cũng được.","example":"给我一根绳子，多长都行。"},{"hanzi":"根本","pinyin":"gēnběn","meaning":"Căn bản","type":"từ vựng","grammar":"我们应从根本上去解决这个问题。 — Chúng ta nên giải quyết vấn đề này một cách cơ bản.","example":"我们应从根本上去解决这个问题。"},{"hanzi":"更加","pinyin":"gèngjiā","meaning":"Gia tăng Cộng thêm","type":"từ vựng","grammar":"我们坚信，祖国的明天会更加美 好。 — Chúng tôi tin chắc rằng đất mẹ sẽ có một ngày mai tươi đẹp hơn.","example":"我们坚信，祖国的明天会更加美 好。"},{"hanzi":"个人","pinyin":"gè rén","meaning":"Cá nhân","type":"từ vựng","grammar":"爷爷十六岁时就辞别了父母，一个人外出谋 生。 — Ông nội từ biệt cha mẹ khi ông mười sáu tuổi và ra ngoài tự kiếm sống.","example":"爷爷十六岁时就辞别了父母，一个人外出谋 生。"},{"hanzi":"格外","pinyin":"géwài","meaning":"ngoài","type":"từ vựng","grammar":"雨后，校园里的花开得格外新鲜。 — Sau cơn mưa, hoa trong khuôn viên trường nở rất tươi.","example":"雨后，校园里的花开得格外新鲜。"},{"hanzi":"个性","pinyin":"gèxìng","meaning":"Tính cách","type":"từ vựng","grammar":"你可以很有个性，但某些时候请收敛。 — Bạn có thể rất cá tính, nhưng hãy hạn chế ở một số điểm.","example":"你可以很有个性，但某些时候请收敛。"},{"hanzi":"鸽子","pinyin":"gēzi","meaning":"Bồ câu","type":"từ vựng","grammar":"裁决总宣布乌鸦无罪，却判鸽子有罪。 — Phán quyết luôn luôn tha bổng con quạ, nhưng kết tội con chim bồ câu.","example":"裁决总宣布乌鸦无罪，却判鸽子有罪。"},{"hanzi":"公布","pinyin":"gōngbù","meaning":"Công bố","type":"từ vựng","grammar":"电视上公布了这次歌唱比赛的获奖名单。 — Những người chiến thắng trong cuộc thi hát đã được công bố trên TV.","example":"电视上公布了这次歌唱比赛的获奖名单。"},{"hanzi":"工厂","pinyin":"gōngchǎng","meaning":"Công xưởng Nhà máy","type":"từ vựng","grammar":"该工厂的产品很多都是废品。 — Nhiều sản phẩm của nhà máy là phế phẩm.","example":"该工厂的产品很多都是废品。"},{"hanzi":"工程师","pinyin":"gōngchéngshī","meaning":"Kỹ sư","type":"từ vựng","grammar":"这座大桥是林总工程师设计的。 — Cây cầu này do kỹ sư trưởng Lâm thiết kế.","example":"这座大桥是林总工程师设计的。"},{"hanzi":"功夫","pinyin":"gōngfū","meaning":"Công phu","type":"từ vựng","grammar":"只要下功 夫，外语是可以学好 的。 — Chỉ cần bạn chăm chỉ, bạn có thể học tốt ngoại ngữ.","example":"只要下功 夫，外语是可以学好 的。"},{"hanzi":"公开","pinyin":"gōngkāi","meaning":"Công khai","type":"từ vựng","grammar":"村民要求村里财务公 开。 — Dân làng yêu cầu công khai các vấn đề tài chính của làng.","example":"村民要求村里财务公 开。"},{"hanzi":"功能","pinyin":"gōngnéng","meaning":"năng","type":"từ vựng","grammar":"有些电话有来电显示功能。 — Một số điện thoại có chức năng ID người gọi.","example":"有些电话有来电显示功能。"},{"hanzi":"公平","pinyin":"gōngpíng","meaning":"bằng","type":"từ vựng","grammar":"对经理不公平的指责，小王愤愤不平。 — Tiểu Vương phẫn nộ trước lời buộc tội bất công của người quản lý.","example":"对经理不公平的指责，小王愤愤不平。"},{"hanzi":"工人","pinyin":"gōngrén","meaning":"Công nhân","type":"từ vựng","grammar":"工厂里急需技术娴熟的工人。 — Công nhân lành nghề rất cần thiết trong nhà máy.","example":"工厂里急需技术娴熟的工人。"},{"hanzi":"贡献","pinyin":"gòngxiàn","meaning":"Cống hiến","type":"từ vựng","grammar":"一个人对社会，要先做出贡献，然后才能索 取。 — Một người phải đóng góp cho xã hội trước khi anh ta có thể yêu cầu nó.","example":"一个人对社会，要先做出贡献，然后才能索 取。"},{"hanzi":"工业","pinyin":"gōngyè","meaning":"nghiệp","type":"từ vựng","grammar":"农业的发展离不开工 业。 — Sự phát triển của nông nghiệp không thể tách rời công nghiệp.","example":"农业的发展离不开工 业。"},{"hanzi":"公寓","pinyin":"gōngyù","meaning":"cư","type":"từ vựng","grammar":"这间公寓依山傍海，视野宽广。 — Căn hộ này được bao quanh bởi núi và biển, tầm nhìn rộng.","example":"这间公寓依山傍海，视野宽广。"},{"hanzi":"公园","pinyin":"jiànmiàn","meaning":"Công viên","type":"từ vựng","grammar":"他们约定在公园见面。 — Họ đồng ý gặp nhau trong công viên.","example":"他们约定在公园见面。"},{"hanzi":"公主","pinyin":"gōngzhǔ","meaning":"Công chúa","type":"từ vựng","grammar":"白雪公主被冷酷的继母赶出去了。 — Công chúa Bạch Tuyết bị người mẹ kế lạnh lùng đuổi ra khỏi nhà.","example":"白雪公主被冷酷的继母赶出去了。"},{"hanzi":"构成","pinyin":"gòuchéng","meaning":"thành","type":"từ vựng","grammar":"蓝天，白 云，青山，碧水……构成一幅绝妙的图画。 — Trời xanh, mây trắng, núi xanh, nước trong … tạo thành một bức tranh tuyệt vời.","example":"蓝天，白 云，青山，碧水……构成一幅绝妙的图画。"},{"hanzi":"沟通","pinyin":"gōutōng","meaning":"Khai thông Khơi thông Giao tiếp","type":"từ vựng","grammar":"她和父母之间无法沟 通。 — Cô không thể giao tiếp với cha mẹ mình.","example":"她和父母之间无法沟 通。"},{"hanzi":"挂号","pinyin":"guàhào","meaning":"Lấy số","type":"từ vựng","grammar":"请把你的申请寄挂号 信。 — Vui lòng gửi đơn đăng ký của bạn bằng thưlấy số.","example":"请把你的申请寄挂号 信。"},{"hanzi":"乖","pinyin":"guāi","meaning":"Ngoan","type":"từ vựng","grammar":"把茶喝完了吧，乖孩 子。 — Uống trà đi, cậu bé ngoan.","example":"把茶喝完了吧，乖孩 子。"},{"hanzi":"怪不得","pinyin":"guàibùdé","meaning":"Trả trách Thảo nào","type":"từ vựng","grammar":"这孩子笨头笨脑的,怪不得成绩不 好。 — Cậu bé ngốc nghếch, thảo nào bị điểm kém.","example":"这孩子笨头笨脑的,怪不得成绩不 好。"},{"hanzi":"拐弯","pinyin":"guǎiwān","meaning":"Rẽ ngoặt Rẽ","type":"từ vựng","grammar":"车拐弯了,请把牢扶手。 — Xe đã rẽ vào một khúc cua, xin hãy cầm chắc tay vịn.","example":"车拐弯了,请把牢扶手。"},{"hanzi":"官","pinyin":"guān","meaning":"Quan Nhân viên","type":"từ vựng","grammar":"书记官在喃喃诵读起诉状。 — Quan viên đang lẩm bẩm bản cáo trạng.","example":"书记官在喃喃诵读起诉状。"},{"hanzi":"观点","pinyin":"guāndiǎn","meaning":"điểm","type":"từ vựng","grammar":"这个观点未免有点一孔之见。 — Quan điểm này là một chút ý kiến.","example":"这个观点未免有点一孔之见。"},{"hanzi":"关闭","pinyin":"guānbì","meaning":"Đóng cửa","type":"từ vựng","grammar":"这家工厂因缺少资金而关闭了。 — Nhà máy đóng cửa vì thiếu vốn.","example":"这家工厂因缺少资金而关闭了。"},{"hanzi":"观察","pinyin":"guānchá","meaning":"Quan sát","type":"từ vựng","grammar":"老师教我们怎样观察人物的外貌。 — Cô giáo dạy chúng tôi cách quan sát ngoại hình của các nhân vật.","example":"老师教我们怎样观察人物的外貌。"},{"hanzi":"官场","pinyin":"guānchǎng","meaning":"trường","type":"từ vựng","grammar":"他在官场中干了多年,也没捞个一官半职。 — Anh ấy đã làm việc quan trường trong nhiều năm, nhưng anh ấy chưa kiếm được vị trí toàn thời gian.","example":"他在官场中干了多年,也没捞个一官半职。"},{"hanzi":"广大","pinyin":"guǎngdà","meaning":"Rộng rãi Rộng lớn To lớn","type":"từ vựng","grammar":"他是个神通广大的人 物。 — Anh ấy là một người có quyền lực lớn.","example":"他是个神通广大的人 物。"},{"hanzi":"广泛","pinyin":"guǎngfàn","meaning":"Phổ biến Rộng rãi Khắp nơi","type":"từ vựng","grammar":"这本书涉及的内容很广泛。 — Nội dung của cuốn sách này rất rộng.","example":"这本书涉及的内容很广泛。"},{"hanzi":"光滑","pinyin":"guānghuá","meaning":"Trơn tuột Trơn nhẵn","type":"từ vựng","grammar":"台阶上结了一层冰，十分光滑。 — Một lớp băng hình thành trên các bậc thang, rất mịn.","example":"台阶上结了一层冰，十分光滑。"},{"hanzi":"光临","pinyin":"guānglín.","meaning":"Đến thăm","type":"từ vựng","grammar":"商店的员工列队欢迎顾客光临。 — Nhân viên quán xếp hàng dài chào đón khách hàng.","example":"商店的员工列队欢迎顾客光临。"},{"hanzi":"光明","pinyin":"guāngmíng","meaning":"Quang minh","type":"từ vựng","grammar":"中国共产党把人民引向了光明的道路。 — Đảng Cộng sản Trung Quốc đã dẫn dắt nhân dân đi trên con đường quang minh.","example":"中国共产党把人民引向了光明的道路。"},{"hanzi":"光盘","pinyin":"guāngpán","meaning":"CD","type":"từ vựng","grammar":"公司免费赠送技术教学光盘。 — Công ty tặng CD dạy kỹ thuật miễn phí.","example":"公司免费赠送技术教学光盘。"},{"hanzi":"光荣","pinyin":"guāngróng","meaning":"Quang vinh Vinh dự","type":"từ vựng","grammar":"参军是一件光荣的事。 — Thật là vinh dự khi được gia nhập quân đội.","example":"参军是一件光荣的事。"},{"hanzi":"关怀","pinyin":"guānhuái","meaning":"Kỳ vọng","type":"từ vựng","grammar":"少一点预设的期待，那份对人的关怀会更自 在。 — Với ít kỳ vọng đặt trước hơn, việc chăm sóc mọi người sẽ thoải mái hơn.","example":"少一点预设的期待，那份对人的关怀会更自 在。"},{"hanzi":"冠军","pinyin":"guànjūn","meaning":"Quán quân","type":"từ vựng","grammar":"我们有着一颗冠军的 心。 — Chúng tôi có một trái tim của nhà vô địch.","example":"我们有着一颗冠军的 心。"},{"hanzi":"观念","pinyin":"guānniàn","meaning":"niệm","type":"từ vựng","grammar":"他的观点与正统观念格格不入。 — Quan điểm của ông không tương thích với những ý tưởng chính thống.","example":"他的观点与正统观念格格不入。"},{"hanzi":"罐头","pinyin":"guàntóu","meaning":"Đồ hộp Vò, lọ, hũm, lon","type":"từ vựng","grammar":"生命是罐 头，胆量是开罐器。 — Cuộc sống là một cái lon, và ruột là cái mở lon.","example":"生命是罐 头，胆量是开罐器。"},{"hanzi":"管子","pinyin":"guǎnzi","meaning":"Ống Ống dẫn","type":"từ vựng","grammar":"圣人能辅 时，不能违时管子。 — Khi thánh nhân có thể trợ giúp, người đó không thể vi phạm thời gian ống.","example":"圣人能辅 时，不能违时管子。"},{"hanzi":"古代","pinyin":"gǔdài","meaning":"Cổ đại","type":"từ vựng","grammar":"屈原是我国古代的伟大诗人。 — Khuất Nguyên là một nhà thơ lớn ở nước tôi thời xưa.","example":"屈原是我国古代的伟大诗人。"},{"hanzi":"古典","pinyin":"gǔdiǎn","meaning":"Cổ điển","type":"từ vựng","grammar":"李、杜诗篇是我国古典诗歌中的瑰宝。 — Thơ Lí và Đỗ là kho tàng thơ cổ điển Trung Quốc.","example":"李、杜诗篇是我国古典诗歌中的瑰宝。"},{"hanzi":"固定","pinyin":"gùdìng","meaning":"Cố định","type":"từ vựng","grammar":"那面镜子被固定在墙上了。 — Chiếc gương đã được cố định vào tường.","example":"那面镜子被固定在墙上了。"},{"hanzi":"姑姑","pinyin":"gūgū","meaning":"Cô Cô cô","type":"từ vựng","grammar":"没有了姑 姑，人间是一口井，有了姑姑，井是一个人 间。 — Không có cô cô, thế giới là một cái giếng; có cô, cái giếng là một thế giới.","example":"没有了姑 姑，人间是一口井，有了姑姑，井是一个人 间。"},{"hanzi":"规矩","pinyin":"guījǔ","meaning":"Quy cách","type":"từ vựng","grammar":"请君莫奏前朝曲，新君要有新规 矩。 — Lạy chúa, xin tấu khúc tiền triều, quý nhân mới phải có lệ.","example":"请君莫奏前朝曲，新君要有新规 矩。"},{"hanzi":"规律","pinyin":"guīlǜ","meaning":"Quy luật","type":"từ vựng","grammar":"这是事物的普遍规律。 — Đây là quy luật vạn vật.","example":"这是事物的普遍规律。"},{"hanzi":"规模","pinyin":"guīmó","meaning":"Quy mô","type":"từ vựng","grammar":"这次战役的规模之大是空前的。 — Quy mô của trận chiến này là chưa từng có.","example":"这次战役的规模之大是空前的。"},{"hanzi":"柜台","pinyin":"guìtái","meaning":"Quầy","type":"từ vựng","grammar":"商店里的柜台上摆满了各式各样的商品。 — Quầy hàng trong quán chất đầy đủ loại hàng hóa.","example":"商店里的柜台上摆满了各式各样的商品。"},{"hanzi":"规则","pinyin":"guīzé","meaning":"Quy tắc","type":"từ vựng","grammar":"按规则去 爱，就得不到爱。 — Nếu bạn yêu theo quy luật, bạn sẽ không có được tình yêu.","example":"按规则去 爱，就得不到爱。"},{"hanzi":"古老","pinyin":"gǔlǎo","meaning":"Cũ kĩ Cổ","type":"từ vựng","grammar":"改革开放使古老的中国焕发出青 春。 — Cải cách và mở cửa đã làm cho Trung Quốc cổ đại bừng sáng với  tuổi trẻ.","example":"改革开放使古老的中国焕发出青 春。"},{"hanzi":"滚","pinyin":"gǔn","meaning":"Cút  Biến đi Đi ra Tránh ra","type":"từ vựng","grammar":"你叫我滚，我滚了 — Bạn bảo tôi tránh ra, tôi đã ra ngoài","example":"你叫我滚，我滚了"},{"hanzi":"顾念","pinyin":"gùaniàn","meaning":"Quan tâm","type":"từ vựng","grammar":"我们不是没有顾念我们英国的弟兄. — Không phải là chúng tôi không quan tâm đến những người anh em người anh của mình.","example":"我们不是没有顾念我们英国的弟兄."},{"hanzi":"过","pinyin":"guò","meaning":"Đã","type":"từ vựng","grammar":"我记得她给过我那把钥匙。 — Tôi nhớ cô ấy đã đưa tôi chìa khóa.","example":"我记得她给过我那把钥匙。"},{"hanzi":"锅","pinyin":"guō","meaning":"Nồi","type":"từ vựng","grammar":"油炸锅里的食油已经热了。 — Dầu ăn trong nồi chiên đã nóng.","example":"油炸锅里的食油已经热了。"},{"hanzi":"过期","pinyin":"guòqí","meaning":"Quá date Quá thời gian","type":"từ vựng","grammar":"货有过期 日，人有看腻时。你在我心里，能牛逼几时。 — Hàng có hạn sử dụng, người ta ngán ngẩm nhìn thấy. Em ở trong trái tim anh, anh có thể tốt như thế nào.","example":"货有过期 日，人有看腻时。你在我心里，能牛逼几时。"},{"hanzi":"过分","pinyin":"guòfèn","meaning":"Quá mức Quá đáng Quá phận","type":"từ vựng","grammar":"对子女过分娇宠，没有一点儿益 处。 — Quá nuông chiều con cái chẳng có lợi ích gì.","example":"对子女过分娇宠，没有一点儿益 处。"},{"hanzi":"国际","pinyin":"guójì","meaning":"Quốc tế","type":"từ vựng","grammar":"在国际事务中，我国政府一贯主持公道。 — Trong các vấn đề quốc tế, chính phủ chúng tôi luôn đề cao công lý.","example":"在国际事务中，我国政府一贯主持公道。"},{"hanzi":"国民","pinyin":"guómín","meaning":"dân","type":"từ vựng","grammar":"国民党对人民的利益置之不顾。 — Quốc dân đảng bỏ qua quyền lợi của người dân.","example":"国民党对人民的利益置之不顾。"},{"hanzi":"国庆节","pinyin":"guóqìng jié","meaning":"khánh","type":"từ vựng","grammar":"国庆节到 了，大街小巷彩旗飞 扬，一派喜庆气氛。 — Quốc khánh đến rồi, khắp các con đường, ngõ hẻm rợp bóng cờ hoa rực rỡ, tạo nên không khí lễ hội.","example":"国庆节到 了，大街小巷彩旗飞 扬，一派喜庆气氛。"},{"hanzi":"果实","pinyin":"guǒshí","meaning":"Quả thực","type":"từ vựng","grammar":"果园里花蕾满枝，预示着秋天果实累累。 — Những nụ hoa trong vườn trĩu cành, báo hiệu mùa thu về.","example":"果园里花蕾满枝，预示着秋天果实累累。"},{"hanzi":"股票","pinyin":"gǔpiào","meaning":"Cổ phiếu Chi phiếu","type":"từ vựng","grammar":"最近，金融市场不景 气，股票跌得厉害。 — Gần đây, thị trường tài chính ì ạch và cổ phiếu giảm giá mạnh.","example":"最近，金融市场不景 气，股票跌得厉害。"},{"hanzi":"故事","pinyin":"gùshì","meaning":"Sự cố Câu chuyện","type":"từ vựng","grammar":"看着别人的故事，流着自己的眼 泪。 — Xem chuyện của người khác mà tôi rơi nước mắt.","example":"看着别人的故事，流着自己的眼 泪。"},{"hanzi":"固体","pinyin":"gùtǐ","meaning":"Cụ thể (vật) rắn","type":"từ vựng","grammar":"都市固体废物亦是迫在眉睫的严峻问题。 — Chất thải rắn đô thị cũng là một vấn đề cấp bách và nghiêm trọng.","example":"都市固体废物亦是迫在眉睫的严峻问题。"},{"hanzi":"骨头","pinyin":"gǔtou","meaning":"Xương","type":"từ vựng","grammar":"他的鼻子细长。像是只有骨头包着皮。 — Dường như chỉ còn da bọc xương.","example":"他的鼻子细长。像是只有骨头包着皮。"},{"hanzi":"鼓舞","pinyin":"gǔwǔ","meaning":"Cổ vũ","type":"từ vựng","grammar":"我国现代化建设的前景令人鼓舞。 — Triển vọng hiện đại hóa ở nước ta là đáng khích lệ.","example":"我国现代化建设的前景令人鼓舞。"},{"hanzi":"雇佣","pinyin":"gùyōng","meaning":"mướn","type":"từ vựng","grammar":"她家雇佣了一个保姆照顾小孩。 — Gia đình cô đã thuê bảo mẫu để chăm sóc bọn trẻ.","example":"她家雇佣了一个保姆照顾小孩。"},{"hanzi":"哈","pinyin":"hā","meaning":"Ha","type":"từ vựng","grammar":"他滑稽的样子逗得大家哈哈大笑。 — Vẻ hài hước của anh khiến ai cũng phải bật cười.","example":"他滑稽的样子逗得大家哈哈大笑。"},{"hanzi":"海关","pinyin":"hǎiguān","meaning":"Hải quan","type":"từ vựng","grammar":"海关罚没的物资将公开拍卖。 — Những vật liệu bị hải quan tịch thu sẽ được bán đấu giá công khai.","example":"海关罚没的物资将公开拍卖。"},{"hanzi":"海鲜","pinyin":"hǎixiān","meaning":"","type":"từ vựng","grammar":"海鲜汤配鳟鱼，鲶鱼，安康鱼和小龙虾及蒜蓉面包。 — Súp hải sản với cá hồi, cá da trơn, cá tu hú, tôm càng và bánh mì bơ tỏi.","example":"海鲜汤配鳟鱼，鲶鱼，安康鱼和小龙虾及蒜蓉面包。"},{"hanzi":"航班","pinyin":"hángbān","meaning":"Hàng không Chuyến bay","type":"từ vựng","grammar":"由于天气原因，所有的航班都要推迟起飞。 — Do thời tiết nên tất cả các chuyến bay đều phải hoãn lại.","example":"由于天气原因，所有的航班都要推迟起飞。"},{"hanzi":"行业","pinyin":"hángyè","meaning":"Công việc Ngành việc","type":"từ vựng","grammar":"他对金融行业还不熟 悉。 — Anh ấy chưa quen với ngành tài chính.","example":"他对金融行业还不熟 悉。"},{"hanzi":"豪华","pinyin":"háohuá","meaning":"Hào hoa","type":"từ vựng","grammar":"刘先生生性大度,有元龙豪华之气。 — Bản chất ông Lưu rất hào phóng và có sự xa hoa của Nguyên Long.","example":"刘先生生性大度,有元龙豪华之气。"},{"hanzi":"好奇","pinyin":"hàoqí","meaning":"Hiếu kỳ","type":"từ vựng","grammar":"大家都好奇地打量着新来的同学。 — Mọi người đều tò mò nhìn các bạn học mới.","example":"大家都好奇地打量着新来的同学。"},{"hanzi":"何必","pinyin":"hébì","meaning":"Hà tất","type":"từ vựng","grammar":"咱们是老同学，何必这么客气？ — Chúng ta là bạn học cũ, sao lại phải khách sáo như vậy?","example":"咱们是老同学，何必这么客气？"},{"hanzi":"合法","pinyin":"héfǎ","meaning":"pháp","type":"từ vựng","grammar":"干部不要侵犯农民的合法权益。 — Cán bộ không được xâm phạm quyền và lợi ích hợp pháp của nông dân.","example":"干部不要侵犯农民的合法权益。"},{"hanzi":"何况","pinyin":"hékuàng","meaning":"Huống hồ","type":"từ vựng","grammar":"再大的困难都不怕，何况这点小 事！ — Dù khó khăn lớn đến đâu tôi cũng không sợ, huống chi là chuyện nhỏ này!","example":"再大的困难都不怕，何况这点小 事！"},{"hanzi":"合理","pinyin":"hélǐ","meaning":"Hợp lý","type":"từ vựng","grammar":"成功者要有远大的理 想，但要有合理的目 标！ — Người thành công phải có lý tưởng cao cả nhưng cũng phải có mục tiêu hợp lý!","example":"成功者要有远大的理 想，但要有合理的目 标！"},{"hanzi":"恨","pinyin":"hèn","meaning":"Hận","type":"từ vựng","grammar":"我痛恨亨利对我采取行动。 — Tôi hận Henry vì đã có hành động chống lại tôi.","example":"我痛恨亨利对我采取行动。"},{"hanzi":"横","pinyin":"héng","meaning":"Ngang Hàng ngang","type":"từ vựng","grammar":"象群横冲直撞地穿过森林。 — Đàn voi lao ngang qua khu rừng.","example":"象群横冲直撞地穿过森林。"},{"hanzi":"和平","pinyin":"hépíng","meaning":"Hòa bình","type":"từ vựng","grammar":"我们是世界和平的捍卫者。 — Chúng tôi là những người bảo vệ hòa bình thế giới.","example":"我们是世界和平的捍卫者。"},{"hanzi":"合同","pinyin":"hétóng","meaning":"Hợp đồng","type":"từ vựng","grammar":"我给多多签订了一份合同。 — Tôi đã ký hợp đồng với Duoduo.","example":"我给多多签订了一份合同。"},{"hanzi":"核心","pinyin":"héxīn","meaning":"Hạt nhân Nòng cốt","type":"từ vựng","grammar":"领导我们事业的核心力量是中国共产党。 — Lực lượng nòng cốt lãnh đạo sự nghiệp của chúng ta là Đảng Cộng sản Trung Quốc.","example":"领导我们事业的核心力量是中国共产党。"},{"hanzi":"合影","pinyin":"héyǐng","meaning":"Chụp ảnh chung","type":"từ vựng","grammar":"让我们来张合影。 — Hãy chụp ảnh nhóm.","example":"让我们来张合影。"},{"hanzi":"合作","pinyin":"hézuò","meaning":"Hợp tác","type":"từ vựng","grammar":"合作共赢是一种必然选择。 — Hợp tác đôi bên cùng có lợi là sự lựa chọn tất yếu.","example":"合作共赢是一种必然选择。"},{"hanzi":"后果","pinyin":"hòuguǒ","meaning":"Hậu quả","type":"từ vựng","grammar":"用劣质材料建高楼,后果不堪设想。 — Hậu quả của việc sử dụng vật liệu kém chất lượng để xây dựng nhà cao tầng là rất tai hại.","example":"用劣质材料建高楼,后果不堪设想。"},{"hanzi":"壶","pinyin":"hú","meaning":"Ấm (trà)","type":"từ vựng","grammar":"他生了火，烧热了一壶水。 — Anh ta đốt lửa và đun nóng một ấm nước.","example":"他生了火，烧热了一壶水。"},{"hanzi":"滑冰","pinyin":"huábīng","meaning":"Trượt băng","type":"từ vựng","grammar":"他三天功夫就学会了滑冰。 — Anh ấy đã học trượt băng trong ba ngày.","example":"他三天功夫就学会了滑冰。"},{"hanzi":"划船","pinyin":"huáchuán","meaning":"thuyền","type":"từ vựng","grammar":"每个人首先想到的是划船. — Điều đầu tiên mà mọi người nghĩ đến là chèo thuyền.","example":"每个人首先想到的是划船."},{"hanzi":"怀念","pinyin":"huáiniàn","meaning":"Hoài niệm Nhớ mong","type":"từ vựng","grammar":"她至今仍深情地怀念着他。 — Cô vẫn nhớ anh một cách trìu mến.","example":"她至今仍深情地怀念着他。"},{"hanzi":"皇帝","pinyin":"huángdì","meaning":"đế","type":"từ vựng","grammar":"诺诺对于路明非，就像约瑟芬皇后对于拿破仑 — Nono đối với Lu Mingfei, cũng giống như Nữ hoàng Josephine đối với Hoàng đế","example":"诺诺对于路明非，就像约瑟芬皇后对于拿破仑"},{"hanzi":"皇后","pinyin":"huánghòu","meaning":"hậu","type":"từ vựng","grammar":"诺诺对于路明非，就像约瑟芬皇后对于拿破仑皇帝，皇后并没有什么卵用，但皇帝就是在意她。 — Nono đối với Lu Mingfei, cũng giống như Nữ hoàng Josephine đối với Hoàng đế Napoléon, nữ hoàng không có ích gì, nhưng hoàng đế quan tâm đến nàng.","example":"诺诺对于路明非，就像约瑟芬皇后对于拿破仑皇帝，皇后并没有什么卵用，但皇帝就是在意她。"},{"hanzi":"黄瓜","pinyin":"huángguā","meaning":"Dưa vàng Dưa chuột","type":"từ vựng","grammar":"黄瓜可以生吃。 — Dưa chuột có thể được ăn sống.","example":"黄瓜可以生吃。"},{"hanzi":"黄金","pinyin":"huángjīn","meaning":"Hoàng kim","type":"từ vựng","grammar":"这时正是春天的黄金时期。 — Đây là thời kỳ vàng son của thanh xuân.","example":"这时正是春天的黄金时期。"},{"hanzi":"慌张","pinyin":"huāngzhāng","meaning":"Hoảng loạn","type":"từ vựng","grammar":"他慌里慌张不知如何是好 — Anh hoảng hốt không biết phải làm sao","example":"他慌里慌张不知如何是好"},{"hanzi":"环节","pinyin":"huánjié","meaning":"Vòng tuần hoàn Liên tiếp","type":"từ vựng","grammar":"两个储存环节紧密重合 — Hai liên kết lưu trữ chồng chéo chặt chẽ","example":"两个储存环节紧密重合"},{"hanzi":"幻想","pinyin":"huànxiǎng","meaning":"Tưởng tượng Mộng tưởng Hoang tưởng","type":"từ vựng","grammar":"人类  就幻想着飞向太空，登上月球 — Con người từ lâu đã tưởng tượng bay vào vũ trụ và đáp xuống mặt trăng","example":"人类  就幻想着飞向太空，登上月球"},{"hanzi":"花生","pinyin":"huāshēng","meaning":"Đậu phộng","type":"từ vựng","grammar":"这种花生长在山地上。 — Đậu phộng này mọc trên núi.","example":"这种花生长在山地上。"},{"hanzi":"话题","pinyin":"huàtí","meaning":"Chủ đề","type":"từ vựng","grammar":"我转到了有关电影的话题上。 — Tôi chuyển sang chủ đề về phim.","example":"我转到了有关电影的话题上。"},{"hanzi":"化学","pinyin":"huàxué","meaning":"Hóa học","type":"từ vựng","grammar":"（领域）的新手 — Cô ấy là một người mới trong ngành hóa học (lĩnh vực)","example":"（领域）的新手"},{"hanzi":"华裔","pinyin":"huáyì","meaning":"Người gốc Hoa","type":"từ vựng","grammar":"李政道是一个美籍华裔科学家 — Lí Chính Đạo là một nhà khoa học người Mỹ gốc Hoa","example":"李政道是一个美籍华裔科学家"},{"hanzi":"蝴蝶","pinyin":"húdié","meaning":"Bướm","type":"từ vựng","grammar":"看着美丽的蝴蝶在空中漫步， 跳舞，追逐。 — Ngắm nhìn những chú bướm xinh đẹp bay lượn trên không trung, nhảy múa và rượt đuổi.","example":"看着美丽的蝴蝶在空中漫步， 跳舞，追逐。"},{"hanzi":"灰","pinyin":"huī","meaning":"Màu xám","type":"từ vựng","grammar":"他宁愿让这世界化成灰烬。 — Anh thà để thế giới biến thành tro tàn.","example":"他宁愿让这世界化成灰烬。"},{"hanzi":"挥","pinyin":"huī","meaning":"Phất","type":"từ vựng","grammar":"他断然地挥挥手制止了我。 — Anh ta ngăn tôi lại bằng một cái vẫy tay dứt khoát.","example":"他断然地挥挥手制止了我。"},{"hanzi":"灰尘","pinyin":"huīchén","meaning":"Bụi đất Bụi bặm","type":"từ vựng","grammar":"窗帘上容易积上灰尘。 — Bụi rất dễ tích tụ trên rèm.","example":"窗帘上容易积上灰尘。"},{"hanzi":"回复","pinyin":"huífù","meaning":"Trả lời Hồi âm Hồi phục","type":"từ vựng","grammar":"我有一批信要回复。 — Tôi có một loạt thư cần trả lời.","example":"我有一批信要回复。"},{"hanzi":"汇率","pinyin":"huìlǜ","meaning":"Tỷ suất Tỷ giá hối đoái","type":"từ vựng","grammar":"世界又恢复到浮动汇率制度。 — Thế giới đã quay trở lại hệ thống tỷ giá hối đoái thả nổi.","example":"世界又恢复到浮动汇率制度。"},{"hanzi":"回信","pinyin":"huíxìn","meaning":"Hồi đáp Trả lời thư","type":"từ vựng","grammar":"回信时请注明我方函件编号 — Vui lòng cho biết số thư của chúng tôi khi trả lời","example":"回信时请注明我方函件编号"},{"hanzi":"婚礼","pinyin":"hūnlǐ","meaning":"Hôn lễ","type":"từ vựng","grammar":"婚礼的事让他们忙得不可开交。 — Chuyện đám cưới khiến họ bận rộn cười không nổi.","example":"婚礼的事让他们忙得不可开交。"},{"hanzi":"婚姻","pinyin":"hūnyīn","meaning":"Hôn nhân","type":"từ vựng","grammar":"他们的婚姻好象有些问题。 — Dường như có điều gì đó không ổn trong cuộc hôn nhân của họ.","example":"他们的婚姻好象有些问题。"},{"hanzi":"伙伴","pinyin":"huǒbàn","meaning":"Đồng đội Đồng bọn Nhóm","type":"từ vựng","grammar":"我的小伙伴叫孙卓 — Bạn nhỏ của tôi là Tôn Trác.","example":"我的小伙伴叫孙卓"},{"hanzi":"火柴","pinyin":"huǒchái","meaning":"Diêm Diêm quẹt","type":"từ vựng","grammar":"他用火柴去点燃那干木头 — Anh ta dùng que diêm để đốt củi khô","example":"他用火柴去点燃那干木头"},{"hanzi":"活跃","pinyin":"huóyuè","meaning":"Hoạt bát","type":"từ vựng","grammar":"这种不活跃有三种情 况。 — Có ba trường hợp không hoạt bát này.","example":"这种不活跃有三种情 况。"},{"hanzi":"护士","pinyin":"hùshì","meaning":"Y tá","type":"từ vựng","grammar":"那位护士完全是个美人儿。 — Cô y tá đó là một người đẹp hoàn toàn.","example":"那位护士完全是个美人儿。"},{"hanzi":"忽视","pinyin":"hūshì","meaning":"Xem nhẹ Coi thường","type":"từ vựng","grammar":"事实并不因为被忽视而不复存在。 — Sự thật không vì bị coi thường mà không tồn tại.","example":"事实并不因为被忽视而不复存在。"},{"hanzi":"胡说","pinyin":"húshuō","meaning":"Nói lung tung","type":"từ vựng","grammar":"算命先生胡说八道骗取钱财。 — Thầy bói nói lung tung lừa tiền từ những điều vô nghĩa.","example":"算命先生胡说八道骗取钱财。"},{"hanzi":"胡同","pinyin":"hútòng","meaning":"Hẻm","type":"từ vựng","grammar":"这条胡同的顶头有一家商店。 — Có một cửa hàng ở đầu con hẻm này.","example":"这条胡同的顶头有一家商店。"},{"hanzi":"糊涂","pinyin":"hútú","meaning":"Bối rối Mơ hồ","type":"từ vựng","grammar":"他一遇到数学问题就糊涂 — Anh ấy bối rối khi gặp một vấn đề toán học","example":"他一遇到数学问题就糊涂"},{"hanzi":"呼吸","pinyin":"hūxī","meaning":"Hô hấp","type":"từ vựng","grammar":"她努力让呼吸平缓下 来。 — Cô cố gắng làm dịu nhịp thở của mình.","example":"她努力让呼吸平缓下 来。"},{"hanzi":"胡须","pinyin":"húxū","meaning":"Râu","type":"từ vựng","grammar":"她觉得他的胡须太扎 人。 — Cô cho rằng bộ râu của anh ta quá rối.","example":"她觉得他的胡须太扎 人。"},{"hanzi":"嫁","pinyin":"jià","meaning":"Gả","type":"từ vựng","grammar":"她嫁了一个糟糕的丈 夫。 — Cô ấy lấy phải một người chồng khủng khiếp.","example":"她嫁了一个糟糕的丈 夫。"},{"hanzi":"甲","pinyin":"jiǎ","meaning":"Giả Thứ 1","type":"từ vựng","grammar":"作为演员而论，甲不如乙。 — Là một diễn viên,Giả không giỏi bằng Ất.","example":"作为演员而论，甲不如乙。"},{"hanzi":"嘉宾","pinyin":"jiābīn","meaning":"Khách hàng","type":"từ vựng","grammar":"再看看座位上，各位嘉宾都已经到齐了。 — Nhìn lại chỗ ngồi, mọi vị khách đều ở đây.","example":"再看看座位上，各位嘉宾都已经到齐了。"},{"hanzi":"捡","pinyin":"jiǎn","meaning":"Nhặt","type":"từ vựng","grammar":"他们把东西从船上捡 起。 — Họ nhặt những thứ từ thuyền.","example":"他们把东西从船上捡 起。"},{"hanzi":"煎","pinyin":"jiān","meaning":"Rán, chiên Sắc, pha (trà, thuốc)","type":"từ vựng","grammar":"他喜欢吃煎得熟透的牛排。 — Anh ấy thích ăn bít tết chiên giòn.","example":"他喜欢吃煎得熟透的牛排。"},{"hanzi":"肩膀","pinyin":"jiānbǎng","meaning":"Vai","type":"từ vựng","grammar":"他肩膀上搭着一块毛 巾。 — Anh ấy có một chiếc khăn trên vai.","example":"他肩膀上搭着一块毛 巾。"},{"hanzi":"剪刀","pinyin":"jiǎndāo","meaning":"Dao kéo","type":"từ vựng","grammar":"这把剪刀不快。 — Cái kéo này không nhanh.","example":"这把剪刀不快。"},{"hanzi":"讲究","pinyin":"jiǎngjiù","meaning":"Chú ý Coi trọng Xem trọng","type":"từ vựng","grammar":"他们家买了一套十分讲究的家具。 — Gia đình họ đã mua một bộ đồ nội thất rất đặc biệt.","example":"他们家买了一套十分讲究的家具。"},{"hanzi":"降落","pinyin":"jiàngluò","meaning":"Lìa
